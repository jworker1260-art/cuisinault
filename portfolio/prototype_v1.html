// ENEMY (PIG)
// ============================================================
let enemies = [];
let enemyIdCounter = 0;

const PIG_STATES = { IDLE: 0, DETECT: 1, APPROACH: 2, TELEGRAPH: 3, CHARGE: 4, RECOVER: 5, HIT_STUN: 6, DYING: 7, SLAM_TELEGRAPH: 8, SLAM_JUMP: 9, SLAM_FALL: 10, SLAM_RECOVERY: 11, PHASE_TRANSITION: 12 };

function createPig(x, y) {
  return {
    id: enemyIdCounter++,
    type: 'pig',
    x, y,
    hp: CONFIG.enemy_pig.hp,
    state: PIG_STATES.IDLE,
    stateTimer: 0,
    facingRight: Math.random() > 0.5,
    wanderDir: Math.random() > 0.5 ? 1 : -1,
    wanderTimer: 1 + Math.random() * 2,
    chargeStartX: 0, chargeTargetX: 0, chargeDirX: 0,
    chargeDirY: 0, chargeStartY: 0, chargeTargetY: 0,
    stunTimer: 0,
    flashTimer: 0,
    squashTimer: 0, squashPhase: 0,
    hitScaleX: 1, hitScaleY: 1,
    knockbackVelX: 0,
    dyingTimer: 0,
    alpha: 1, scale: 1,
    aggroed: false,
    chaseGiveUpTimer: 0,
    bouncePhase: Math.random() * Math.PI * 2,
    // Boss slam & phase properties
    phase2: false,
    nextAttack: 'charge',
    slamBaseY: 0,
    slamJumpOffset: 0,
    slamShockwaveEffect: null,
    phaseTransitionTimer: 0,
    phaseFlashTimer: 0,
  };
}

function updatePig(e, dt) {
  // Freeze boss during entrance animation
  if (e.isBoss && bossEntrance.active && bossEntrance.phase <= 2) return;
  const cfg = e.isBoss ? CONFIG.enemy_boss : CONFIG.enemy_pig;
  if (e.flashTimer > 0) e.flashTimer -= dt;

  // Knockback deceleration
  if (Math.abs(e.knockbackVelX) > 0) {
    e.x += e.knockbackVelX * dt;
    e.knockbackVelX *= 0.85;
    if (Math.abs(e.knockbackVelX) < 10) e.knockbackVelX = 0;
    e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
  }

  // Squash & stretch animation
  if (e.squashPhase > 0) {
    e.squashTimer -= dt;
    if (e.squashPhase === 1) {
      e.hitScaleX = 1.3; e.hitScaleY = 0.7;
      if (e.squashTimer <= 0) { e.squashPhase = 2; e.squashTimer = 3 / 60; }
    } else if (e.squashPhase === 2) {
      const t = e.squashTimer / (3 / 60);
      e.hitScaleX = 0.85 + (1.0 - 0.85) * (1 - t);
      e.hitScaleY = 1.15 + (1.0 - 1.15) * (1 - t);
      if (e.squashTimer <= 0) { e.squashPhase = 3; e.squashTimer = 3 / 60; }
    } else if (e.squashPhase === 3) {
      const t = e.squashTimer / (3 / 60);
      e.hitScaleX = lerp(1.0, e.hitScaleX, t);
      e.hitScaleY = lerp(1.0, e.hitScaleY, t);
      if (e.squashTimer <= 0) { e.squashPhase = 0; e.hitScaleX = 1; e.hitScaleY = 1; }
    }
  }

  switch (e.state) {
    case PIG_STATES.IDLE: {
      e.wanderTimer -= dt;
      if (e.wanderTimer <= 0) { e.wanderDir *= -1; e.wanderTimer = 1 + Math.random() * 2; }
      e.x += e.wanderDir * cfg.moveSpeed * 0.3 * dt;
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.facingRight = e.wanderDir > 0;
      const dx = player.x - e.x, dy = player.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) < cfg.detectRange && !player.dead) {
        e.aggroed = true;
        e.state = PIG_STATES.APPROACH;
      }
      break;
    }
    case PIG_STATES.APPROACH: {
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const loseRange = cfg.chaseRange || cfg.detectRange * 2;
      if (dist > loseRange) {
        e.chaseGiveUpTimer += dt;
        if (e.chaseGiveUpTimer >= (cfg.chaseGiveUpDelay || 1.5)) {
          e.aggroed = false; e.chaseGiveUpTimer = 0;
          e.state = PIG_STATES.IDLE; e.wanderTimer = 1; break;
        }
      } else {
        e.chaseGiveUpTimer = 0;
      }
      if (dist < cfg.chargeDistance) {
        if (e.isBoss) {
          // Boss pattern selection
          const adx = Math.abs(player.x - e.x);
          const ady = Math.abs(player.y - e.y);
          if (ady > 80 || adx > 400) {
            e.nextAttack = 'slam';
          } else if (adx < 300) {
            e.nextAttack = Math.random() < 0.7 ? 'charge' : 'slam';
          } else {
            e.nextAttack = Math.random() < 0.5 ? 'charge' : 'slam';
          }
          if (e.nextAttack === 'slam') {
            const slamTele = e.phase2 ? CONFIG.bossPhase2.slamTelegraphTime : CONFIG.bossSlam.telegraphTime;
            e.state = PIG_STATES.SLAM_TELEGRAPH;
            e.stateTimer = slamTele;
            e.slamBaseY = e.y;
            e.slamJumpOffset = 0;
            break;
          }
          // charge: use phase2 telegraph time
          const chargeTele = e.phase2 ? CONFIG.bossPhase2.chargeTelegraphTime : cfg.telegraphTime;
          e.state = PIG_STATES.TELEGRAPH; e.stateTimer = chargeTele;
        } else {
          e.state = PIG_STATES.TELEGRAPH; e.stateTimer = cfg.telegraphTime;
        }
        break;
      }
      const ndx = dx / dist, ndy = dy / dist;
      const moveSpd = (e.isBoss && e.phase2) ? cfg.moveSpeed * CONFIG.bossPhase2.speedMultiplier : cfg.moveSpeed;
      e.x += ndx * moveSpd * dt;
      e.y += ndy * moveSpd * dt;
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.facingRight = dx > 0;
      break;
    }
    case PIG_STATES.TELEGRAPH: {
      e.stateTimer -= dt;
      e.facingRight = player.x > e.x;
      if (e.stateTimer <= 0) {
        e.state = PIG_STATES.CHARGE; e.stateTimer = cfg.chargeDuration;
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const ndx = dist > 0 ? dx / dist : 0;
        const ndy = dist > 0 ? dy / dist : 0;
        e.chargeDirX = ndx;
        e.chargeDirY = ndy;
        e.chargeStartX = e.x;
        e.chargeStartY = e.y;
        e.chargeTargetX = e.x + ndx * cfg.chargeDistance;
        e.chargeTargetY = e.y + ndy * cfg.chargeDistance;
        e.facingRight = dx > 0;
      }
      break;
    }
    case PIG_STATES.CHARGE: {
      e.stateTimer -= dt;
      const speed = cfg.chargeDistance / cfg.chargeDuration;
      e.x += e.chargeDirX * speed * dt;
      e.y += e.chargeDirY * speed * dt;
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      const ehb = { x: e.x - cfg.size.width / 2, y: e.y, w: cfg.size.width, h: cfg.size.height };
      if (aabbOverlap(ehb, playerHitbox())) damagePlayer(cfg.damage, e.chargeDirX > 0 ? 1 : -1, 'charge');
      if (e.stateTimer <= 0) {
        const recoveryTime = (e.isBoss && e.phase2) ? CONFIG.bossPhase2.chargeRecoveryTime : cfg.postAttackDelay;
        e.state = PIG_STATES.RECOVER; e.stateTimer = recoveryTime;
      }
      break;
    }
    case PIG_STATES.RECOVER: {
      e.stateTimer -= dt;
      if (e.stateTimer <= 0) { e.state = PIG_STATES.IDLE; e.wanderTimer = 1; }
      break;
    }
    case PIG_STATES.HIT_STUN: {
      e.stunTimer -= dt;
      if (e.stunTimer <= 0) e.state = PIG_STATES.APPROACH;
      break;
    }
    case PIG_STATES.SLAM_TELEGRAPH: {
      e.stateTimer -= dt;
      e.facingRight = player.x > e.x;
      // Boss body tremor (±2px)
      e.slamJumpOffset = (Math.sin(Date.now() / 30) * 2);
      if (e.stateTimer <= 0) {
        e.state = PIG_STATES.SLAM_JUMP;
        e.stateTimer = 0.15;
        e.slamJumpOffset = 0;
      }
      break;
    }
    case PIG_STATES.SLAM_JUMP: {
      e.stateTimer -= dt;
      const t = 1 - (e.stateTimer / 0.15);
      e.slamJumpOffset = -CONFIG.bossSlam.jumpHeight * t;
      if (e.stateTimer <= 0) {
        e.state = PIG_STATES.SLAM_FALL;
        e.stateTimer = 0.1;
      }
      break;
    }
    case PIG_STATES.SLAM_FALL: {
      e.stateTimer -= dt;
      const t = 1 - (e.stateTimer / 0.1);
      e.slamJumpOffset = -CONFIG.bossSlam.jumpHeight * (1 - t);
      if (e.stateTimer <= 0) {
        // Landing impact
        e.slamJumpOffset = 0;
        const slamCfg = CONFIG.bossSlam;
        // Shockwave damage check
        const pdx = player.x - e.x;
        const pdy = (player.y + CONFIG.player.size.height / 2) - (e.slamBaseY + cfg.size.height / 2);
        const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
        if (pdist < slamCfg.shockwaveRadius) {
          const knockDir = pdx === 0 ? 1 : (pdx > 0 ? 1 : -1);
          damagePlayer(slamCfg.shockwaveDamage, knockDir, 'slam');
        }
        // Effects
        triggerHitstop(6);
        triggerShake(10);
        // Shockwave ring effect
        e.slamShockwaveEffect = { timer: 0.3, maxTime: 0.3, x: e.x, y: e.slamBaseY + cfg.size.height / 2, radius: slamCfg.shockwaveRadius };
        // Recovery
        const slamRecovery = e.phase2 ? CONFIG.bossPhase2.slamRecoveryTime : slamCfg.recoveryTime;
        e.state = PIG_STATES.SLAM_RECOVERY;
        e.stateTimer = slamRecovery;
      }
      break;
    }
    case PIG_STATES.SLAM_RECOVERY: {
      e.stateTimer -= dt;
      if (e.stateTimer <= 0) {
        e.state = PIG_STATES.APPROACH;
      }
      break;
    }
    case PIG_STATES.PHASE_TRANSITION: {
      e.phaseTransitionTimer -= dt;
      e.phaseFlashTimer += dt;
      if (e.phaseTransitionTimer <= 0) {
        e.state = PIG_STATES.APPROACH;
      }
      break;
    }
    case PIG_STATES.DYING: {
      e.dyingTimer -= dt;
      e.alpha = Math.max(0, e.dyingTimer / 0.4);
      e.scale = 0.5 + 0.5 * (e.dyingTimer / 0.4);
      if (e.dyingTimer <= 0) e.remove = true;
      break;
    }
  }

  // Update slam shockwave effect
  if (e.slamShockwaveEffect) {
    e.slamShockwaveEffect.timer -= dt;
    if (e.slamShockwaveEffect.timer <= 0) e.slamShockwaveEffect = null;
  }
}

// ============================================================
// ENEMY (VEG)
// ============================================================
const VEG_STATES = { IDLE: 0, FLEE: 1, CORNERED: 2, TELEGRAPH: 3, ATTACK: 4, RECOVER: 5, STAGGER: 6, DYING: 7, REPOSITION: 8 };

function createVeg(x, y) {
  return {
    id: enemyIdCounter++,
    type: 'veg',
    x, y,
    hp: CONFIG.enemy_veg.hp,
    state: VEG_STATES.IDLE,
    stateTimer: 0,
    facingRight: Math.random() > 0.5,
    flashTimer: 0,
    squashTimer: 0, squashPhase: 0,
    hitScaleX: 1, hitScaleY: 1,
    knockbackVelX: 0,
    dyingTimer: 0,
    alpha: 1, scale: 1,
    dyingVY: 0, // upward velocity for death pop
    telegraphScale: 1,
    energyBallRadius: 0,
    firedProjectile: false,
    attackCooldown: 0,
    repositionDirX: 0,
    repositionDirY: 0,
    aggroed: false,
    chaseGiveUpTimer: 0,
    bouncePhase: Math.random() * Math.PI * 2,
  };
}

function updateVeg(e, dt) {
  const cfg = CONFIG.enemy_veg;
  if (e.flashTimer > 0) e.flashTimer -= dt;

  // Knockback deceleration
  if (Math.abs(e.knockbackVelX) > 0) {
    e.x += e.knockbackVelX * dt;
    e.knockbackVelX *= 0.85;
    if (Math.abs(e.knockbackVelX) < 10) e.knockbackVelX = 0;
    e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
  }

  // Squash & stretch animation
  if (e.squashPhase > 0) {
    e.squashTimer -= dt;
    if (e.squashPhase === 1) {
      e.hitScaleX = 1.3; e.hitScaleY = 0.7;
      if (e.squashTimer <= 0) { e.squashPhase = 2; e.squashTimer = 3 / 60; }
    } else if (e.squashPhase === 2) {
      const t = e.squashTimer / (3 / 60);
      e.hitScaleX = 0.85 + (1.0 - 0.85) * (1 - t);
      e.hitScaleY = 1.15 + (1.0 - 1.15) * (1 - t);
      if (e.squashTimer <= 0) { e.squashPhase = 3; e.squashTimer = 3 / 60; }
    } else if (e.squashPhase === 3) {
      const t = e.squashTimer / (3 / 60);
      e.hitScaleX = lerp(1.0, e.hitScaleX, t);
      e.hitScaleY = lerp(1.0, e.hitScaleY, t);
      if (e.squashTimer <= 0) { e.squashPhase = 0; e.hitScaleX = 1; e.hitScaleY = 1; }
    }
  }

  const dx = player.x - e.x, dy = player.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  switch (e.state) {
    case VEG_STATES.IDLE: {
      e.telegraphScale = 1;
      e.energyBallRadius = 0;
      e.facingRight = player.x > e.x;
      if (e.attackCooldown > 0) e.attackCooldown -= dt;
      if (!player.dead) {
        const detectR = cfg.detectRange || cfg.attackRange;
        const chaseR = cfg.chaseRange || detectR * 1.5;
        if (!e.aggroed && dist < detectR) { e.aggroed = true; e.chaseGiveUpTimer = 0; }
        if (e.aggroed && dist > chaseR) {
          e.chaseGiveUpTimer += dt;
          if (e.chaseGiveUpTimer >= (cfg.chaseGiveUpDelay || 1.5)) {
            e.aggroed = false; e.chaseGiveUpTimer = 0; break;
          }
        } else if (e.aggroed) {
          e.chaseGiveUpTimer = 0;
        }
        if (e.aggroed) {
          if (dist < cfg.fleeDistance) { e.state = VEG_STATES.FLEE; break; }
          if (dist < cfg.attackRange && e.attackCooldown <= 0) {
            e.state = VEG_STATES.TELEGRAPH;
            e.stateTimer = cfg.telegraphTime;
            break;
          }
        }
      }
      break;
    }
    case VEG_STATES.FLEE: {
      // Run away from player — return to IDLE when far enough, but stay aggroed
      if (dist > cfg.fleeDistance && !player.dead) { e.state = VEG_STATES.IDLE; break; }
      const flee = dist > 0 ? { x: -dx / dist, y: -dy / dist } : { x: e.facingRight ? 1 : -1, y: 0 };
      e.x += flee.x * cfg.fleeSpeed * dt;
      e.y += flee.y * cfg.fleeSpeed * dt;
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      e.facingRight = flee.x > 0;

      // Check if cornered (hit wall)
      const atWallX = e.x <= cfg.size.width / 2 + 1 || e.x >= currentRoomWidth - cfg.size.width / 2 - 1;
      const atWallY = e.y <= CONFIG.room.groundY + 1 || e.y >= CONFIG.room.groundBottom - cfg.size.height - 1;
      if (atWallX || atWallY) {
        e.state = VEG_STATES.CORNERED;
        e.stateTimer = 0.5;
      }
      break;
    }
    case VEG_STATES.CORNERED: {
      e.stateTimer -= dt;
      e.facingRight = player.x > e.x;
      // Player moved away — return to IDLE but stay aggroed
      if (dist > cfg.fleeDistance && !player.dead) { e.state = VEG_STATES.IDLE; break; }
      if (e.stateTimer <= 0) {
        // Forced counterattack
        e.state = VEG_STATES.TELEGRAPH;
        e.stateTimer = cfg.telegraphTime;
      }
      break;
    }
    case VEG_STATES.TELEGRAPH: {
      e.stateTimer -= dt;
      e.facingRight = player.x > e.x;
      // Inflate visual
      const progress = 1 - e.stateTimer / cfg.telegraphTime;
      e.telegraphScale = 1.0 + 0.3 * progress;
      e.energyBallRadius = 12 * progress;
      if (e.stateTimer <= 0) {
        e.state = VEG_STATES.ATTACK;
        e.firedProjectile = false;
        e.telegraphScale = 1;
        e.energyBallRadius = 0;
      }
      break;
    }
    case VEG_STATES.ATTACK: {
      if (!e.firedProjectile) {
        e.firedProjectile = true;
        const pdx = player.x - e.x, pdy = (player.y + CONFIG.player.size.height / 2) - (e.y + cfg.size.height / 2);
        const pdist = Math.sqrt(pdx * pdx + pdy * pdy) || 1;
        projectiles.push({
          x: e.x, y: e.y + cfg.size.height / 2,
          vx: (pdx / pdist) * cfg.projectileSpeed,
          vy: (pdy / pdist) * cfg.projectileSpeed,
          damage: cfg.projectileDamage,
          size: cfg.projectileSize,
          lifetime: 3.0, age: 0, owner: 'enemy',
          trail: [],
        });
      }
      e.state = VEG_STATES.RECOVER;
      e.stateTimer = cfg.postAttackDelay;
      break;
    }
    case VEG_STATES.RECOVER: {
      e.stateTimer -= dt;
      e.facingRight = player.x > e.x;
      if (e.stateTimer <= 0) {
        e.attackCooldown = 2.0;
        if (dist < cfg.fleeDistance) {
          e.state = VEG_STATES.FLEE;
        } else {
          e.state = VEG_STATES.REPOSITION;
          e.stateTimer = 1.5;
          const rdx = e.x - player.x;
          const rdy = e.y - player.y;
          const rdist = Math.sqrt(rdx * rdx + rdy * rdy) || 1;
          const randomAngle = (Math.random() - 0.5) * 1.2;
          const cos = Math.cos(randomAngle), sin = Math.sin(randomAngle);
          e.repositionDirX = (rdx / rdist * cos - rdy / rdist * sin);
          e.repositionDirY = (rdx / rdist * sin + rdy / rdist * cos);
        }
      }
      break;
    }
    case VEG_STATES.REPOSITION: {
      e.stateTimer -= dt;
      e.x += e.repositionDirX * cfg.fleeSpeed * 0.7 * dt;
      e.y += e.repositionDirY * cfg.fleeSpeed * 0.7 * dt;
      e.x = clamp(e.x, 50, currentRoomWidth - 50);
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      if (dist < cfg.fleeDistance) { e.state = VEG_STATES.FLEE; break; }
      if (e.stateTimer <= 0) e.state = VEG_STATES.IDLE;
      break;
    }
    case VEG_STATES.STAGGER: {
      e.stateTimer -= dt;
      if (e.stateTimer <= 0) e.state = VEG_STATES.FLEE;
      break;
    }
    case VEG_STATES.DYING: {
      e.dyingTimer -= dt;
      e.alpha = Math.max(0, e.dyingTimer / 0.3);
      e.scale = 0.5 + 0.5 * (e.dyingTimer / 0.3);
      e.y += e.dyingVY * dt;
      e.dyingVY += 600 * dt; // gravity
      if (e.dyingTimer <= 0) e.remove = true;
      break;
    }
  }
}

  const dx = player.x - e.x, dy = player.y - e.y;

      if (e.wanderTimer <= 0) {
        e.wanderDirX = (Math.random() - 0.5) * 2;
        e.wanderDirY = (Math.random() - 0.5) * 2;
        e.wanderTimer = cfg.wanderChangeInterval;
      }
      const len = Math.sqrt(e.wanderDirX * e.wanderDirX + e.wanderDirY * e.wanderDirY) || 1;
      e.x += (e.wanderDirX / len) * cfg.wanderSpeed * dt;
      e.y += (e.wanderDirY / len) * cfg.wanderSpeed * dt;
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      e.facingRight = e.wanderDirX > 0;
      // Bounce off edges
      if (e.x <= cfg.size.width / 2 || e.x >= currentRoomWidth - cfg.size.width / 2) e.wanderDirX *= -1;
      if (e.y <= CONFIG.room.groundY || e.y >= CONFIG.room.groundBottom - cfg.size.height) e.wanderDirY *= -1;

      if (!player.dead && dist < cfg.fleeRange) {
        e.state = SEASONING_STATES.FLEE;
        e.counterProximityTimer = 0;
      }
      break;
    }

    case SEASONING_STATES.FLEE: {
      // Flee away from player
      if (dist > 0) {
        const fleeX = -dx / dist, fleeY = -dy / dist;
        e.x += fleeX * cfg.fleeSpeed * dt;
        e.y += fleeY * cfg.fleeSpeed * dt;
        e.facingRight = fleeX > 0;
      }
      // Wall slide: clamp and adjust
      e.x = clamp(e.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      e.y = clamp(e.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);

      if (player.dead || dist > cfg.fleeRange) {
        e.state = SEASONING_STATES.WANDER;
        e.wanderTimer = cfg.wanderChangeInterval;
        e.counterProximityTimer = 0;
        break;
      }

      // Counter check: if player stays within counterRange
      if (dist <= cfg.counterRange && e.counterCooldownTimer <= 0) {
        e.counterProximityTimer += dt;
        if (e.counterProximityTimer >= cfg.counterChargeTime) {
          e.state = SEASONING_STATES.CORNERED_CHARGE;
          e.stateTimer = cfg.counterTelegraph;
          e.counterProximityTimer = 0;
        }
      } else {
        e.counterProximityTimer = 0;
      }
      break;
    }

    case SEASONING_STATES.CORNERED_CHARGE: {
      // Telegraph: orange blink, no movement
      e.stateTimer -= dt;
      if (e.stateTimer <= 0) {
        e.state = SEASONING_STATES.COUNTER_ATTACK;
      }
      break;
    }

    case SEASONING_STATES.COUNTER_ATTACK: {
      // One-time counter attack
      if (dist <= 40) {
        // Hit player
        if (player.invincibleTimer <= 0 && player.dashInvincibleTimer <= 0 &&
            !(player.finishActive && player.finishPhase <= 2)) {
          damagePlayer(cfg.damage, dx < 0 ? -1 : 1, 'melee');
          triggerShake(1.5);
        }
      }
      // Scale burst effect
      e.counterScaleTimer = 0.15;
      e.state = SEASONING_STATES.COUNTER_RECOVER;
      e.stateTimer = 0.3;
      e.counterCooldownTimer = cfg.counterCooldown;
      break;
    }

    case SEASONING_STATES.COUNTER_RECOVER: {
      e.stateTimer -= dt;
      if (e.counterScaleTimer > 0) e.counterScaleTimer -= dt;
      if (e.stateTimer <= 0) {
        e.state = SEASONING_STATES.FLEE;
        e.counterProximityTimer = 0;
      }
      break;
    }

    case SEASONING_STATES.DYING: {
      e.dyingTimer -= dt;
      e.alpha = Math.max(0, e.dyingTimer / 0.3);
      e.scale = Math.max(0.1, e.dyingTimer / 0.3);
      if (e.dyingTimer <= 0) e.remove = true;
      break;
    }
  }
}

function getWildcardType(ingredientSlots) {
  let meatCount = 0, vegCount = 0;
  for (const slot of ingredientSlots) {
    if (slot === 'meat') meatCount++;
    if (slot === 'vegetable') vegCount++;
  }
  if (meatCount <= vegCount) return 'meat';
  return 'vegetable';
}

// ============================================================
// PROJECTILES
// ============================================================
let projectiles = [];
let healTexts = [];

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    // Trail
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 3) p.trail.shift();

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.age += dt;
    p.rotation = (p.rotation || 0) + dt * 15; // spin
    spawnProjectileTrail(p.x, p.y);

    // Remove if out of bounds or lifetime exceeded
    if (p.age >= p.lifetime || p.x < -50 || p.x > currentRoomWidth + 50 || p.y < -50 || p.y > CONFIG.room.height + 50) {
      projectiles.splice(i, 1);
      continue;
    }

    // Hit player (circle vs AABB)
    if (p.owner === 'enemy' && !player.dead) {
      const ph = playerHitbox();
      // Circle-AABB collision
      const closestX = clamp(p.x, ph.x, ph.x + ph.w);
      const closestY = clamp(p.y, ph.y, ph.y + ph.h);
      const cdx = p.x - closestX, cdy = p.y - closestY;
      if (cdx * cdx + cdy * cdy <= p.size * p.size) {
        // Player invincible or dashing: projectile passes through
        if (player.invincibleTimer <= 0 && player.dashInvincibleTimer <= 0 && !(player.finishActive && player.finishPhase <= 2)) {
          damagePlayer(p.damage, p.vx > 0 ? 1 : -1, 'projectile');
          triggerShake(2);
          projectiles.splice(i, 1);
          continue;
        }
      }
    }
  }
}

function damageEnemy(e, dmg, knockDirX, knockDist, hitstopLevel) {
  const dyingState = e.type === 'veg' ? VEG_STATES.DYING
    : e.type === 'seasoning' ? SEASONING_STATES.DYING : PIG_STATES.DYING;
  const stunState = e.type === 'veg' ? VEG_STATES.STAGGER
    : e.type === 'seasoning' ? SEASONING_STATES.FLEE : PIG_STATES.HIT_STUN;
  if (e.state === dyingState) return;

  // Veg telegraph cancel: if hit during telegraph, cancel to stagger
  const wasTelegraph = e.type === 'veg' && e.state === VEG_STATES.TELEGRAPH;

  e.hp -= dmg;
  if (e.isBoss) { bossHpGhostDelay = 0.3; } // delay ghost HP bar shrink
  // Boss phase 2 transition check
  if (e.isBoss && !e.phase2 && e.hp > 0 && e.hp <= CONFIG.enemy_boss.hp * CONFIG.bossPhase2.hpThreshold) {
    e.phase2 = true;
    e.state = PIG_STATES.PHASE_TRANSITION;
    e.phaseTransitionTimer = CONFIG.bossPhase2.transitionPauseTime;
    e.phaseFlashTimer = 0;
    triggerShake(8);
    screenFlashTimer = 0.3;
  }
  e.flashTimer = hitstopLevel === 'enhance' ? 2 / 60 : CONFIG.gameFeel.flashDuration / 60;

  // Knockback with deceleration curve (boss resists knockback)
  if (e.isBoss && CONFIG.enemy_boss.knockbackResist) {
    e.knockbackVelX = 0;
  } else {
    e.knockbackVelX = knockDirX * knockDist * 8;
  }

  // Squash & stretch trigger
  e.squashPhase = 1;
  e.squashTimer = 2 / 60;

  // Hit effect particles
  const cfg = e.type === 'veg' ? CONFIG.enemy_veg
    : e.type === 'seasoning' ? CONFIG.enemy_seasoning
    : (e.isBoss ? CONFIG.enemy_boss : CONFIG.enemy_pig);
  spawnHitEffect(e.x + knockDirX * cfg.size.width * 0.3, e.y + cfg.size.height * 0.3, '#FFF', hitstopLevel === 'enhance');

  if (hitstopLevel === 'enhance') {
    // Enhance hit: charge finish gauge, small shake, no hitstop
    player.finishGauge = Math.min(CONFIG.finish.gaugeMax, player.finishGauge + CONFIG.finish.chargePerEnhancedHit);
    triggerShake(2);
  } else {
    // Normal hit: combo counter + game feel (no gauge charging)
    player.comboCount++;
    player.comboTimer = 0;

    const hf = hitstopLevel === 'heavy' ? CONFIG.gameFeel.hitstop.heavy : CONFIG.gameFeel.hitstop.light;
    const sm = hitstopLevel === 'heavy' ? CONFIG.gameFeel.screenShake.heavy : CONFIG.gameFeel.screenShake.light;
    triggerHitstop(hf);
    triggerShake(sm);
  }

  if (e.hp <= 0) {
    e.state = dyingState;
    sfxEnemyDeath();
    spawnComicText(e.x, e.y, 'DONE!', '#ffffff', 16);
    if (e.type === 'veg') {
      e.dyingTimer = 0.3;
      e.dyingVY = -200;
    } else if (e.type === 'seasoning') {
      e.dyingTimer = 0.3;
    } else if (e.isBoss) {
      e.dyingTimer = 0.8;
    } else {
      e.dyingTimer = 0.4;
    }
    // Death burst particles
    spawnDeathEffect(e.x, e.y + cfg.size.height / 2, getEnemyOrbColor(e));
    // Kill: spawn 3 large essence orbs with trajectory spread
    const killOrbColor = getEnemyOrbColor(e);
    for (let oi = 0; oi < 3; oi++) {
      const ox = (Math.random() - 0.5) * 30;
      const oy = (Math.random() - 0.5) * 30;
      spawnEssenceOrb(e.x, e.y, killOrbColor, 10, ox, oy);
    }
    if (e.isBoss) {
      gameCleared = true;
      clearBossMinions();
      sfxRoomClear();
      allClearSlowmoTimer = 0.5;
      allClearPopScale = 0;
      gameTimeScale = 0.3;
    }
    // HP recovery on kill
    if (!e.isBoss) {
      const healAmount = e.type === 'veg' ? CONFIG.recovery.vegHeal
        : e.type === 'seasoning' ? CONFIG.recovery.seasoningHeal : CONFIG.recovery.pigHeal;
      if (healAmount > 0) {
        player.hp = Math.min(CONFIG.player.maxHp, player.hp + healAmount);
        healTexts.push({ x: player.x, y: player.y - 20, text: `+${healAmount}`, timer: 0.5 });
      }
    }
    // Ingredient slot filling on kill (enhance/finish mode skips — bonus applied on exit)
    if (player.state === 'normal' && player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
      if (e.type === 'seasoning') {
        // Seasoning kill: chargeOnKill_seasoning (1.5 slots)
        const killCharge = CONFIG.ingredientList.chargeOnKill_seasoning || 1;
        let remaining = killCharge;
        while (remaining >= 1 && player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
          const wildcardType = getWildcardType(player.ingredientSlots);
          player.ingredientSlots.push(wildcardType);
          player.ingredientPopIndex = player.ingredientSlots.length - 1;
          player.ingredientPopTimer = 0.15;
          sfxIngredientGain();
          remaining -= 1;
        }
        // Leftover fractional charge
        if (remaining > 0 && player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
          player.ingredientPartialCharge = (player.ingredientPartialCharge || 0) + remaining;
          if (player.ingredientPartialCharge >= 1.0) {
            player.ingredientPartialCharge -= 1.0;
            const autoType = getWildcardType(player.ingredientSlots);
            player.ingredientSlots.push(autoType);
            player.ingredientPopIndex = player.ingredientSlots.length - 1;
            player.ingredientPopTimer = 0.15;
          }
        }
        player.ingredientWildcardFlash = 0.15;
      } else {
        // Pig/veg/boss: 1 slot
        const enemyType = e.isBoss ? 'boss' : (e.type === 'veg' ? 'vegetable' : 'pig');
        const ingredientType = CONFIG.ingredientList.types[enemyType];
        player.ingredientSlots.push(ingredientType);
        player.ingredientPopIndex = player.ingredientSlots.length - 1;
        player.ingredientPopTimer = 0.15;
        sfxIngredientGain();
      }
      if (player.ingredientSlots.length >= CONFIG.ingredientList.maxSlots) {
        player.ingredientFullFlash = 0.1;
        player.ingredientPartialCharge = 0;
      }
    }
    // Track kills during enhance mode
    if (player.state === 'enhance' || player.finishActive) {
      player.enhanceKillCount++;
    }
  } else {
    if (e.type === 'seasoning') {
      // Seasoning stun: brief hitstun then flee
      e.state = SEASONING_STATES.FLEE;
      e.counterProximityTimer = 0;
    } else if (e.type === 'veg') {
      e.state = VEG_STATES.STAGGER;
      e.stateTimer = 0.3;
      e.telegraphScale = 1;
      e.energyBallRadius = 0;
    } else {
      e.state = PIG_STATES.HIT_STUN;
      e.stunTimer = 0.2;
    }
  }
}

// ============================================================
// HIT DETECTION
// ============================================================
function getEnemyHitbox(e) {
  const cfg = e.type === 'veg' ? CONFIG.enemy_veg
    : e.type === 'seasoning' ? CONFIG.enemy_seasoning
    : (e.isBoss ? CONFIG.enemy_boss : CONFIG.enemy_pig);
  return { x: e.x - cfg.size.width / 2, y: e.y, w: cfg.size.width, h: cfg.size.height };
}

function isEnemyDying(e) {
  if (e.type === 'veg') return e.state === VEG_STATES.DYING;
  if (e.type === 'seasoning') return e.state === SEASONING_STATES.DYING;
  return e.state === PIG_STATES.DYING;
}

function getEnemyKnockback(e, step) {
  if (e.type === 'veg') return CONFIG.enemy_veg.knockback;
  if (e.type === 'seasoning') return CONFIG.enemy_seasoning.counterKnockback;
  return CONFIG.combo.knockback[step];
}

function checkPlayerAttackHits() {
  // Normal attack
  if (player.state === 'normal' && player.isAttacking && player.attackHitbox) {
    const step = player.comboStep;
    const combo = CONFIG.combo;
    for (const e of enemies) {
      if (isEnemyDying(e)) continue;
      if (player.attackHitEnemies.has(e.id)) continue;
      const ehb = getEnemyHitbox(e);
      if (aabbOverlap(player.attackHitbox, ehb)) {
        player.attackHitEnemies.add(e.id);
        const knockDir = player.facingRight ? 1 : -1;
        const hitstopLevel = step === 2 ? 'heavy' : 'light';
        const kb = getEnemyKnockback(e, step);
        const dmg = Math.round(combo.damage[step] * player.steakBuff.damageMult);
        damageEnemy(e, dmg, knockDir, kb, hitstopLevel);
        if (step === 2) sfxHook(); else sfxJab();
        // Comic effects
        const hitX = e.x, hitY = e.y;
        spawnDamageNumber(hitX, hitY, dmg, false);
        spawnComicHitEffect(hitX, hitY + 20, 15, 'star');
        if (step === 2) {
          const hookTexts = ['POW!', 'SMACK!'];
          spawnComicText(hitX, hitY - 10, hookTexts[Math.floor(Math.random() * hookTexts.length)], '#ffdd44', 20);
        } else {
          const jabTexts = ['WHACK!', 'TAP!', 'CHOP!'];
          spawnComicText(hitX, hitY - 10, jabTexts[Math.floor(Math.random() * jabTexts.length)], '#ffffff', 14);
        }
        // Essence orb on normal hit
        const orbColor = getEnemyOrbColor(e);
        spawnEssenceOrb(e.x, e.y, orbColor, 6, 0, 0);
        // Partial charge per hit (differential by enemy type + combo bonus)
        if (player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
          let hitCharge = CONFIG.ingredientList['chargePerHit_' + e.type] || CONFIG.ingredientList.chargePerHit;
          const cTiers = CONFIG.ingredientList.comboChargeBonus.tiers;
          let cMult = 1.0;
          for (const tier of cTiers) { if (player.comboCount >= tier.threshold) cMult = tier.multiplier; }
          hitCharge *= cMult;
          player.ingredientPartialCharge = (player.ingredientPartialCharge || 0) + hitCharge;
          if (player.ingredientPartialCharge >= 1.0) {
            player.ingredientPartialCharge -= 1.0;
            // Auto-fill one slot based on enemy type
            const autoType = e.type === 'veg' ? 'vegetable' : e.type === 'seasoning' ? getWildcardType(player.ingredientSlots) : 'meat';
            player.ingredientSlots.push(autoType);
            player.ingredientPopIndex = player.ingredientSlots.length - 1;
            player.ingredientPopTimer = 0.15;
            if (player.ingredientSlots.length >= CONFIG.ingredientList.maxSlots) {
              player.ingredientFullFlash = 0.1;
              player.ingredientPartialCharge = 0;
            }
          }
        }
      }
    }
  }

  // Enhance attack
  if (player.state === 'enhance' && player.enhanceAttackHitbox) {
    const enh = CONFIG.enhance;
    for (const e of enemies) {
      if (isEnemyDying(e)) continue;
      if (player.enhanceAttackHitEnemies.has(e.id)) continue;
      const ehb = getEnemyHitbox(e);
      if (aabbOverlap(player.enhanceAttackHitbox, ehb)) {
        player.enhanceAttackHitEnemies.add(e.id);
        const knockDir = player.facingRight ? 1 : -1;
        const ekb = e.type === 'veg' ? CONFIG.enemy_veg.knockback : enh.knockback;
        const enhDmg = Math.round(enh.attackDamage * player.steakBuff.damageMult);
        damageEnemy(e, enhDmg, knockDir, ekb, 'enhance');
        sfxEnhanceHit();
        spawnDamageNumber(e.x, e.y, enhDmg, true);
        spawnComicHitEffect(e.x, e.y + 20, 12, 'star');
        const enhTexts = ['SIZZLE!', 'CHOP!'];
        spawnComicText(e.x, e.y - 10, enhTexts[Math.floor(Math.random() * enhTexts.length)], '#ff8844', 16);
        // Essence orb on enhance hit
        spawnEssenceOrb(e.x, e.y, getEnemyOrbColor(e), 6, 0, 0);
      }
    }
  }

}

// ============================================================
// ROOM & SPAWN
// ============================================================
let killCount = 0;
let gameOver = false;
let currentRoom = 1;
let currentRoomWidth = CONFIG.room.width;
let roomCleared = false;
let roomTransitioning = false;
let roomTransitionTimer = 0;
let roomTransitionDir = '';
let gameCleared = false;
let waveSpawnedTotal = 0;
let waveSpawnTimer = 0;
let waveStartTimer = 0;
let roomTitleTimer = 0;   // room title pop-in timer
let roomPopupTimer = 0;
let roomPopupText = '';
// Boss room minion spawner
let minionSpawnTimer = 0;
let minionInitialTimer = 0;
let minionInitialCount = 0;
let minionNextIsPig = true;
let seasoningSpawnTimer = 0;
let staleEnemyTimer = 0; // tracks time with maxOnScreen enemies alive

// Boss entrance animation
let bossEntrance = {
  active: false,
  phase: 0, // 0=darken, 1=drop, 2=land, 3=fadeout, 4=hpSlide
  timer: 0,
  overlayAlpha: 0,
  bossTargetY: 0,
  bossStartY: -100,
  hpBarSlide: 0, // 0→1 slide progress
};
// Boss HP bar (screen-space)
let bossHpGhost = 1.0; // white ghost ratio (delayed HP display)
let bossHpGhostDelay = 0; // delay timer before ghost shrinks

function getRoomConfig(roomNum) {
  if (roomNum === 1) return CONFIG.rooms.room1;
  if (roomNum === 2) return CONFIG.rooms.room2;
  if (roomNum === 3) return CONFIG.rooms.room3;
}

function initRoom(roomNum) {
  currentRoom = roomNum;
  currentRoomWidth = (roomNum === 3) ? CONFIG.bossRoom.roomWidth : CONFIG.room.width;
  roomCleared = false;
  roomTransitioning = false;
  enemies = [];
  projectiles = [];
  healTexts = [];
  waveSpawnedTotal = 0;
  waveSpawnTimer = 0;
  waveStartTimer = 1.0;
  roomTitleTimer = 2.3; // 0.3s pop-in + 2s hold
  roomPopupTimer = 2.0;
  if (roomNum === 1) roomPopupText = '방 1 — 고기를 사냥하라!';
  else if (roomNum === 2) roomPopupText = '방 2 — 채소를 수확하라!';
  else if (roomNum === 3) roomPopupText = 'BOSS — 조리 도구를 쓰러뜨려라!';

  if (roomNum === 1) {
    player.x = 150;
    player.y = CONFIG.room.groundY + 80;
  } else {
    const prevExit = getRoomConfig(roomNum - 1).exitDirection;
    if (prevExit === 'right') {
      player.x = 80;
      player.y = CONFIG.room.groundY + 80;
    } else if (prevExit === 'up') {
      player.x = currentRoomWidth / 2;
      player.y = CONFIG.room.groundBottom - CONFIG.player.size.height - 10;
    } else if (prevExit === 'left') {
      player.x = currentRoomWidth - 80;
      player.y = CONFIG.room.groundY + 80;
    }
  }

  player.facingRight = true;
  camera.x = 0;
  camera.y = 0;

  // Spawn seasoning monsters for rooms 1 & 2
  const rc = getRoomConfig(roomNum);
  if (rc.seasoningCount) {
    for (let i = 0; i < rc.seasoningCount; i++) {
      const sx = 200 + Math.random() * (currentRoomWidth - 400);
      const sy = CONFIG.room.groundY + Math.random() * (CONFIG.room.groundBottom - CONFIG.room.groundY - CONFIG.enemy_seasoning.size.height);
      enemies.push(createSeasoning(sx, sy));
    }
  }

  if (roomNum === 3) {
    playBGM(bgmBoss);
    spawnBoss();
    minionInitialTimer = CONFIG.bossRoom.minionInitialDelay;
    minionInitialCount = 0;
    minionSpawnTimer = 0;
    minionNextIsPig = true;
    seasoningSpawnTimer = CONFIG.bossRoom.minionInitialDelay + 1.0;
  }
}

function spawnBoss() {
  const bossTargetY = CONFIG.room.groundY + 40;
  const boss = createPig(currentRoomWidth / 2, -100); // start above screen
  boss.type = 'boss';
  boss.hp = CONFIG.enemy_boss.hp;
  boss.isBoss = true;
  enemies.push(boss);
  // Trigger entrance animation
  bossEntrance.active = true;
  bossEntrance.phase = 0;
  bossEntrance.timer = 0.5; // darken phase
  bossEntrance.overlayAlpha = 0;
  bossEntrance.bossTargetY = bossTargetY;
  bossEntrance.bossStartY = -100;
  bossEntrance.hpBarSlide = 0;
  bossHpGhost = 1.0;
  bossHpGhostDelay = 0;
}

function updateBossEntrance(dt) {
  updateBossHpGhost(dt);
  if (!bossEntrance.active) return;
  const be = bossEntrance;
  const boss = enemies.find(e => e.isBoss);

  if (be.phase === 0) {
    // Darken phase: overlay fades in over 0.5s
    be.overlayAlpha = Math.min(0.4, be.overlayAlpha + dt * 0.8);
    be.timer -= dt;
    if (be.timer <= 0) { be.phase = 1; be.timer = 0.3; }
  } else if (be.phase === 1) {
    // Drop phase: boss falls from above (easeIn)
    const t = 1 - be.timer / 0.3;
    const eased = t * t; // easeIn quadratic
    if (boss) {
      boss.y = be.bossStartY + (be.bossTargetY - be.bossStartY) * eased;
    }
    be.timer -= dt;
    if (be.timer <= 0) {
      if (boss) boss.y = be.bossTargetY;
      be.phase = 2; be.timer = 0.15;
      // Landing impact: screen shake + squash
      shakeTimer = 0.3; shakeIntensity = 10;
      if (boss) { boss.animScaleX = 1.4; boss.animScaleY = 0.6; }
      // Landing particles
      for (let i = 0; i < 8; i++) {
        const cfg = CONFIG.enemy_boss.size || CONFIG.enemy_pig.size;
        spawnParticle({
          x: boss ? boss.x : currentRoomWidth / 2,
          y: be.bossTargetY + (cfg ? cfg.height : 80),
          vx: (Math.random() - 0.5) * 120, vy: -20 - Math.random() * 40,
          size: 4, sizeEnd: 0, life: 0.4, color: '#8B6914',
          alpha: 0.8, alphaEnd: 0, shape: 'circle', ay: 200,
        });
      }
    }
  } else if (be.phase === 2) {
    // Rebound: squash → stretch
    const t = 1 - be.timer / 0.15;
    if (boss) {
      boss.animScaleX = 1.4 + (0.9 - 1.4) * t;
      boss.animScaleY = 0.6 + (1.1 - 0.6) * t;
    }
    be.timer -= dt;
    if (be.timer <= 0) {
      if (boss) { boss.animScaleX = 1; boss.animScaleY = 1; }
      be.phase = 3; be.timer = 0.3;
    }
  } else if (be.phase === 3) {
    // Overlay fadeout
    be.overlayAlpha = Math.max(0, be.overlayAlpha - dt * 1.4);
    be.timer -= dt;
    if (be.timer <= 0) { be.phase = 4; be.timer = 0.5; }
  } else if (be.phase === 4) {
    // HP bar slide in
    be.hpBarSlide = Math.min(1, be.hpBarSlide + dt * 2);
    be.timer -= dt;
    if (be.timer <= 0) { be.active = false; }
  }

  // Always update boss HP ghost (even after entrance ends)
  updateBossHpGhost(dt);
}

function updateBossHpGhost(dt) {
  const bossAlive = enemies.find(e => e.isBoss && !e.remove);
  if (bossAlive) {
    const hpRatio = bossAlive.hp / CONFIG.enemy_boss.hp;
    if (hpRatio < bossHpGhost) {
      if (bossHpGhostDelay > 0) {
        bossHpGhostDelay -= dt;
      } else {
        bossHpGhost = Math.max(hpRatio, bossHpGhost - dt * 1.5);
      }
    }
  }
}

function updateBossRoomMinions(dt) {
  if (currentRoom !== 3 || gameCleared || gameOver || roomTransitioning) return;
  const brc = CONFIG.bossRoom;

  // Initial delay
  if (minionInitialTimer > 0) {
    minionInitialTimer -= dt;
    seasoningSpawnTimer -= dt;
    return;
  }

  // Count alive non-boss, non-seasoning enemies
  const aliveMinions = enemies.filter(e => !e.isBoss && e.type !== 'seasoning' && !isEnemyDying(e) && !e.remove).length;

  // Initial batch: spawn up to 3 with 1s intervals
  if (minionInitialCount < brc.minionMaxAlive) {
    minionSpawnTimer -= dt;
    if (minionSpawnTimer <= 0 && aliveMinions < brc.minionMaxAlive) {
      spawnBossMinion();
      minionInitialCount++;
      minionSpawnTimer = 1.0;
    }
  } else {
    // Ongoing respawn
    if (aliveMinions < brc.minionMaxAlive) {
      minionSpawnTimer -= dt;
      if (minionSpawnTimer <= 0) {
        spawnBossMinion();
        minionSpawnTimer = brc.minionRespawnDelay;
      }
    } else {
      minionSpawnTimer = brc.minionRespawnDelay;
    }
  }

  // Seasoning spawning in boss room
  const aliveSeasonings = enemies.filter(e => e.type === 'seasoning' && !isEnemyDying(e) && !e.remove).length;
  if (aliveSeasonings < brc.seasoningMaxAlive) {
    seasoningSpawnTimer -= dt;
    if (seasoningSpawnTimer <= 0) {
      // Spawn seasoning at random map position
      const sx = 100 + Math.random() * (currentRoomWidth - 200);
      const sy = CONFIG.room.groundY + Math.random() * (CONFIG.room.groundBottom - CONFIG.room.groundY - CONFIG.enemy_seasoning.size.height);
      enemies.push(createSeasoning(sx, sy));
      seasoningSpawnTimer = brc.seasoningRespawnDelay;
    }
  } else {
    seasoningSpawnTimer = brc.seasoningRespawnDelay;
  }
}

function clearBossMinions() {
  for (const e of enemies) {
    if (!e.isBoss && !isEnemyDying(e) && !e.remove) {
      const dyingState = e.type === 'veg' ? VEG_STATES.DYING
        : e.type === 'seasoning' ? SEASONING_STATES.DYING : PIG_STATES.DYING;
      e.state = dyingState;
      if (e.type === 'veg') { e.dyingTimer = 0.3; e.dyingVY = -200; }
      else if (e.type === 'seasoning') { e.dyingTimer = 0.3; }
      else { e.dyingTimer = 0.4; }
      // No ingredient filling from boss-death minion clear
    }
  }
}

function getBossMinionSpawnPosition(nearBoss) {
  const boss = enemies.find(e => e.isBoss);
  const bossX = boss ? boss.x : currentRoomWidth / 2;
  const bossY = boss ? boss.y : CONFIG.room.groundY + 40;
  if (nearBoss) {
    // Spawn near boss (80~150px)
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 70;
    return {
      x: clamp(bossX + Math.cos(angle) * dist, 50, currentRoomWidth - 50),
      y: clamp(bossY + Math.sin(angle) * dist, CONFIG.room.groundY, CONFIG.room.groundBottom - 50),
    };
  } else {
    // Map random, at least 200px from boss
    let x, y, attempts = 0;
    do {
      x = 50 + Math.random() * (currentRoomWidth - 100);
      y = CONFIG.room.groundY + Math.random() * (CONFIG.room.groundBottom - CONFIG.room.groundY - 50);
      attempts++;
    } while (Math.sqrt((x - bossX) ** 2 + (y - bossY) ** 2) < 200 && attempts < 20);
    return { x, y };
  }
}

function spawnBossMinion() {
  const brc = CONFIG.bossRoom;
  // Initial batch: index 0 near boss, rest random. Respawn: 50% chance near boss.
  const nearBoss = minionInitialCount < brc.minionMaxAlive
    ? minionInitialCount === 0
    : Math.random() < 0.5;
  const pos = getBossMinionSpawnPosition(nearBoss);

  if (minionNextIsPig) {
    const minion = createPig(pos.x, pos.y);
    minion.hp = Math.round(CONFIG.enemy_pig.hp * brc.minionHpMultiplier);
    minion.isMinion = true;
    enemies.push(minion);
  } else {
    const minion = createVeg(pos.x, pos.y);
    minion.hp = Math.round(CONFIG.enemy_veg.hp * brc.minionHpMultiplier);
    minion.isMinion = true;
    enemies.push(minion);
  }
  minionNextIsPig = !minionNextIsPig;
}

function updateWaveSpawner(dt) {
  if (roomCleared || roomTransitioning || gameCleared || gameOver) return;

  const rc = getRoomConfig(currentRoom);
  if (rc.type === 'boss') return;

  if (waveStartTimer > 0) { waveStartTimer -= dt; return; }

  const aliveEnemies = enemies.filter(e => e.type !== 'seasoning' && !isEnemyDying(e) && !e.remove).length;

  if (aliveEnemies < rc.maxOnScreen && waveSpawnedTotal < rc.totalEnemies) {
    waveSpawnTimer -= dt;
    if (waveSpawnTimer <= 0) {
      waveSpawnTimer = rc.spawnInterval;
      spawnWaveEnemy(rc);
      waveSpawnedTotal++;
    }
  }

  const freshAliveEnemies = enemies.filter(e => e.type !== 'seasoning' && !isEnemyDying(e) && !e.remove).length;
  const aliveSeasonings = enemies.filter(e => e.type === 'seasoning' && !isEnemyDying(e) && !e.remove).length;
  if (waveSpawnedTotal >= rc.totalEnemies && freshAliveEnemies === 0 && aliveSeasonings === 0 && !roomCleared) {
    roomCleared = true;
    sfxRoomClear();
    clearPopupTimer = 2.0;
    allClearSlowmoTimer = 0.5;
    allClearPopScale = 0;
    gameTimeScale = 0.3;
  }
}

function spawnWaveEnemy(rc) {
  const aliveVegs = enemies.filter(e =>
    e.type === 'veg' && !isEnemyDying(e) && !e.remove
  ).length;

  let spawnPig;
  if (aliveVegs >= 3) {
    spawnPig = true;
  } else {
    spawnPig = Math.random() < rc.pigRatio;
  }

  const margin = 100;
  let sx, sy;

  if (spawnPig) {
    const side = Math.random() > 0.5 ? 1 : -1;
    sx = side > 0
      ? camera.x + CONFIG.canvas.width + margin
      : camera.x - margin;
    sx = clamp(sx, 50, currentRoomWidth - 50);
    sy = CONFIG.room.groundY + Math.random() * (CONFIG.room.groundBottom - CONFIG.room.groundY - CONFIG.enemy_pig.size.height);
    enemies.push(createPig(sx, sy));
  } else {
    const dist = 300 + Math.random() * 200;
    const angle = Math.random() * Math.PI * 2;
    sx = player.x + Math.cos(angle) * dist;
    sy = player.y + Math.sin(angle) * dist * 0.4;
    sx = clamp(sx, 50, currentRoomWidth - 50);
    sy = clamp(sy, CONFIG.room.groundY, CONFIG.room.groundBottom - CONFIG.enemy_veg.size.height);
    enemies.push(createVeg(sx, sy));
  }
}

// --- EXIT ZONE ---
function getExitZone() {
  const rc = getRoomConfig(currentRoom);
  if (!rc.exitDirection) return null;
  const zoneSize = 80;
  switch (rc.exitDirection) {
    case 'right':
      return { x: currentRoomWidth - zoneSize, y: CONFIG.room.groundY,
               w: zoneSize, h: CONFIG.room.groundBottom - CONFIG.room.groundY };
    case 'left':
      return { x: 0, y: CONFIG.room.groundY,
               w: zoneSize, h: CONFIG.room.groundBottom - CONFIG.room.groundY };
    case 'up':
      return { x: currentRoomWidth / 2 - 100, y: CONFIG.room.groundY - 20,
               w: 200, h: 40 };
  }
}

function checkExitZone() {
  if (!roomCleared || roomTransitioning || gameCleared) return;
  const zone = getExitZone();
  if (!zone) return;
  const ph = playerHitbox();
  if (aabbOverlap(ph, zone)) startRoomTransition();
}

// --- ROOM TRANSITION (Wipe effect) ---
function startRoomTransition() {
  roomTransitioning = true;
  wipePhase = 0; // closing
  wipeTimer = 0;
  wipeProgress = 0;
  const nextRoom = currentRoom + 1;
  wipeBossSpecial = (nextRoom === 3);
  wipeBossColorAlpha = 0;
  roomTransitionDir = getRoomConfig(currentRoom).exitDirection;
}

function updateRoomTransition(dt) {
  if (!roomTransitioning) return;
  wipeTimer += dt;

  const closeTime = 0.4;
  const holdTime = wipeBossSpecial ? 0.8 : 0.3;
  const openTime = 0.4;

  if (wipePhase === 0) {
    // Closing: left to right curtain
    wipeProgress = clamp(wipeTimer / closeTime, 0, 1);
    if (wipeTimer >= closeTime) {
      wipePhase = 1;
      wipeTimer = 0;
      // Load next room while fully covered
      const nextRoom = currentRoom + 1;
      if (nextRoom <= CONFIG.rooms.count) initRoom(nextRoom);
    }
  } else if (wipePhase === 1) {
    // Hold: show room text
    wipeProgress = 1;
    if (wipeBossSpecial) {
      wipeBossColorAlpha = clamp(wipeTimer / 0.3, 0, 1);
    }
    if (wipeTimer >= holdTime) {
      wipePhase = 2;
      wipeTimer = 0;
    }
  } else if (wipePhase === 2) {
    // Opening: right to left curtain
    wipeProgress = 1 - clamp(wipeTimer / openTime, 0, 1);
    if (wipeBossSpecial) {
      wipeBossColorAlpha = 1 - clamp(wipeTimer / 0.5, 0, 1);
    }
    if (wipeTimer >= openTime) {
      roomTransitioning = false;
      wipeProgress = 0;
      wipePhase = 0;
      // Boss room entry shake
      if (wipeBossSpecial) {
        triggerShake(2);
      }
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function renderPlaying() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();

  const camX = camera.x + shakeOffsetX;
  const camY = camera.y + shakeOffsetY;
  // Apply camera zoom (enhance transition)
  if (cameraZoom !== 1.0) {
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(cameraZoom, cameraZoom);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);
  }
  ctx.translate(-camX, -camY);

  // --- Background (parallax) ---
  const isBossRoom = currentRoom === 3;
  drawBackground(ctx, camX, camY, currentRoom);

  // --- Finish shockwave rings (world space) ---
  for (const sw of shockwaves) {
    if (sw.delay > 0) continue; // not started yet
    const t = 1 - sw.timer / sw.duration;
    const r = sw.maxRadius * t;
    const alpha = sw.maxAlpha * (1 - t);
    const lineW = sw.maxLineWidth * (1 - t);
    ctx.strokeStyle = `rgba(${sw.color}, ${alpha})`;
    ctx.lineWidth = Math.max(0.5, lineW);
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // --- Finish landing impact circle ---
  if (player.finishActive && player.finishPhase === 3 && player.finishPhaseTimer > 0.2) {
    const fwd = player.facingRight ? 1 : -1;
    const impactX = player.x + fwd * CONFIG.finish.strikeOffsetX;
    const impactY = player.finishBaseY + CONFIG.player.size.height;
    const alpha = (player.finishPhaseTimer - 0.2) / 0.2;
    const rcp = currentRecipe || CONFIG.finish.recipes.fullCourseBlast;
    const impactRgb = hexToRgb(rcp.color);
    ctx.fillStyle = `rgba(${impactRgb}, ${alpha * 0.4})`;
    ctx.beginPath();
    ctx.arc(impactX, impactY, rcp.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(${impactRgb}, ${alpha * 0.8})`;
    ctx.beginPath();
    ctx.arc(impactX, impactY, rcp.radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  // --- Exit zone (world space) ---
  {
    const zone = getExitZone();
    if (zone) {
      const rc = getRoomConfig(currentRoom);
      if (roomCleared && !roomTransitioning && !gameCleared) {
        // Active exit: pulsing green
        const pulse = 0.2 + 0.15 * Math.sin(Date.now() / 400);
        ctx.fillStyle = `rgba(100, 255, 100, ${pulse})`;
        ctx.fillRect(zone.x, zone.y, zone.w, zone.h);

        const cx = zone.x + zone.w / 2;
        const cy = zone.y + zone.h / 2;
        const bob = Math.sin(Date.now() / 400) * 5;

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';

        switch (rc.exitDirection) {
          case 'right':
            ctx.fillText('→', cx + bob, cy);
            ctx.font = '14px monospace';
            ctx.fillText('이동', cx, cy + 25);
            break;
          case 'left':
            ctx.fillText('←', cx - bob, cy);
            ctx.font = '14px monospace';
            ctx.fillText('이동', cx, cy + 25);
            break;
          case 'up':
            ctx.fillText('↑', cx, cy + bob);
            ctx.font = '14px monospace';
            ctx.fillText('이동', cx, cy + 25);
            break;
        }
      } else if (!roomCleared) {
        // Locked exit: dark overlay + lock icon
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.font = '24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('🔒', zone.x + zone.w / 2, zone.y + zone.h / 2);
      }
    }
  }

  // --- Enemies ---
  for (const e of enemies) {
    if (e.remove) continue;
    const cfg = e.type === 'veg' ? CONFIG.enemy_veg
      : e.type === 'seasoning' ? CONFIG.enemy_seasoning
      : (e.isBoss ? CONFIG.enemy_boss : CONFIG.enemy_pig);
    const isDying = isEnemyDying(e);
    ctx.save();

    if (isDying) {
      ctx.globalAlpha = e.alpha;
      ctx.translate(e.x, e.y + cfg.size.height / 2);
      ctx.scale(e.scale, e.scale);
      ctx.translate(-e.x, -(e.y + cfg.size.height / 2));
    } else if (e.type === 'seasoning' && e.counterScaleTimer > 0) {
      // Counter attack scale burst
      const burst = 1.0 + 0.4 * (e.counterScaleTimer / 0.15);
      ctx.translate(e.x, e.y + cfg.size.height / 2);
      ctx.scale(burst, burst);
      ctx.translate(-e.x, -(e.y + cfg.size.height / 2));
    } else if (e.animScaleX && (e.animScaleX !== 1 || e.animScaleY !== 1)) {
      ctx.translate(e.x, e.y + cfg.size.height);
      ctx.scale(e.animScaleX, e.animScaleY);
      ctx.translate(-e.x, -(e.y + cfg.size.height));
    } else if (e.squashPhase > 0) {
      ctx.translate(e.x, e.y + cfg.size.height);
      ctx.scale(e.hitScaleX, e.hitScaleY);
      ctx.translate(-e.x, -(e.y + cfg.size.height));
    }

    const w = cfg.size.width;
    const h = cfg.size.height;
    const flashW = e.flashTimer > 0;

    // Idle bounce
    const bounceT = Date.now() / 1000 + (e.bouncePhase || 0);
    const idleBounceY = isDying ? 0 : Math.sin(bounceT / 0.8 * Math.PI * 2) * 1.5;

    if (e.type === 'seasoning') {
      // Dust particles when fleeing
      if (e.state === SEASONING_STATES.FLEE && Math.random() < 0.3) {
        spawnParticle({
          x: e.x + (e.facingRight ? -6 : 6), y: e.y + h,
          vx: (Math.random() - 0.5) * 20, vy: -15 - Math.random() * 15,
          size: 2, sizeEnd: 0, life: 0.2, color: '#C8B880', alpha: 0.4, alphaEnd: 0, shape: 'circle',
        });
      }
      drawSeasoningSprite(ctx, e.x, e.y + idleBounceY, w, h, e.state, e.facingRight, flashW);
    } else if (e.type === 'veg') {
      let dx = e.x, dy = e.y + idleBounceY;
      if (e.state === VEG_STATES.CORNERED) {
        dx += (Math.random() - 0.5) * 4;
        dy += (Math.random() - 0.5) * 4;
      }
      if (e.state === VEG_STATES.TELEGRAPH) {
        ctx.save();
        ctx.translate(dx, dy + h / 2);
        ctx.scale(e.telegraphScale, e.telegraphScale);
        ctx.translate(-dx, -(dy + h / 2));
      }
      // Try image asset, fallback to code sprite
      const vegAssetKey = getEnemyAssetKey('veggie', e.state);
      if (!drawAssetSprite(ctx, vegAssetKey, dx, dy, w, h, e.facingRight, flashW)) {
        drawVegSprite(ctx, dx, dy, w, h, e.state, e.facingRight, flashW);
      }
      if (e.state === VEG_STATES.TELEGRAPH && e.energyBallRadius > 0) {
        const eAlpha = e.stateTimer <= 0.2 && Math.floor(Date.now() / 80) % 2 === 0 ? 1 : 0.7;
        ctx.fillStyle = `rgba(180, 255, 50, ${eAlpha})`;
        ctx.beginPath(); ctx.arc(dx, dy - 8, e.energyBallRadius, 0, Math.PI * 2); ctx.fill();
      }
      if (e.state === VEG_STATES.TELEGRAPH) ctx.restore();
    } else {
      // PIG / BOSS
      const isCharge = e.state === PIG_STATES.CHARGE;
      const isSlamState = e.isBoss && (e.state === PIG_STATES.SLAM_TELEGRAPH || e.state === PIG_STATES.SLAM_JUMP || e.state === PIG_STATES.SLAM_FALL || e.state === PIG_STATES.SLAM_RECOVERY);
      const isPhaseTransition = e.isBoss && e.state === PIG_STATES.PHASE_TRANSITION;

      // Boss slam telegraph: red circle on ground
      if (e.isBoss && e.state === PIG_STATES.SLAM_TELEGRAPH) {
        const slamTele = e.phase2 ? CONFIG.bossPhase2.slamTelegraphTime : CONFIG.bossSlam.telegraphTime;
        const elapsed = slamTele - e.stateTimer;
        const fadeIn = clamp(elapsed / 0.3, 0, 1);
        ctx.fillStyle = `rgba(255, 0, 0, ${0.25 * fadeIn})`;
        ctx.beginPath();
        ctx.arc(e.x, e.slamBaseY + h / 2, CONFIG.bossSlam.shockwaveRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(255, 0, 0, ${0.4 * fadeIn})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.arc(e.x, e.slamBaseY + h / 2, CONFIG.bossSlam.shockwaveRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]); ctx.lineWidth = 1;
      }

      // Boss slam shadow (stays at base Y during jump)
      if (e.isBoss && (e.state === PIG_STATES.SLAM_JUMP || e.state === PIG_STATES.SLAM_FALL)) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(e.x, e.slamBaseY + h, w * 0.6, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Apply slam Y offset for rendering
      const slamYOff = (e.isBoss && e.slamJumpOffset) ? e.slamJumpOffset : 0;
      const renderY = e.y + idleBounceY + slamYOff;

      // Phase transition flash
      if (isPhaseTransition) {
        const flashOn = Math.floor(e.phaseFlashTimer / 0.1) % 2 === 0;
        if (flashOn) ctx.globalAlpha = 0.4;
      }

      if (isCharge) {
        ctx.save();
        ctx.translate(e.x, renderY + h / 2);
        ctx.rotate((e.facingRight ? 1 : -1) * 0.15);
        ctx.translate(-e.x, -(renderY + h / 2));
      }
      // Try image asset, fallback to code sprite
      const pigType = e.isBoss ? 'boss' : 'pig';
      const pigAssetKey = getEnemyAssetKey(pigType, e.state);
      if (!drawAssetSprite(ctx, pigAssetKey, e.x, renderY, w, h, e.facingRight, flashW)) {
        drawPigSprite(ctx, e.x, renderY, w, h, e.state, e.facingRight, flashW, e.isBoss);
      }
      if (isCharge) ctx.restore();
      if (isPhaseTransition) ctx.globalAlpha = 1;

      // Boss slam shockwave ring effect
      if (e.isBoss && e.slamShockwaveEffect) {
        const sw = e.slamShockwaveEffect;
        const t = 1 - sw.timer / sw.maxTime;
        const r = sw.radius * t;
        const alpha = 0.6 * (1 - t);
        const lineW = 4 * (1 - t);
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = Math.max(0.5, lineW);
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
      }
      // Slam telegraph ! icon
      if (e.isBoss && e.state === PIG_STATES.SLAM_TELEGRAPH) {
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('!!', e.x, e.y - 12 + Math.sin(Date.now() / 80) * 3);
      }
      // Telegraph ! icon + warning line
      if (e.state === PIG_STATES.TELEGRAPH) {
        ctx.fillStyle = '#FF0000';
        ctx.font = e.isBoss ? 'bold 28px monospace' : 'bold 20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('!', e.x, e.y - 8 + Math.sin(Date.now() / 100) * 2);
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.2)';
        ctx.setLineDash([4, 4]); ctx.lineWidth = 2;
        const dir = player.x > e.x ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(e.x + dir * w / 2, e.y + h / 2);
        ctx.lineTo(e.x + dir * 150, e.y + h / 2);
        ctx.stroke(); ctx.setLineDash([]); ctx.lineWidth = 1;

        // Boss telegraph range rectangle
        if (e.isBoss) {
          const bCfg = CONFIG.enemy_boss;
          const bDir = player.x > e.x ? 1 : -1;
          const bTelegraphTime = e.phase2 ? CONFIG.bossPhase2.chargeTelegraphTime : bCfg.telegraphTime;
          const bTimeLeft = e.stateTimer;
          const bFadeIn = clamp((bTelegraphTime - bTimeLeft) / 0.2, 0, 1);
          const bIntensify = bTimeLeft <= 0.3 ? 0.3 : 0.15;
          const bAlpha = bFadeIn * bIntensify;
          const rectX = bDir > 0 ? e.x + w / 2 : e.x - w / 2 - bCfg.chargeDistance;
          const rectY = e.y;
          const rectW = bCfg.chargeDistance;
          const rectH = h;
          ctx.fillStyle = `rgba(255,71,87,${bAlpha})`;
          ctx.fillRect(rectX, rectY, rectW, rectH);
          ctx.strokeStyle = `rgba(255,71,87,${bAlpha + 0.25})`;
          ctx.setLineDash([6, 4]);
          ctx.lineWidth = 1;
          ctx.strokeRect(rectX, rectY, rectW, rectH);
          ctx.setLineDash([]);
        }
      }
      // Charge speed lines
      if (isCharge && Math.random() < 0.5) {
        const dir = e.facingRight ? -1 : 1;
        spawnParticle({
          x: e.x + dir * w * 0.5, y: e.y + h * 0.2 + Math.random() * h * 0.6,
          vx: dir * 80, vy: 0, size: 1, sizeEnd: 0, life: 0.08,
          color: '#FFF', alpha: 0.3, alphaEnd: 0, shape: 'line', rotation: dir > 0 ? 0 : Math.PI,
        });
      }
      // (Boss HP bar moved to screen-space rendering below)
    }

    // Debug
    if (CONFIG.debug.showHitboxes) {
      ctx.strokeStyle = e.type === 'veg' ? 'rgba(0,200,0,0.5)'
        : e.type === 'seasoning' ? 'rgba(255,215,0,0.5)' : 'rgba(255,0,0,0.5)';
      ctx.strokeRect(e.x - w / 2, e.y, w, h);
      ctx.fillStyle = '#FFF'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      let stateLabel = '';
      if (e.type === 'seasoning') { const n = ['WANDER','FLEE','CORNERED','COUNTER','RECOVER','DYING']; stateLabel = n[e.state] || '?'; }
      else if (e.type === 'veg') { const n = ['IDLE','FLEE','CORNERED','TELEGRAPH','ATTACK','RECOVER','STAGGER','DYING','REPOS']; stateLabel = n[e.state] || '?'; }
      else { const n = ['IDLE','DETECT','APPROACH','TELEGRAPH','CHARGE','RECOVER','STUN','DYING']; stateLabel = n[e.state] || '?'; }
      ctx.fillText(stateLabel, e.x, e.y - 2);
    }
    ctx.restore();
  }

  // --- Projectiles ---
  for (const p of projectiles) {
    // Trail (3 afterimages: sizes 10→7→4, alphas 0.5→0.3→0.1)
    const trailSizes = [0.4, 0.7, 1.0];
    const trailAlphas = [0.1, 0.3, 0.5];
    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      const tSize = p.size * trailSizes[i];
      const tAlpha = trailAlphas[i];
      ctx.fillStyle = `rgba(154, 205, 50, ${tAlpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, tSize, 0, Math.PI * 2);
      ctx.fill();
    }
    // Main body (spinning seed) with red warning glow
    ctx.save();
    ctx.shadowColor = 'rgba(255, 71, 87, 0.4)';
    ctx.shadowBlur = 8;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation || 0);
    ctx.fillStyle = '#9ACD32';
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size * 0.65, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#556B2F';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    if (CONFIG.debug.showHitboxes) {
      ctx.strokeStyle = 'rgba(0,255,0,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // --- Player ---
  if (!player.dead) {
    const pcfg = CONFIG.player;
    ctx.save();

    let visible = true;
    if (player.invincibleTimer > 0 && player.state !== 'finish') {
      visible = Math.floor(player.invincibleTimer * 15) % 2 === 0;
    }

    if (visible) {
      // Finish charge: player trembles
      const dazeShakeX = (player.dazeActive && player.dazeTimer > 0)
        ? Math.sin(player.dazeTimer * 40) * CONFIG.player.daze.shakeAmplitude : 0;
      let drawX = player.x + dazeShakeX, drawY = player.y;
      const holdCharging = player.state === 'enhance' && player.finishHolding && player.finishHoldTimer > 0.08;
      if (holdCharging) {
        const tremble = 1 + Math.min(player.finishHoldTimer / CONFIG.finish.holdTime, 1) * 2;
        drawX += (Math.random() - 0.5) * tremble * 2;
        drawY += (Math.random() - 0.5) * tremble * 2;
      }

      // Idle bounce
      const pBounce = Math.sin(Date.now() / 800 * Math.PI * 2) * 1.5;
      if (!player.finishActive && !player.isDashing) drawY += pBounce;

      // Finish phase scaling
      let scaleX = 1, scaleY = 1;
      if (player.finishActive) {
        if (player.finishPhase === 1) { scaleX = 0.8; scaleY = 1.5; }
        else if (player.finishPhase === 2) { scaleX = 1.5; scaleY = 0.7; }
      } else if (player.isDashing) {
        scaleX = 1.3; scaleY = 0.75;
      } else if (player.isAttacking) {
        if (player.comboStep === 2) { scaleX = 1.2; scaleY = 0.85; }
        else { scaleX = 1.15; scaleY = 0.9; }
      }

      ctx.save();
      if (scaleX !== 1 || scaleY !== 1) {
        ctx.translate(drawX, drawY + pcfg.size.height / 2);
        ctx.scale(scaleX, scaleY);
        ctx.translate(-drawX, -(drawY + pcfg.size.height / 2));
      }

      // Dash afterimages
      if (player.isDashing) {
        for (let di = 1; di <= 3; di++) {
          const off = di * 12 * (player.facingRight ? -1 : 1);
          ctx.globalAlpha = 0.15 * (4 - di);
          drawChefSprite(ctx, drawX + off, drawY, pcfg.size.width, pcfg.size.height,
            player.state, player.facingRight, { isEnhanced: player.state === 'enhance', attacking: false, hit: false, animTimer: gameTimer });
        }
        ctx.globalAlpha = 1;
      }

      // Dash invincibility visual (semi-transparent)
      if (player.dashInvincibleTimer > 0) {
        ctx.globalAlpha = 0.5;
      }

      // Draw chef sprite
      const isEnh = player.state === 'enhance' || player.state === 'finish';
      const isAttacking = player.isAttacking || (player.state === 'enhance' && player.enhanceAttackHitbox);
      drawChefSprite(ctx, drawX, drawY, pcfg.size.width, pcfg.size.height,
        player.state, player.facingRight, {
          isEnhanced: isEnh,
          attacking: isAttacking,
          hit: player.flashTimer > 0 || player.dazeActive,
          comboStep: player.comboStep,
          animTimer: gameTimer,
        });

      if (player.dashInvincibleTimer > 0) {
        ctx.globalAlpha = 1;
      }

      // Super armor white outline
      if (player.finishSuperArmor) {
        ctx.strokeStyle = player.finishSuperArmorFlash > 0 ? '#FFFFFF' : 'rgba(255, 255, 255, 0.7)';
        ctx.lineWidth = player.finishSuperArmorFlash > 0 ? 3 : 2;
        ctx.strokeRect(drawX - pcfg.size.width / 2 - 2, drawY - 2, pcfg.size.width + 4, pcfg.size.height + 4);
        ctx.lineWidth = 1;
      }
      ctx.restore();

      // Enhance mode: rotating dashed circle + aura
      if (player.state === 'enhance' && !player.finishActive) {
        const angle = Date.now() / 500;
        ctx.save();
        ctx.translate(drawX, drawY + pcfg.size.height / 2);
        ctx.rotate(angle);
        ctx.strokeStyle = '#FF8800';
        ctx.setLineDash([6, 4]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 35, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineWidth = 1;
        ctx.restore();
        // Aura particles
        drawAura(ctx, drawX, drawY + pcfg.size.height / 2);
      }

      // Finish charge: concentration lines
      if (player.state === 'enhance' && player.finishHolding && player.finishHoldTimer > 0.08) {
        const progress = player.finishHoldTimer / CONFIG.finish.holdTime;
        const rcp = currentRecipe || CONFIG.finish.recipes.fullCourseBlast;
        ctx.strokeStyle = rcp.colorGlow;
        ctx.globalAlpha = 0.3 + progress * 0.5;
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2 + Date.now() / 300;
          const outerR = 80 - progress * 30;
          const innerR = 30 - progress * 15;
          ctx.beginPath();
          ctx.moveTo(drawX + Math.cos(a) * outerR, drawY + pcfg.size.height / 2 + Math.sin(a) * outerR);
          ctx.lineTo(drawX + Math.cos(a) * innerR, drawY + pcfg.size.height / 2 + Math.sin(a) * innerR);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.lineWidth = 1;

        // Circular gauge above player
        ctx.strokeStyle = rcp.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(drawX, drawY - 15, 12, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
        ctx.stroke();
        ctx.lineWidth = 1;

        // Finish landing preview circle
        const fwdPrev = player.facingRight ? 1 : -1;
        const previewX = player.x + fwdPrev * (80 + CONFIG.finish.strikeOffsetX);
        const previewY = player.y + pcfg.size.height / 2;
        const previewAlpha = progress * 0.4;
        const previewR = rcp.radius;
        // Filled circle
        ctx.fillStyle = rcp.color;
        ctx.globalAlpha = previewAlpha;
        ctx.beginPath();
        ctx.arc(previewX, previewY, previewR, 0, Math.PI * 2);
        ctx.fill();
        // Dashed outline
        ctx.globalAlpha = Math.min(previewAlpha * 2, 0.8);
        ctx.strokeStyle = rcp.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.arc(previewX, previewY, previewR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Crosshair
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(previewX - 8, previewY); ctx.lineTo(previewX + 8, previewY);
        ctx.moveTo(previewX, previewY - 8); ctx.lineTo(previewX, previewY + 8);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // Normal attack hitbox
    if (player.state === 'normal' && player.isAttacking && player.attackHitbox && CONFIG.debug.showHitboxes) {
      const ah = player.attackHitbox;
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(ah.x, ah.y, ah.w, ah.h);
      ctx.strokeStyle = 'rgba(255,0,0,0.7)';
      ctx.strokeRect(ah.x, ah.y, ah.w, ah.h);
    }

    // Enhance attack hitbox
    if (player.state === 'enhance' && player.enhanceAttackHitbox && CONFIG.debug.showHitboxes) {
      const ah = player.enhanceAttackHitbox;
      const isLeft = ah.side === 'left';
      ctx.fillStyle = isLeft ? 'rgba(255,0,0,0.3)' : 'rgba(255,140,0,0.3)';
      ctx.fillRect(ah.x, ah.y, ah.w, ah.h);
      ctx.strokeStyle = isLeft ? 'rgba(255,0,0,0.7)' : 'rgba(255,140,0,0.7)';
      ctx.strokeRect(ah.x, ah.y, ah.w, ah.h);
    }

    // Player hitbox debug
    if (CONFIG.debug.showHitboxes) {
      ctx.strokeStyle = 'rgba(0,100,255,0.5)';
      const ph = playerHitbox();
      ctx.strokeRect(ph.x, ph.y, ph.w, ph.h);
    }

    ctx.restore();
  }

  // --- Daze stars (world space, above player) ---
  if (player.dazeActive && player.dazeTimer > 0) {
    const dazeCfg = CONFIG.player.daze;
    const starCx = player.x;
    const starCy = player.y - 10;
    const shakeX = Math.sin(player.dazeTimer * 40) * dazeCfg.shakeAmplitude;
    ctx.save();
    for (let i = 0; i < dazeCfg.starCount; i++) {
      const angle = (gameTimer * dazeCfg.starSpeed) + (i * Math.PI * 2 / dazeCfg.starCount);
      const sx = starCx + shakeX + Math.cos(angle) * dazeCfg.starRadius;
      const sy = starCy + Math.sin(angle) * dazeCfg.starRadius * 0.4;
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(gameTimer * 12 + i);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('★', sx, sy);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // --- Suction particles (world space) ---
  for (const sp of suctionParticles) {
    const alpha = sp.life / sp.maxLife;
    ctx.fillStyle = sp.color;
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillRect(sp.x - 2, sp.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  }

  // --- Steak buff aura (world space) ---
  if (player.steakBuff.active) {
    const pulse = 1.0 + 0.1 * Math.sin(Date.now() / 400);
    const auraR = 36 * pulse;
    ctx.fillStyle = 'rgba(255, 68, 68, 0.15)';
    ctx.beginPath();
    ctx.arc(player.x, player.y + CONFIG.player.size.height / 2, auraR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Heal floating texts (world space) ---
  for (const ht of healTexts) {
    const alpha = ht.timer / 0.5;
    ctx.fillStyle = `rgba(100, 255, 100, ${alpha})`;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ht.text, ht.x, ht.y);
  }

  // --- Generic particles (world space) ---
  drawParticles(ctx, camX, camY);

  // --- Fireflies (boss room) ---
  if (currentRoom === 3) drawFireflies(ctx);

  // --- Essence orbs (world space, easeOut) ---
  for (const orb of essenceOrbs) {
    const t = Math.min(orb.timer / orb.duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
    const ox = orb.sx + (orb.tx - orb.sx) * ease;
    const oy = orb.sy + (orb.ty - orb.sy) * ease;
    ctx.beginPath();
    ctx.arc(ox, oy, orb.size, 0, Math.PI * 2);
    ctx.fillStyle = orb.color;
    ctx.shadowColor = orb.color;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // --- Essence bursts (world space) ---
  for (const b of essenceBursts) {
    const alpha = b.timer / 0.15;
    ctx.fillStyle = b.color;
    ctx.globalAlpha = alpha;
    if (b.particles) {
      for (const p of b.particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // --- Comic effects (world space) ---
  const dt_render = 1 / 60; // approximate dt for render-time updates
  updateAndDrawComicHitEffects(ctx, dt_render);
  updateAndDrawComicTexts(ctx, dt_render);
  updateAndDrawDamageNumbers(ctx, dt_render);

  ctx.restore(); // End camera transform

  // === Enhance transition: orange flash overlay ===
  if (enhanceFlashTimer > 0) {
    const alpha = 0.45 * (enhanceFlashTimer / 0.3);
    ctx.fillStyle = `rgba(255, 160, 0, ${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === Enhance transition: radial concentration lines ===
  if (radialLines.length > 0) {
    ctx.save();
    const pcx = player.x - (camera.x + shakeOffsetX) + canvas.width / 2 * (1 - 1 / cameraZoom);
    const pcy = player.y - (camera.y + shakeOffsetY) + canvas.height / 2 * (1 - 1 / cameraZoom);
    // Approximate player screen position
    const psx = (player.x - camera.x - shakeOffsetX) * cameraZoom + canvas.width / 2 * (1 - cameraZoom);
    const psy = (player.y - camera.y - shakeOffsetY) * cameraZoom + canvas.height / 2 * (1 - cameraZoom);
    for (const rl of radialLines) {
      const alpha = Math.sin((rl.timer / 0.3) * Math.PI) * 0.6;
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      const startDist = 40;
      ctx.moveTo(psx + Math.cos(rl.angle) * startDist, psy + Math.sin(rl.angle) * startDist);
      ctx.lineTo(psx + Math.cos(rl.angle) * (startDist + rl.length), psy + Math.sin(rl.angle) * (startDist + rl.length));
      ctx.stroke();
    }
    ctx.restore();
  }

  // === Finish charge: darken overlay ===
  if (player.state === 'enhance' && player.finishHolding && player.finishHoldTimer > 0.08) {
    const progress = player.finishHoldTimer / CONFIG.finish.holdTime;
    ctx.fillStyle = `rgba(0, 0, 0, ${progress * 0.15})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === Screen flash (finish landing) ===
  if (screenFlashTimer > 0) {
    const alpha = 0.3 * (screenFlashTimer / SCREEN_FLASH_DURATION);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === Recipe name display ===
  if (recipeNameTimer > 0) {
    const total = 1.3; // 0.2s scale-in + 0.8s hold + 0.3s fade
    const elapsed = total - recipeNameTimer;
    let alpha = 1, scaleVal = 1;
    if (elapsed < 0.2) {
      // Scale-in: 0→1.2→1.0
      const t = elapsed / 0.2;
      scaleVal = t < 0.5 ? lerp(0, 1.2, t * 2) : lerp(1.2, 1.0, (t - 0.5) * 2);
    } else if (recipeNameTimer < 0.3) {
      // Fade-out
      alpha = recipeNameTimer / 0.3;
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = Math.round(canvas.width * 0.06);
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.translate(canvas.width / 2, canvas.height * 0.35);
    ctx.scale(scaleVal, scaleVal);
    ctx.shadowColor = recipeNameGlow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = recipeNameColor;
    ctx.fillText(recipeNameText, 0, 0);
    ctx.shadowBlur = 0;
    // Sub-text for heal
    if (recipeNameText === 'SALAD STORM') {
      ctx.font = `bold ${Math.round(fontSize * 0.5)}px monospace`;
      ctx.fillStyle = '#66FF66';
      ctx.fillText('+15 HP', 0, fontSize * 0.7);
    }
    ctx.restore();
  }

  // === Vignette pulse (player hit) ===
  if (vignetteTimer > 0) {
    const vcfg = CONFIG.gameFeel.vignettePulse;
    const progress = vignetteTimer / vcfg.duration;
    const vAlpha = vcfg.maxAlpha * progress;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const diagonal = Math.sqrt(cx * cx + cy * cy);
    const innerR = diagonal * vcfg.innerRadius;
    const outerR = diagonal * vcfg.outerRadius;
    const gradient = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
    gradient.addColorStop(1, `rgba(0, 0, 0, ${vAlpha})`);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === Boss HP bar (screen-space, top center) ===
  {
    const bossAlive = enemies.find(e => e.isBoss && !e.remove);
    if (bossAlive && currentRoom === 3) {
      const slideIn = bossEntrance.active ? bossEntrance.hpBarSlide : 1;
      const bBarW = 300, bBarH = 14;
      const bBarX = (canvas.width - bBarW) / 2;
      const bBarY = 16 - (1 - slideIn) * 40; // slides from above
      const hpRatio = bossAlive.hp / CONFIG.enemy_boss.hp;

      // Boss name text
      ctx.save();
      ctx.globalAlpha = slideIn;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('돼지 대장', canvas.width / 2, bBarY - 3);

      // Background
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillStyle = '#1a1a1a';
      roundRect(ctx, bBarX, bBarY, bBarW, bBarH, 4); ctx.fill();
      ctx.shadowBlur = 0;

      // Ghost (white delayed HP)
      if (bossHpGhost > hpRatio) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.save(); ctx.beginPath(); roundRect(ctx, bBarX, bBarY, bBarW, bBarH, 4); ctx.clip();
        ctx.fillRect(bBarX, bBarY, bBarW * bossHpGhost, bBarH);
        ctx.restore();
      }

      // HP fill (red gradient, brighter red in phase2)
      if (hpRatio > 0) {
        const hGrad = ctx.createLinearGradient(bBarX, bBarY, bBarX, bBarY + bBarH);
        if (bossAlive.phase2) {
          hGrad.addColorStop(0, '#FF3333'); hGrad.addColorStop(1, '#AA0000');
        } else {
          hGrad.addColorStop(0, '#FF5555'); hGrad.addColorStop(1, '#CC1111');
        }
        ctx.fillStyle = hGrad;
        ctx.save(); ctx.beginPath(); roundRect(ctx, bBarX, bBarY, bBarW, bBarH, 4); ctx.clip();
        ctx.fillRect(bBarX, bBarY, bBarW * hpRatio, bBarH);
        // Gloss
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(bBarX, bBarY, bBarW * hpRatio, bBarH / 2);
        ctx.restore();
      }

      // Border
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      roundRect(ctx, bBarX, bBarY, bBarW, bBarH, 4); ctx.stroke();
      ctx.lineWidth = 1;
      ctx.restore();
    }
  }

  // === Boss entrance overlay ===
  if (bossEntrance.active && bossEntrance.overlayAlpha > 0) {
    ctx.fillStyle = `rgba(0, 0, 0, ${bossEntrance.overlayAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === Enhance tone shift: screen overlay ===
  if (enhanceToneAlpha > 0) {
    ctx.fillStyle = `rgba(20, 10, 30, ${0.20 * enhanceToneAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // === UI (screen-space) ===
  const hudOutline = enhanceToneAlpha > 0 ? lerpColor(HUD.OUTLINE, HUD.PRIMARY, enhanceToneAlpha) : HUD.OUTLINE;

  // Helper: outlined text
  function hudText(text, x, y, font, fillColor, outlineWidth) {
    ctx.font = font;
    if (outlineWidth > 0) {
      ctx.strokeStyle = HUD.OUTLINE;
      ctx.lineWidth = outlineWidth * 2;
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
    }
    ctx.fillStyle = fillColor;
    ctx.fillText(text, x, y);
    ctx.lineWidth = 1;
  }

  // HP Bar (top-left)
  {
    const hpShakeX = player.hpBarShakeTimer > 0 ? Math.sin(player.hpBarShakeTimer * 60) * 2 : 0;
    const hpX = 16 + hpShakeX, hpY = 12, hpW = 180, hpH = 22, hpR = 11;
    const hpRatio = player.hp / CONFIG.player.maxHp;
    const lowHp = hpRatio <= 0.25;
    const midHp = hpRatio <= 0.5;

    // Background
    ctx.save();
