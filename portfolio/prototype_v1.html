    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, hpX, hpY, hpW, hpH, hpR); ctx.fill();

    // Ghost bar (delayed damage visualization)
    if (playerHpGhost > hpRatio) {
      ctx.save(); ctx.beginPath(); roundRect(ctx, hpX, hpY, hpW, hpH, hpR); ctx.clip();
      ctx.fillStyle = 'rgba(255,71,87,0.5)';
      ctx.fillRect(hpX, hpY, hpW * playerHpGhost, hpH);
      ctx.restore();
    }

    // HP fill
    if (hpRatio > 0) {
      let c1, c2;
      if (lowHp) { c1 = '#FF4757'; c2 = '#FF3838'; }
      else if (midHp) { c1 = '#FFE66D'; c2 = '#FFA502'; }
      else { c1 = '#4ECDC4'; c2 = '#45B7AA'; }
      const hGrad = ctx.createLinearGradient(hpX, hpY, hpX, hpY + hpH);
      hGrad.addColorStop(0, c1); hGrad.addColorStop(1, c2);
      ctx.fillStyle = hGrad;
      // Low HP pulse
      let fillW = hpW * hpRatio;
      if (lowHp) {
        const pulse = 0.95 + 0.05 * Math.sin(Date.now() / 150 * Math.PI);
        ctx.globalAlpha = pulse;
      }
      ctx.save(); ctx.beginPath(); roundRect(ctx, hpX, hpY, hpW, hpH, hpR); ctx.clip();
      ctx.fillRect(hpX, hpY, fillW, hpH);
      // Highlight line
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(hpX, hpY + 1, fillW, 1);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // Outline
    ctx.strokeStyle = hudOutline;
    ctx.lineWidth = 3;
    roundRect(ctx, hpX, hpY, hpW, hpH, hpR); ctx.stroke();
    ctx.lineWidth = 1;

    // HP text inside bar
    ctx.textAlign = 'center';
    hudText(`${player.hp}/${CONFIG.player.maxHp}`, hpX + hpW / 2, hpY + 16, 'bold 12px sans-serif', '#FFF', 1);
    ctx.restore();
  }

  // --- Bottom gauge: depends on state ---
  const gaugeW = 300, gaugeH = 16;
  const gaugeX = (canvas.width - gaugeW) / 2;
  const gaugeY = canvas.height - 40;

  if (player.state === 'enhance' || player.state === 'finish') {
    // === ENHANCE: Finish gauge at bottom ===
    const fRatio = player.finishGauge / CONFIG.finish.gaugeMax;
    const fFull = fRatio >= 1;

    ctx.save();
    if (player.gaugePulseTimer > 0) {
      const pulseT = player.gaugePulseTimer / 0.1;
      const pulseScale = 1.0 + 0.05 * pulseT;
      ctx.translate(canvas.width / 2, gaugeY + gaugeH / 2);
      ctx.scale(pulseScale, pulseScale);
      ctx.translate(-canvas.width / 2, -(gaugeY + gaugeH / 2));
    }

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, gaugeX, gaugeY, gaugeW, gaugeH, 4); ctx.fill();
    if (fRatio > 0) {
      const fGrad = ctx.createLinearGradient(gaugeX, gaugeY, gaugeX, gaugeY + gaugeH);
      if (fFull) {
        const blink = Math.floor(Date.now() / 300) % 2 === 0;
        fGrad.addColorStop(0, blink ? '#FFD700' : '#FFAA00');
        fGrad.addColorStop(1, blink ? '#FF8C00' : '#FF6B00');
      } else {
        fGrad.addColorStop(0, '#DD2222'); fGrad.addColorStop(1, '#AA0000');
      }
      ctx.fillStyle = fGrad;
      ctx.save(); ctx.beginPath(); roundRect(ctx, gaugeX, gaugeY, gaugeW, gaugeH, 4); ctx.clip();
      ctx.fillRect(gaugeX, gaugeY, gaugeW * fRatio, gaugeH);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(gaugeX, gaugeY, gaugeW * fRatio, gaugeH / 2);
      ctx.restore();
    }
    ctx.strokeStyle = fFull ? HUD.ACCENT : hudOutline;
    ctx.lineWidth = 2;
    roundRect(ctx, gaugeX, gaugeY, gaugeW, gaugeH, 4); ctx.stroke();
    ctx.lineWidth = 1;
    ctx.textAlign = 'center';
    hudText(`피니시 게이지: ${Math.floor(player.finishGauge)}/${CONFIG.finish.gaugeMax}`, canvas.width / 2, gaugeY + 13, '11px sans-serif', '#FFF', 1);
    ctx.restore();

    // "Z꾹 → 피니시!" text
    if (player.finishGauge >= 50) {
      const blink = Math.floor(Date.now() / 400) % 2 === 0;
      if (blink) {
        ctx.textAlign = 'center';
        hudText('Z꾹 → 피니시!', canvas.width / 2, gaugeY - 8, 'bold 14px sans-serif', HUD.ACCENT, 2);
      }
    }

    // === ENHANCE: Duration bar at top center (200px, orange → red) ===
    {
      const eBarW = 200, eBarH = 8;
      const eBarX = (canvas.width - eBarW) / 2;
      const eBarY = 68;
      const eRatio = player.enhanceTimer / CONFIG.enhance.maxDuration;
      const eLow = player.enhanceTimer <= 2;

      // Background
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      roundRect(ctx, eBarX, eBarY, eBarW, eBarH, 4); ctx.fill();

      // Fill
      const eFillW = eBarW * Math.max(0, eRatio);
      if (eFillW > 0) {
        let eGrad;
        if (eLow) {
          const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 100);
          ctx.globalAlpha = pulse;
          eGrad = ctx.createLinearGradient(eBarX, eBarY, eBarX + eFillW, eBarY);
          eGrad.addColorStop(0, HUD.DANGER); eGrad.addColorStop(1, '#FF3838');
        } else {
          eGrad = ctx.createLinearGradient(eBarX, eBarY, eBarX + eFillW, eBarY);
          eGrad.addColorStop(0, HUD.PRIMARY); eGrad.addColorStop(1, HUD.ACCENT);
        }
        ctx.fillStyle = eGrad;
        ctx.save(); ctx.beginPath(); roundRect(ctx, eBarX, eBarY, eBarW, eBarH, 4); ctx.clip();
        ctx.fillRect(eBarX, eBarY, eFillW, eBarH);
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      // Border
      ctx.strokeStyle = HUD.PRIMARY;
      ctx.lineWidth = 2;
      roundRect(ctx, eBarX, eBarY, eBarW, eBarH, 4); ctx.stroke();
      ctx.lineWidth = 1;

      // Label
      const eLabel = eLow ? 'ENDING!' : 'ENHANCED';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      hudText(eLabel, canvas.width / 2, eBarY - 3, 'bold 10px sans-serif', HUD.TEXT_LIGHT, 1);
      ctx.restore();
    }

    // Enhance mode: show ingredient slots semi-transparent (36px)
    {
      const slotSize = 36;
      const slotGap = 4;
      const maxSlots = CONFIG.ingredientList.maxSlots;
      const totalSlotW = slotSize * maxSlots + slotGap * (maxSlots - 1);
      const slotStartX = (canvas.width - totalSlotW) / 2;
      const slotY = canvas.height - 80;
      // Group panel background
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.shadowColor = 'rgba(255,107,53,0.4)';
      ctx.shadowBlur = 10;
      roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.fill();
      ctx.strokeStyle = HUD.PRIMARY;
      ctx.lineWidth = 2;
      roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.5;
      for (let i = 0; i < maxSlots; i++) {
        const sx = slotStartX + i * (slotSize + slotGap);
        const ingredient = player.ingredientSlots[i];
        if (ingredient === 'meat') {
          ctx.fillStyle = HUD.MEAT_COLOR;
        } else if (ingredient === 'vegetable') {
          ctx.fillStyle = HUD.VEG_COLOR;
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
        }
        roundRect(ctx, sx, slotY, slotSize, slotSize, 6); ctx.fill();
        ctx.strokeStyle = HUD.PRIMARY;
        ctx.lineWidth = 2;
        roundRect(ctx, sx, slotY, slotSize, slotSize, 6); ctx.stroke();
        ctx.lineWidth = 1;
        // Icon text for filled
        if (ingredient) {
          ctx.fillStyle = HUD.TEXT_LIGHT;
          ctx.font = 'bold 14px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(ingredient === 'meat' ? 'M' : 'V', sx + slotSize / 2, slotY + slotSize / 2 + 5);
        }
      }
      ctx.restore();
    }

  } else {
    // === NORMAL: Ingredient slots at bottom (36px, group panel) ===
    const slotSize = 36;
    const slotGap = 4;
    const maxSlots = CONFIG.ingredientList.maxSlots;
    const totalSlotW = slotSize * maxSlots + slotGap * (maxSlots - 1);
    const slotStartX = (canvas.width - totalSlotW) / 2;
    const slotY = canvas.height - 56;
    const isFull = player.ingredientSlots.length >= maxSlots;

    const hudOutline = enhanceToneAlpha > 0 ? lerpColor(HUD.OUTLINE, HUD.PRIMARY, enhanceToneAlpha) : HUD.OUTLINE;

    // Group panel background
    ctx.save();
    if (enhanceToneAlpha > 0) {
      ctx.shadowColor = `rgba(255,107,53,${0.4 * enhanceToneAlpha})`;
      ctx.shadowBlur = 10;
    }
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.fill();
    ctx.strokeStyle = hudOutline;
    ctx.lineWidth = 2;
    roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1;
    ctx.restore();

    // Full glow
    if (isFull) {
      ctx.save();
      const glowPulse = 0.6 + 0.4 * Math.sin(Date.now() / 250);
      ctx.shadowColor = HUD.ACCENT;
      ctx.shadowBlur = 12 * glowPulse;
      ctx.strokeStyle = HUD.ACCENT;
      ctx.lineWidth = 2;
      roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1;
      ctx.restore();
    }

    // Slots
    for (let i = 0; i < maxSlots; i++) {
      const sx = slotStartX + i * (slotSize + slotGap);
      const ingredient = player.ingredientSlots[i];

      // Pop animation
      let scale = 1;
      if (i === player.ingredientPopIndex && player.ingredientPopTimer > 0) {
        const t = player.ingredientPopTimer / 0.15;
        scale = t > 0.5 ? 1.3 : 1.0 + 0.3 * (t * 2);
      }

      ctx.save();
      if (scale !== 1) {
        ctx.translate(sx + slotSize / 2, slotY + slotSize / 2);
        ctx.scale(scale, scale);
        ctx.translate(-(sx + slotSize / 2), -(slotY + slotSize / 2));
      }

      if (ingredient) {
        // Filled slot
        const baseColor = ingredient === 'meat' ? HUD.MEAT_COLOR : HUD.VEG_COLOR;
        ctx.fillStyle = baseColor;
        roundRect(ctx, sx, slotY, slotSize, slotSize, 6); ctx.fill();
        // Gloss
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        roundRect(ctx, sx + 2, slotY + 2, slotSize - 4, slotSize * 0.35, 4); ctx.fill();
        // Icon text
        ctx.fillStyle = HUD.TEXT_LIGHT;
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(ingredient === 'meat' ? 'M' : 'V', sx + slotSize / 2, slotY + slotSize / 2 + 6);
        ctx.strokeStyle = isFull ? HUD.ACCENT : hudOutline;
      } else {
        // Empty slot
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        roundRect(ctx, sx, slotY, slotSize, slotSize, 6); ctx.fill();
        // Dotted circle inside (empty indicator)
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.arc(sx + slotSize / 2, slotY + slotSize / 2, slotSize * 0.3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Partial charge progress bar
        if (i === player.ingredientSlots.length && player.ingredientPartialCharge > 0) {
          const chargeH = (slotSize - 4) * Math.min(player.ingredientPartialCharge, 1);
          const cGrad = ctx.createLinearGradient(sx, slotY + slotSize, sx, slotY + slotSize - chargeH);
          cGrad.addColorStop(0, 'rgba(255, 200, 50, 0.5)');
          cGrad.addColorStop(1, 'rgba(255, 200, 50, 0.15)');
          ctx.fillStyle = cGrad;
          ctx.save(); ctx.beginPath(); roundRect(ctx, sx + 2, slotY + 2, slotSize - 4, slotSize - 4, 4); ctx.clip();
          ctx.fillRect(sx + 2, slotY + slotSize - 2 - chargeH, slotSize - 4, chargeH);
          ctx.restore();
        }
        ctx.strokeStyle = hudOutline;
      }
      ctx.lineWidth = 2;
      roundRect(ctx, sx, slotY, slotSize, slotSize, 6); ctx.stroke();
      ctx.lineWidth = 1;
      ctx.restore();
    }

    // Ingredient loss flash (red blink on last emptied slot)
    if (player.ingredientLossFlashTimer > 0) {
      const lossIdx = player.ingredientSlots.length; // the slot that just lost its ingredient
      if (lossIdx < maxSlots) {
        const lsx = slotStartX + lossIdx * (slotSize + slotGap);
        const flashAlpha = 0.5 * (player.ingredientLossFlashTimer / 0.2);
        ctx.fillStyle = `rgba(255, 50, 50, ${flashAlpha})`;
        roundRect(ctx, lsx, slotY, slotSize, slotSize, 6); ctx.fill();
      }
    }

    // Full flash
    if (player.ingredientFullFlash > 0) {
      ctx.fillStyle = `rgba(255, 255, 255, ${player.ingredientFullFlash / 0.1 * 0.5})`;
      ctx.fillRect(slotStartX - 2, slotY - 2, totalSlotW + 4, slotSize + 4);
    }

    // Charge loss flash (red blink on charging slot)
    if (player.chargeLossFlash > 0) {
      const lossIdx = player.ingredientSlots.length; // the slot that was charging
      if (lossIdx < maxSlots) {
        const lsx = slotStartX + lossIdx * (slotSize + slotGap);
        ctx.fillStyle = `rgba(255, 50, 50, ${player.chargeLossFlash / 0.15 * 0.4})`;
        ctx.save(); ctx.beginPath(); roundRect(ctx, lsx, slotY, slotSize, slotSize, 6); ctx.clip();
        ctx.fillRect(lsx, slotY, slotSize, slotSize);
        ctx.restore();
      }
    }

    // Charge loss text popup ("-0.3")
    if (player.chargeLossTextTimer > 0) {
      const ltAlpha = Math.min(player.chargeLossTextTimer / 0.2, 1);
      ctx.save();
      ctx.globalAlpha = ltAlpha;
      ctx.fillStyle = HUD.DANGER;
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      const lossIdx2 = player.ingredientSlots.length;
      const ltx = slotStartX + lossIdx2 * (slotSize + slotGap) + slotSize / 2;
      ctx.fillText(`-${CONFIG.ingredientList.chargeOnHitLoss}`, ltx, slotY + player.chargeLossTextY - 4);
      ctx.restore();
    }

    // Wildcard flash
    if (player.ingredientWildcardFlash > 0 && player.ingredientPopIndex >= 0) {
      const wi = player.ingredientPopIndex;
      const wsx = slotStartX + wi * (slotSize + slotGap);
      const alpha = player.ingredientWildcardFlash / 0.15;
      ctx.save();
      ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
      ctx.lineWidth = 3;
      roundRect(ctx, wsx - 1, slotY - 1, slotSize + 2, slotSize + 2, 7); ctx.stroke();
      ctx.lineWidth = 1;
      ctx.restore();
    }

    // "C키로 강화!" bounce text when full
    if (isFull) {
      const bounceY = Math.sin(Date.now() / 200) * 2;
      hudText('C키로 강화!', canvas.width / 2, slotY - 26 + bounceY, 'bold 14px sans-serif', HUD.ACCENT, 2);
    }

    // Recipe prediction name (above slots)
    {
      let mC = 0, vC = 0;
      for (const s of player.ingredientSlots) { if (s === 'meat') mC++; else vC++; }
      let recipeName = '--- 재료 수집 중 ---';
      let recipeColor = 'rgba(255,255,255,0.4)';
      let recipeBg = null;
      let recipeBorder = null;
      if (mC >= 4) {
        recipeName = 'STEAK SMASH';
        recipeColor = HUD.MEAT_COLOR;
        recipeBg = 'rgba(255,107,107,0.2)';
        recipeBorder = HUD.MEAT_COLOR;
      } else if (vC >= 4) {
        recipeName = 'SALAD STORM';
        recipeColor = HUD.VEG_COLOR;
        recipeBg = 'rgba(107,203,119,0.2)';
        recipeBorder = HUD.VEG_COLOR;
      } else if (player.ingredientSlots.length >= maxSlots) {
        recipeName = 'FULL COURSE';
        recipeColor = HUD.ACCENT;
        recipeBg = 'rgba(255,230,109,0.2)';
        recipeBorder = HUD.ACCENT;
      }
      const rpX = canvas.width / 2 + (maxSlots * (slotSize + slotGap)) / 2 + 16;
      const rpY = slotY + slotSize / 2 - 2; // vertically centered with slots
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      const rpW = ctx.measureText(recipeName).width + 16;
      if (recipeBg) {
        ctx.fillStyle = recipeBg;
        roundRect(ctx, rpX - 4, rpY - 14, rpW, 18, 6); ctx.fill();
        ctx.strokeStyle = recipeBorder;
        ctx.lineWidth = 1;
        roundRect(ctx, rpX - 4, rpY - 14, rpW, 18, 6); ctx.stroke();
      }
      hudText(recipeName, rpX + 4, rpY, 'bold 12px sans-serif', recipeColor, 1);
    }

    // Enhance end bonus gold pulse overlay
    if (player.enhanceBonusPulse > 0) {
      ctx.save();
      ctx.shadowColor = HUD.ACCENT;
      ctx.shadowBlur = 20 * (player.enhanceBonusPulse / 0.3);
      ctx.strokeStyle = HUD.ACCENT;
      ctx.lineWidth = 2;
      roundRect(ctx, slotStartX - 8, slotY - 6, totalSlotW + 16, slotSize + 12, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1;
      ctx.restore();
    }

    // Enhance end bonus text popup
    if (player.enhanceBonusText) {
      const bt = player.enhanceBonusText;
      const btAlpha = Math.min(bt.timer / 0.3, 1);
      ctx.save();
      ctx.globalAlpha = btAlpha;
      hudText(bt.text, canvas.width / 2, slotY - 38 + bt.y, 'bold 14px sans-serif', HUD.ACCENT, 2);
      ctx.restore();
    }

    // Steak buff HUD
    if (player.steakBuff.active) {
      const buffY = slotY - 48;
      ctx.save();
      hudText('ATK UP', canvas.width / 2, buffY, 'bold 12px sans-serif', HUD.DANGER, 1);
      const barW = 60, barH = 4;
      const barX = canvas.width / 2 - barW / 2;
      const barY2 = buffY + 3;
      const ratio = player.steakBuff.timer / CONFIG.finish.recipes.steakSmash.buffDuration;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      roundRect(ctx, barX, barY2, barW, barH, 2); ctx.fill();
      ctx.fillStyle = HUD.DANGER;
      ctx.save(); ctx.beginPath(); roundRect(ctx, barX, barY2, barW, barH, 2); ctx.clip();
      ctx.fillRect(barX, barY2, barW * ratio, barH);
      ctx.restore();
      ctx.restore();
    }
  }

  // === Combo counter (below HP bar, left-aligned at x=16) ===
  if (player.comboCount > 0) {
    const comboY = 40; // HP bar bottom (34) + 6px gap
    const cTiers = CONFIG.ingredientList.comboChargeBonus.tiers;
    let cMult = 1.0;
    for (const tier of cTiers) { if (player.comboCount >= tier.threshold) cMult = tier.multiplier; }
    let cScale = 1;
    if (comboPopTimer > 0) {
      cScale = 1 + 0.15 * (comboPopTimer / 0.1);
    }
    ctx.save();
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    if (cScale !== 1) {
      ctx.translate(16, comboY);
      ctx.scale(cScale, cScale);
      ctx.translate(-16, -comboY);
    }
    const comboText = `${player.comboCount} COMBO`;
    if (cMult >= 2.0) {
      // 15+ hits: orange with glow
      ctx.shadowColor = HUD.PRIMARY;
      ctx.shadowBlur = 6;
      hudText(comboText, 16, comboY, 'bold 16px sans-serif', HUD.PRIMARY, 2);
      ctx.shadowBlur = 0;
      ctx.font = 'bold 16px sans-serif';
      const comboW = ctx.measureText(comboText).width;
      hudText(` \u00D7${cMult}`, 16 + comboW, comboY, 'bold 13px sans-serif', HUD.PRIMARY, 2);
    } else if (cMult >= 1.5) {
      // 10+ hits: gold
      ctx.shadowColor = HUD.ACCENT;
      ctx.shadowBlur = 4;
      hudText(comboText, 16, comboY, 'bold 15px sans-serif', HUD.ACCENT, 2);
      ctx.shadowBlur = 0;
      ctx.font = 'bold 15px sans-serif';
      const comboW = ctx.measureText(comboText).width;
      hudText(` \u00D7${cMult}`, 16 + comboW, comboY, 'bold 13px sans-serif', HUD.ACCENT, 2);
    } else if (cMult >= 1.2) {
      // 5+ hits: white with multiplier
      hudText(comboText, 16, comboY, 'bold 14px sans-serif', HUD.TEXT_LIGHT, 1);
      ctx.font = 'bold 14px sans-serif';
      const comboW = ctx.measureText(comboText).width;
      hudText(` \u00D7${cMult}`, 16 + comboW, comboY, 'bold 12px sans-serif', HUD.TEXT_LIGHT, 1);
    } else {
      // 0-4 hits: white, no multiplier
      hudText(comboText, 16, comboY, 'bold 14px sans-serif', HUD.TEXT_LIGHT, 1);
    }
    ctx.restore();
  }

  // === Sound mute icon ===
  if (soundMuteIconTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, soundMuteIconTimer / 0.3);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, canvas.width - 50, 50, 36, 28, 6); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(CONFIG.sound.enabled ? '🔊' : '🔇', canvas.width - 32, 70);
    ctx.restore();
  }

  // === Debug info (bottom-right) ===
  if (CONFIG.debug.showFPS) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    let debugY = canvas.height - 80;
    ctx.fillText(`FPS: ${currentFPS}`, canvas.width - 10, debugY); debugY += 14;
    ctx.fillText(`State: ${player.state}`, canvas.width - 10, debugY); debugY += 14;
    const dbgAlive = enemies.filter(e => !e.remove && !isEnemyDying(e)).length;
    const dbgAliveSeasons = enemies.filter(e => e.type === 'seasoning' && !e.remove && !isEnemyDying(e)).length;
    const rc_ = getRoomConfig(currentRoom);
    const dbgUnspawned = Math.max(0, (rc_.totalEnemies || 0) - waveSpawnedTotal);
    const dbgTotal = dbgAlive + dbgUnspawned;
    ctx.fillText(`Alive: ${dbgAlive} (sea:${dbgAliveSeasons}) Unspn:${dbgUnspawned} Total:${dbgTotal}`, canvas.width - 10, debugY); debugY += 14;
    ctx.fillText(`Kills: ${killCount} Cleared:${roomCleared}`, canvas.width - 10, debugY); debugY += 14;
    if (CONFIG.debug.showGauges) {
      if (player.state === 'normal') {
        ctx.fillText(`Combo: ${player.comboCount}`, canvas.width - 10, debugY); debugY += 14;
        const slotLabels = player.ingredientSlots.map(s => s === 'meat' ? 'M' : 'V').join(' ');
        ctx.fillText(`Slots: ${player.ingredientSlots.length}/${CONFIG.ingredientList.maxSlots} [${slotLabels}]`, canvas.width - 10, debugY); debugY += 14;
      } else if (player.state === 'enhance') {
        ctx.fillText(`EnhTimer: ${player.enhanceTimer.toFixed(1)}s`, canvas.width - 10, debugY); debugY += 14;
        ctx.fillText(`Finish: ${Math.floor(player.finishGauge)}/100`, canvas.width - 10, debugY); debugY += 14;
      }
      ctx.fillText(`DashCD: ${player.dashCooldownTimer > 0 ? player.dashCooldownTimer.toFixed(1) : 'OK'}`, canvas.width - 10, debugY);
    }
  }

  // Controls help (bottom-left, subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  const helpText = player.state === 'enhance'
    ? 'WASD:이동 Z:연타 X:대시 Z꾹:피니시'
    : 'WASD:이동 Z:공격 X:대시 C:강화';
  ctx.fillText(helpText, 10, canvas.height - 6);

  // === Room popup text ===
  if (roomPopupTimer > 0 && !roomTransitioning) {
    const alpha = roomPopupTimer > 0.5 ? 1 : roomPopupTimer / 0.5;
    const scale = roomPopupTimer > 1.7 ? 1.2 - (roomPopupTimer - 1.7) * 0.67 : 1.0;
    ctx.save();
    ctx.translate(canvas.width / 2, 100);
    ctx.scale(scale, scale);
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(roomPopupText, 0, 0);
    ctx.restore();
  }

  // === ALL CLEAR popup (with scale pop) ===
  if (clearPopupTimer > 0 && !roomTransitioning && !gameCleared) {
    const alpha = clearPopupTimer > 0.5 ? 1 : clearPopupTimer / 0.5;
    const popT = clamp(allClearPopScale / 0.2, 0, 1);
    const popScale = popT < 1 ? easeOutBack(popT) : 1;
    const cw = canvas.width, ch = canvas.height;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cw / 2, ch / 2 - 40);
    ctx.scale(popScale, popScale);

    const acFontSize = Math.round(cw * 0.06);
    hudText('ALL CLEAR!', 0, 0, `bold ${acFontSize}px sans-serif`, HUD.ACCENT, 3);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    const rc = getRoomConfig(currentRoom);
    if (rc.exitDirection) {
      const dirText = rc.exitDirection === 'right' ? '오른쪽' : (rc.exitDirection === 'up' ? '위쪽' : '왼쪽');
      hudText(`${dirText}으로 이동!`, cw / 2, ch / 2, '16px sans-serif', HUD.TEXT_LIGHT, 1);
    }
    ctx.restore();
  }

  // === Timer UI (top-right panel) ===
  if (!roomTransitioning) {
    const remaining = Math.max(0, TIME_LIMIT - gameTimer);
    const tMinutes = Math.floor(remaining / 60);
    const tSeconds = Math.floor(remaining % 60);
    const timerStr = `${tMinutes}:${tSeconds.toString().padStart(2, '0')}`;
    const urgent60 = remaining <= 60;
    const urgent30 = remaining <= 30;
    const timerPanelW = 90, timerPanelH = 26;
    const timerPanelX = canvas.width - 16 - timerPanelW;
    const timerPanelY = 12;

    ctx.save();
    // Panel bg
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    roundRect(ctx, timerPanelX, timerPanelY, timerPanelW, timerPanelH, 8); ctx.fill();
    // Panel border
    const tBorderColor = urgent30 ? HUD.DANGER : (enhanceToneAlpha > 0 ? lerpColor(HUD.OUTLINE, HUD.PRIMARY, enhanceToneAlpha) : HUD.OUTLINE);
    ctx.strokeStyle = tBorderColor;
    ctx.lineWidth = 2;
    roundRect(ctx, timerPanelX, timerPanelY, timerPanelW, timerPanelH, 8); ctx.stroke();
    ctx.lineWidth = 1;

    // Timer text with pulse
    let tScale = 1;
    if (urgent60) {
      const pPeriod = urgent30 ? 300 : 500;
      tScale = 1 + 0.05 * Math.sin(Date.now() / pPeriod * Math.PI * 2);
    }
    const tCx = timerPanelX + timerPanelW / 2;
    const tCy = timerPanelY + timerPanelH / 2 + 5;
    if (tScale !== 1) {
      ctx.translate(tCx, tCy); ctx.scale(tScale, tScale); ctx.translate(-tCx, -tCy);
    }
    const timerColor = urgent60 ? HUD.DANGER : HUD.TEXT_LIGHT;
    const timerFont = urgent60 ? 'bold 18px sans-serif' : 'bold 16px sans-serif';
    hudText(timerStr, tCx, tCy, timerFont, timerColor, 1);
    ctx.restore();

    // Emergency screen flash
    if (urgent60 && Math.floor(remaining) % 2 === 0) {
      ctx.fillStyle = 'rgba(255, 0, 0, 0.06)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // === Room info (top center) + Enemy counter ===
  if (!roomTransitioning) {
    const rc = getRoomConfig(currentRoom);
    const roomLabel = rc.type === 'boss' ? 'BOSS' : `ROOM ${currentRoom}`;
    const cw = canvas.width;
    const rlY = 8;

    // Measure text widths for panel sizing
    ctx.font = 'bold 14px sans-serif';
    const roomTextW = ctx.measureText(roomLabel).width;
    let enemyText = '';
    let enemyTextW = 0;

    if (rc.type !== 'boss') {
      const alive = enemies.filter(e => !isEnemyDying(e) && !e.remove).length;
      const totalWithSeasoning = rc.totalEnemies + (rc.seasoningCount || 0);
      const unspawned = Math.max(0, rc.totalEnemies - waveSpawnedTotal);
      const remaining = alive + unspawned;
      const isCleared = remaining === 0;
      enemyText = isCleared ? 'CLEAR!' : `적: ${remaining}/${totalWithSeasoning}`;
    } else {
      enemyText = 'BOSS';
    }
    ctx.font = '12px sans-serif';
    enemyTextW = ctx.measureText(enemyText).width;

    const panelW = Math.max(120, Math.max(roomTextW, enemyTextW) + 40);
    const panelH = 14 + 12 + 22 + 4; // top text + bottom text + padding + gap
    const panelX = cw / 2 - panelW / 2;

    // Panel background
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, panelX, rlY, panelW, panelH, 8); ctx.fill();
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 1;
    roundRect(ctx, panelX, rlY, panelW, panelH, 8); ctx.stroke();

    // Room label
    ctx.textAlign = 'center';
    hudText(roomLabel, cw / 2, rlY + 18, 'bold 14px sans-serif', HUD.TEXT_LIGHT, 1);

    // Enemy counter
    if (rc.type !== 'boss') {
      const alive = enemies.filter(e => !isEnemyDying(e) && !e.remove).length;
      const unspawned = Math.max(0, rc.totalEnemies - waveSpawnedTotal);
      const remaining = alive + unspawned;
      const isCleared = remaining === 0;
      if (isCleared) {
        hudText('CLEAR!', cw / 2, rlY + 40, 'bold 12px sans-serif', HUD.ACCENT, 1);
      } else {
        const totalWithSeasoning = rc.totalEnemies + (rc.seasoningCount || 0);
        hudText(`적: ${remaining}/${totalWithSeasoning}`, cw / 2, rlY + 40, '12px sans-serif', HUD.TEXT_LIGHT, 1);
      }
    } else {
      hudText('BOSS', cw / 2, rlY + 40, 'bold 12px sans-serif', HUD.DANGER, 1);
    }
  }

  // === Offscreen enemy indicators ===
  renderOffscreenIndicators();

  // Game Over
  if (gameOver) {
    const cw = canvas.width, ch = canvas.height;
    if (gameOverType === 'hp') {
      // Red vignette
      if (gameOverVignetteAlpha > 0) {
        const vigGrad = ctx.createRadialGradient(cw / 2, ch / 2, ch * 0.2, cw / 2, ch / 2, ch * 0.8);
        vigGrad.addColorStop(0, `rgba(0,0,0,0)`);
        vigGrad.addColorStop(1, `rgba(180,20,20,${0.6 * gameOverVignetteAlpha})`);
        ctx.fillStyle = vigGrad;
        ctx.fillRect(0, 0, cw, ch);
      }
      // GAME OVER text
      if (gameOverTextAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = gameOverTextAlpha;
        const goFontSize = Math.round(cw * 0.07);
        hudText('GAME OVER', cw / 2, ch / 2 - 10, `bold ${goFontSize}px sans-serif`, HUD.DANGER, 3);
        ctx.restore();
      }
    } else {
      // TIME UP: text expanding from timer position to center
      if (gameOverTextAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = gameOverTextAlpha;
        // Dark overlay
        ctx.fillStyle = `rgba(0,0,0,${0.4 * gameOverTextAlpha})`;
        ctx.fillRect(0, 0, cw, ch);
        const tuFontSize = Math.round(14 * timeUpScale);
        hudText('TIME UP!', cw / 2, timeUpY, `bold ${tuFontSize}px sans-serif`, HUD.DANGER, 3);
        ctx.restore();
      }
    }
  }

  // === Game Clear ===
  if (gameCleared && enemies.every(e => e.remove || isEnemyDying(e))) {
    ctx.fillStyle = 'rgba(255,255,200,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const clearFontSize = Math.round(canvas.width * 0.06);
    hudText('CLEAR!', canvas.width / 2, canvas.height / 2 - 20, `bold ${clearFontSize}px sans-serif`, HUD.ACCENT, 3);
    ctx.fillStyle = HUD.TEXT_LIGHT;
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`처치 수: ${killCount}`, canvas.width / 2, canvas.height / 2 + 20);
  }

  // === Room transition wipe overlay (very last) ===
  if (roomTransitioning && wipeProgress > 0) {
    const cw = canvas.width, ch = canvas.height;

    // Wipe curtain
    if (wipePhase === 2) {
      // Opening: curtain retreats right to left (right portion still covered)
      const curtainX = cw * (1 - wipeProgress);
      ctx.fillStyle = wipeBossSpecial && wipeBossColorAlpha > 0
        ? `rgba(${Math.round(60 * wipeBossColorAlpha)},${Math.round(10 * wipeBossColorAlpha)},${Math.round(10 * wipeBossColorAlpha)},1)`
        : '#000';
      ctx.fillRect(curtainX, 0, cw - curtainX, ch);
    } else {
      // Closing or holding: left to right fill
      const curtainW = cw * wipeProgress;
      if (wipeBossSpecial && wipeBossColorAlpha > 0 && wipePhase === 1) {
        // Boss: blend black → dark red
        const r = Math.round(lerp(0, 60, wipeBossColorAlpha));
        const g = Math.round(lerp(0, 10, wipeBossColorAlpha));
        const b = Math.round(lerp(0, 10, wipeBossColorAlpha));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, cw, ch);
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, curtainW, ch);
      }
    }

    // Room text on top of curtain (only during hold phase)
    if (wipePhase === 1) {
      const textScale = clamp(wipeTimer / 0.15, 0, 1);
      const nextRoom = currentRoom; // already loaded
      const isBossRoom = (nextRoom === 3);

      ctx.save();
      ctx.translate(cw / 2, ch / 2);
      ctx.scale(textScale, textScale);

      const roomFontSize = Math.round(cw * 0.05);

      if (isBossRoom) {
        // Boss text blink (2 times in 0.8s)
        const blinkOn = Math.floor(wipeTimer / 0.15) % 2 === 0 || wipeTimer > 0.6;
        if (blinkOn) {
          ctx.font = `bold ${roomFontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.strokeStyle = HUD.OUTLINE;
          ctx.lineWidth = 3;
          ctx.strokeText('BOSS ROOM', 0, 0);
          ctx.fillStyle = HUD.DANGER;
          ctx.fillText('BOSS ROOM', 0, 0);
          ctx.lineWidth = 1;
        }
        // Sub text
        ctx.fillStyle = HUD.DANGER;
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('각오하세요!', 0, 30);
      } else {
        ctx.font = `bold ${roomFontSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = HUD.OUTLINE;
        ctx.lineWidth = 3;
        ctx.strokeText(`ROOM ${nextRoom}`, 0, 0);
        ctx.fillStyle = HUD.TEXT_LIGHT;
        ctx.fillText(`ROOM ${nextRoom}`, 0, 0);
        ctx.lineWidth = 1;
        // Sub text
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = HUD.TEXT_LIGHT;
        ctx.font = '14px sans-serif';
        if (nextRoom === 2) ctx.fillText('채소가 많이 나옵니다', 0, 30);
      }
      ctx.restore();
    }
  }

  // === Start guide overlay ===
  if (guideOverlayActive) {
    ctx.save();
    ctx.globalAlpha = guideOverlayAlpha;

    // Dark background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Guide text
    const fontSize = Math.round(canvas.width * 0.035);
    const lineH = Math.round(canvas.height * 0.08);
    const lines = [
      '\u{1F52B} 적을 때려 정수를 모아라!',
      '\u{26A1} 게이지가 차면 C키로 강화 모드!',
      '\u{1F4A5} 강화 중 Z키를 꾹 눌러 피니시!',
    ];
    const totalH = lines.length * lineH;
    const startY = (canvas.height - totalH) / 2 + fontSize / 2;

    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], canvas.width / 2, startY + i * lineH);
    }

    // Bottom hint
    const hintSize = Math.round(canvas.width * 0.025);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = `${hintSize}px sans-serif`;
    ctx.fillText('아무 키를 누르면 시작', canvas.width / 2, canvas.height - 40);

    ctx.restore();
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function updateTitle(dt) {
  titleBlinkTimer += dt;
  titleAnimTimer += dt;
  // Button pop every 1.5s
  titlePopTimer += dt;
  if (titlePopTimer >= 1.5) titlePopTimer -= 1.5;

  if (keyJustPressed['KeyZ'] && titleAnimTimer > 0.8) {
    initAudio();
    if (!bgmNormal) loadBGM();
    currentScene = 'playing';
    startNewGame();
  }
}

function easeOutBounce(t) {
  if (t < 1 / 2.75) return 7.5625 * t * t;
  if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.75; }
  if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
  t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
}

function easeOutBack(t) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
}

function renderTitle() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cw = canvas.width, ch = canvas.height;

  // Background: cream
  ctx.fillStyle = '#FFF8E7';
  ctx.fillRect(0, 0, cw, ch);

  // Diagonal stripe pattern
  ctx.save();
  ctx.fillStyle = 'rgba(255,107,53,0.06)';
  ctx.rotate(-Math.PI / 4);
  const diagW = cw + ch;
  for (let i = -diagW; i < diagW * 2; i += 40) {
    ctx.fillRect(i, -diagW, 20, diagW * 3);
  }
  ctx.restore();

  // Bottom wave decoration (mint)
  ctx.fillStyle = 'rgba(78,205,196,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, ch);
  const waveY = ch * 0.82;
  for (let x = 0; x <= cw; x += 2) {
    const y = waveY + Math.sin(x / 80 + titleBlinkTimer * 0.5) * 12 + Math.sin(x / 40) * 6;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(cw, ch);
  ctx.closePath();
  ctx.fill();

  // === Title text with entrance animation ===
  const titleTargetY = ch * 0.30;
  const titleAnim = clamp(titleAnimTimer / 0.4, 0, 1);
  const titleY = titleTargetY - 50 * (1 - easeOutBounce(titleAnim));
  const titleAlpha = clamp(titleAnim, 0, 1);

  if (titleAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = titleAlpha;
    ctx.translate(cw / 2, titleY);
    ctx.rotate(-2 * Math.PI / 180); // -2 degree tilt

    const titleFontSize = Math.round(cw * 0.08);
    ctx.font = `bold ${titleFontSize}px sans-serif`;
    ctx.textAlign = 'center';

    // Drop shadow (3px offset)
    ctx.fillStyle = HUD.OUTLINE;
    ctx.fillText('CUISINAULT', 3, 3);

    // Outline
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.strokeText('CUISINAULT', 0, 0);

    // Fill
    ctx.fillStyle = HUD.PRIMARY;
    ctx.fillText('CUISINAULT', 0, 0);

    ctx.restore();
  }

  // === Start button ===
  const btnAnim = clamp((titleAnimTimer - 0.3) / 0.3, 0, 1);
  if (btnAnim > 0) {
    const btnTargetY = ch * 0.55;
    const btnY = btnTargetY + 30 * (1 - easeOutBack(btnAnim));
    const bounceY = Math.sin(titleBlinkTimer * Math.PI * 2 / 0.8) * 3;

    // Pop effect
    let btnScale = 1;
    if (titlePopTimer < 0.15) {
      const pt = titlePopTimer / 0.15;
      btnScale = 1 + 0.08 * Math.sin(pt * Math.PI);
    }

    ctx.save();
    ctx.globalAlpha = btnAnim;
    ctx.translate(cw / 2, btnY + bounceY);
    ctx.scale(btnScale, btnScale);

    const btnW = 200, btnH = 50, btnR = 25;

    // Shadow
    ctx.fillStyle = '#C0392B';
    roundRect(ctx, -btnW / 2, -btnH / 2 + 3, btnW, btnH, btnR); ctx.fill();

    // Button body
    ctx.fillStyle = HUD.PRIMARY;
    roundRect(ctx, -btnW / 2, -btnH / 2, btnW, btnH, btnR); ctx.fill();

    // Border
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 3;
    roundRect(ctx, -btnW / 2, -btnH / 2, btnW, btnH, btnR); ctx.stroke();
    ctx.lineWidth = 1;

    // Button text
    ctx.fillStyle = HUD.TEXT_LIGHT;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Z키로 시작!', 0, 7);
    ctx.restore();
  }

  // === Controls panel ===
  const ctrlAnim = clamp((titleAnimTimer - 0.5) / 0.3, 0, 1);
  if (ctrlAnim > 0) {
    ctx.save();
    ctx.globalAlpha = ctrlAnim;

    const panelW = 400, panelH = 72;
    const panelX = cw / 2 - panelW / 2;
    const panelY = ch * 0.80 - panelH / 2;

    // Panel bg
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    roundRect(ctx, panelX, panelY, panelW, panelH, 12); ctx.fill();
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 2;
    roundRect(ctx, panelX, panelY, panelW, panelH, 12); ctx.stroke();
    ctx.lineWidth = 1;

    // Key-cap style helper
    function drawKeyCap(text, x, y) {
      const kh = 18, kr = 4;
      ctx.font = 'bold 11px sans-serif';
      const textW = ctx.measureText(text).width;
      const kw = Math.max(30, textW + 16);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      roundRect(ctx, x - kw / 2, y - kh / 2, kw, kh, kr); ctx.fill();
      ctx.fillStyle = HUD.TEXT_LIGHT;
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(text, x, y + 4);
    }

    // Line 1: WASD 이동 | Z 공격 | X 대시 | C 강화
    const line1Y = panelY + 22;
    const line1Items = [
      { key: 'WASD', label: '이동' },
      { key: 'Z', label: '공격' },
      { key: 'X', label: '대시' },
      { key: 'C', label: '강화' },
    ];
    let lx = panelX + 30;
    ctx.font = 'bold 13px sans-serif';
    for (const item of line1Items) {
      drawKeyCap(item.key, lx + (item.key.length > 1 ? 12 : 0), line1Y);
      ctx.fillStyle = HUD.TEXT_LIGHT;
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(item.label, lx + (item.key.length > 1 ? 26 : 14), line1Y + 5);
      lx += item.key.length > 2 ? 100 : (item.key.length > 1 ? 80 : 60);
      if (item !== line1Items[line1Items.length - 1]) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('|', lx - 16, line1Y + 5);
      }
    }

    // Line 2: V 피니시(꾹) | D 디버그
    const line2Y = panelY + 50;
    const line2Items = [
      { key: 'Z꾹', label: '피니시' },
      { key: 'D', label: '디버그' },
    ];
    lx = panelX + 110;
    for (const item of line2Items) {
      drawKeyCap(item.key, lx + (item.key.length > 1 ? 12 : 0), line2Y);
      ctx.fillStyle = HUD.TEXT_LIGHT;
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(item.label, lx + (item.key.length > 1 ? 26 : 14), line2Y + 5);
      lx += item.key.length > 1 ? 100 : 80;
      if (item !== line2Items[line2Items.length - 1]) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('|', lx - 16, line2Y + 5);
      }
    }

    ctx.restore();
  }
}

// ============================================================
// RESULT SCREEN
// ============================================================
function calculateStars() {
  let stars = 1;
  const hpPercent = player.hp / CONFIG.player.maxHp;
  if (hpPercent >= STAR_CRITERIA.star2_hpPercent) stars = 2;
  if (stars >= 2 && gameTimer <= STAR_CRITERIA.star3_timeSeconds) stars = 3;
  return stars;
}

function updateResult(dt) {
  resultAnimTimer += dt;

  // Overlay fade-in (0.3s)
  resultOverlayAlpha = clamp(resultAnimTimer / 0.3, 0, 1);

  // Card slide-in (starts at 0.3s, 0.35s duration)
  const cardT = clamp((resultAnimTimer - 0.3) / 0.35, 0, 1);
  resultCardY = -40 * (1 - easeOutBack(cardT));

  // Star timers
  for (let i = 0; i < 3; i++) {
    const starDelay = 0.5 + i * 0.5;
    resultStarTimers[i] = clamp(resultAnimTimer - starDelay, 0, 10);
  }

  // Stat reveal (after last star)
  const statDelay = 2.0 + 0.3;
  resultStatReveal = clamp(resultAnimTimer - statDelay, 0, 10);

  // Button reveal
  resultBtnReveal = clamp(resultAnimTimer - statDelay - 0.6, 0, 10);

  // Gold particles for clear
  if (resultCleared && resultParticles.length < 12 && Math.random() < 0.05) {
    resultParticles.push({
      x: Math.random() * canvas.width,
      y: canvas.height + 10,
      vx: (Math.random() - 0.5) * 20,
      vy: -20 - Math.random() * 10,
      size: 4 + Math.random() * 4,
      alpha: 0.3,
    });
  }
  for (let i = resultParticles.length - 1; i >= 0; i--) {
    const p = resultParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx += Math.sin(p.y / 30) * dt * 5;
    if (p.y < -20) resultParticles.splice(i, 1);
  }

  // Input (after buttons revealed)
  if (resultBtnReveal > 0.3) {
    if (keyJustPressed['KeyZ']) {
      currentScene = 'playing';
      startNewGame();
    }
    if (keyJustPressed['KeyX']) {
      stopBGM();
      currentScene = 'title';
      resultAnimTimer = 0;
      titleAnimTimer = 0;
    }
  }
}

function renderResult() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cw = canvas.width, ch = canvas.height;

  // Dark overlay
  const overlayA = resultCleared ? 0.6 : 0.7;
  ctx.fillStyle = `rgba(0,0,0,${overlayA * resultOverlayAlpha})`;
  ctx.fillRect(0, 0, cw, ch);

  // Gold particles
  for (const p of resultParticles) {
    ctx.fillStyle = `rgba(255,230,109,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Card
  if (resultAnimTimer < 0.3) return; // wait for overlay
  const cardW = 420, cardH = 420, cardR = 16;
  const cardX = cw / 2 - cardW / 2;
  const cardY = ch / 2 - cardH / 2 + resultCardY;

  ctx.save();
  // Card shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, cardX + 4, cardY + 4, cardW, cardH, cardR); ctx.fill();

  // Card body
  ctx.fillStyle = 'rgba(255,248,231,0.95)';
  roundRect(ctx, cardX, cardY, cardW, cardH, cardR); ctx.fill();
  ctx.strokeStyle = HUD.OUTLINE;
  ctx.lineWidth = 3;
  roundRect(ctx, cardX, cardY, cardW, cardH, cardR); ctx.stroke();
  ctx.lineWidth = 1;

  // Top banner
  const bannerH = 50;
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, cardX, cardY, cardW, bannerH, cardR);
  ctx.clip();
  ctx.fillStyle = resultCleared ? HUD.PRIMARY : HUD.DANGER;
  ctx.fillRect(cardX, cardY, cardW, bannerH);
  ctx.restore();

  // Banner text (typewriter effect)
  const bannerFullText = resultCleared ? 'STAGE CLEAR!' : 'GAME OVER';
  const bannerAnim = clamp((resultAnimTimer - 0.3) / 0.35, 0, 1);
  const charsShown = Math.floor(bannerFullText.length * clamp((resultAnimTimer - 0.3) / (bannerFullText.length * 0.05), 0, 1));
  const bannerText = bannerFullText.substring(0, charsShown);
  ctx.fillStyle = HUD.TEXT_LIGHT;
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(bannerText, cw / 2, cardY + 32);

  // === Stars (clear only) ===
  if (resultCleared) {
    const starY = cardY + bannerH + 36;
    const starSpacing = 56;
    const starSize = 20;

    for (let i = 0; i < 3; i++) {
      const st = resultStarTimers[i];
      if (st <= 0) continue;
      const earned = i < resultStars;
      const sx = cw / 2 + (i - 1) * starSpacing;

      // Scale animation: 0→1.3→1.0 in 0.25s
      let sScale = 1;
      if (st < 0.25) {
        const t = st / 0.25;
        sScale = easeOutBack(t);
      }

      ctx.save();
      ctx.translate(sx, starY);
      ctx.scale(sScale, sScale);

      if (earned) {
        // Radial rays (4 diagonal, visible briefly)
        if (st < 0.3) {
          const rayAlpha = 1 - st / 0.3;
          const rayLen = 30 * (st / 0.3);
          ctx.strokeStyle = `rgba(255,215,0,${rayAlpha * 0.6})`;
          ctx.lineWidth = 2;
          for (let a = 0; a < 4; a++) {
            const angle = Math.PI / 4 + a * Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * starSize * 0.5, Math.sin(angle) * starSize * 0.5);
            ctx.lineTo(Math.cos(angle) * (starSize * 0.5 + rayLen), Math.sin(angle) * (starSize * 0.5 + rayLen));
            ctx.stroke();
          }
          ctx.lineWidth = 1;
        }

        // Glow
        ctx.shadowColor = 'rgba(255,215,0,0.4)';
        ctx.shadowBlur = 10;

        // Star gradient fill
        const sGrad = ctx.createRadialGradient(0, -4, 2, 0, 0, starSize);
        sGrad.addColorStop(0, '#FFE566');
        sGrad.addColorStop(1, '#DAA520');
        ctx.fillStyle = sGrad;
        drawStar(ctx, 0, 0, starSize, 5);

        ctx.shadowBlur = 0;

        // Outline
        ctx.strokeStyle = '#B8860B';
        ctx.lineWidth = 2;
        ctx.beginPath();
        drawStar(ctx, 0, 0, starSize, 5);
        ctx.lineWidth = 1;

        // Top highlight
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.arc(0, -starSize * 0.25, starSize * 0.4, 0, Math.PI, true);
        ctx.fill();
      } else {
        // Empty star
        ctx.globalAlpha = clamp(st / 0.2, 0, 1);
        ctx.fillStyle = 'rgba(200,200,195,0.3)';
        drawStar(ctx, 0, 0, starSize, 5);
        ctx.strokeStyle = 'rgba(180,180,175,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        drawStar(ctx, 0, 0, starSize, 5);
        ctx.lineWidth = 1;
      }
      ctx.restore();
    }

    // Star conditions text (3 vertical lines)
    const condStartY = cardY + bannerH + 62;
    const condTexts = [
      { text: '★ 클리어', earned: resultStars >= 1 },
      { text: '★★ HP 30% 이상', earned: resultStars >= 2 },
      { text: `★★★ ${Math.floor(STAR_CRITERIA.star3_timeSeconds / 60)}분 이내`, earned: resultStars >= 3 },
    ];
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    for (let i = 0; i < 3; i++) {
      const cy = condStartY + i * 28;
      const cond = condTexts[i];
      ctx.fillStyle = cond.earned ? '#DAA520' : 'rgba(150,150,150,0.6)';
      const prefix = cond.earned ? '✓ ' : '   ';
      ctx.fillText(prefix + cond.text, cardX + 30, cy);
    }
  }

  // === Stats ===
  const statsBaseY = resultCleared ? cardY + bannerH + 160 : cardY + bannerH + 40;
  const minutes = Math.floor(resultTime / 60);
  const seconds = Math.floor(resultTime % 60);
  const statLines = resultCleared
    ? [
        `클리어 시간: ${minutes}:${seconds.toString().padStart(2, '0')}`,
        `남은 체력: ${resultHP}/${CONFIG.player.maxHp}`,
        `처치 수: ${killCount}마리`,
      ]
    : [
        `실패 원인: ${gameTimer >= TIME_LIMIT ? '시간 초과' : 'HP 0'}`,
        `남은 체력: ${resultHP}/${CONFIG.player.maxHp}`,
        `처치 수: ${killCount}마리`,
      ];

  for (let i = 0; i < statLines.length; i++) {
    const lineDelay = i * 0.15;
    const lineAlpha = clamp((resultStatReveal - lineDelay) / 0.2, 0, 1);
    if (lineAlpha <= 0) continue;

    const ly = statsBaseY + i * 28;
    // Alternating row bg
    if (i % 2 === 0) {
      ctx.fillStyle = `rgba(0,0,0,${0.03 * lineAlpha})`;
      ctx.fillRect(cardX + 30, ly - 14, cardW - 60, 24);
    }
    ctx.save();
    ctx.globalAlpha = lineAlpha;
    ctx.fillStyle = HUD.TEXT;
    ctx.font = '15px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(statLines[i], cw / 2, ly + 2);
    ctx.restore();
  }

  // === Buttons ===
  if (resultBtnReveal > 0) {
    const btnAlpha = clamp(resultBtnReveal / 0.3, 0, 1);
    const btnOffsetY = 15 * (1 - easeOutBack(clamp(resultBtnReveal / 0.3, 0, 1)));
    const btnY = cardY + cardH - 55 + btnOffsetY;
    const btnW = 160, btnH2 = 42, btnR2 = 21;
    const gap = 20;

    ctx.save();
    ctx.globalAlpha = btnAlpha;

    // Retry button (Z) — shadow + body + border (title button style)
    const rbX = cw / 2 - btnW - gap / 2;
    ctx.fillStyle = '#C0392B';
    roundRect(ctx, rbX, btnY + 3, btnW, btnH2, btnR2); ctx.fill();
    ctx.fillStyle = HUD.PRIMARY;
    roundRect(ctx, rbX, btnY, btnW, btnH2, btnR2); ctx.fill();
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 3;
    roundRect(ctx, rbX, btnY, btnW, btnH2, btnR2); ctx.stroke();
    // Z keycap
    const kcSize = 24;
    const kcX_r = rbX + btnW / 2 - 44;
    const kcY_r = btnY + btnH2 / 2 - kcSize / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, kcX_r, kcY_r, kcSize, kcSize, 5); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, kcX_r, kcY_r, kcSize, kcSize, 5); ctx.stroke();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Z', kcX_r + kcSize / 2, kcY_r + kcSize / 2 + 4);
    // label
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('재도전', rbX + btnW / 2 + 10, btnY + btnH2 / 2 + 5);

    // Title button (X) — shadow + body + border (title button style)
    const tbX = cw / 2 + gap / 2;
    ctx.fillStyle = '#3BA89F';
    roundRect(ctx, tbX, btnY + 3, btnW, btnH2, btnR2); ctx.fill();
    ctx.fillStyle = HUD.SECONDARY;
    roundRect(ctx, tbX, btnY, btnW, btnH2, btnR2); ctx.fill();
    ctx.strokeStyle = HUD.OUTLINE;
    ctx.lineWidth = 3;
    roundRect(ctx, tbX, btnY, btnW, btnH2, btnR2); ctx.stroke();
    // X keycap
    const kcX_t = tbX + btnW / 2 - 44;
    const kcY_t = btnY + btnH2 / 2 - kcSize / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, kcX_t, kcY_t, kcSize, kcSize, 5); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, kcX_t, kcY_t, kcSize, kcSize, 5); ctx.stroke();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('X', kcX_t + kcSize / 2, kcY_t + kcSize / 2 + 4);
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('타이틀', tbX + btnW / 2 + 10, btnY + btnH2 / 2 + 5);

    ctx.lineWidth = 1;
    ctx.restore();
  }

  ctx.restore(); // card save
}

// ============================================================
// OFFSCREEN INDICATORS
// ============================================================
function renderOffscreenIndicators() {
  const viewLeft = camera.x;
  const viewRight = camera.x + CONFIG.canvas.width;
  const viewTop = camera.y;
  const viewBottom = camera.y + CONFIG.canvas.height;

  for (const e of enemies) {
    if (e.remove || isEnemyDying(e)) continue;

    const eSize = e.type === 'seasoning' ? CONFIG.enemy_seasoning.size
      : e.isBoss ? CONFIG.enemy_boss.size
      : e.type === 'veg' ? CONFIG.enemy_veg.size : CONFIG.enemy_pig.size;
    const ex = e.x;
    const ey = e.y + eSize.height / 2;

    if (ex >= viewLeft && ex <= viewRight && ey >= viewTop && ey <= viewBottom) continue;

    const screenX = clamp(ex - camera.x, 20, CONFIG.canvas.width - 20);
    const screenY = clamp(ey - camera.y, 40, CONFIG.canvas.height - 50);

    const color = e.type === 'seasoning' ? '#FFD700' : e.type === 'veg' ? '#66BB6A' : (e.isBoss ? '#FF2222' : '#FF69B4');
    const alpha = 0.7 + 0.3 * Math.sin(Date.now() / 300);

    ctx.save();
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.translate(screenX, screenY);

    const angle = Math.atan2(ey - (camera.y + CONFIG.canvas.height / 2), ex - (camera.x + CONFIG.canvas.width / 2));
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-5, -6);
    ctx.lineTo(-5, 6);
    ctx.closePath();
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============================================================
// START NEW GAME
// ============================================================
function startNewGame() {
  resetPlayer();
  enemies = [];
  projectiles = [];
  healTexts = [];
  enemyIdCounter = 0;
  killCount = 0;
  gameOver = false;
  gameCleared = false;
  currentRoom = 1;
  roomCleared = false;
  roomTransitioning = false;
  hitstopFrames = 0;
  shakeIntensity = 0; shakeOffsetX = 0; shakeOffsetY = 0;
  screenFlashTimer = 0;
  vignetteTimer = 0;
  currentRecipe = null;
  recipeNameTimer = 0;
  finishSuctionActive = false;
  suctionParticles.length = 0;
  shockwaves.length = 0;
  gameTimer = 0;
  resultTransitionTimer = 0;
  clearPopupTimer = 0;
  minionSpawnTimer = 0;
  minionInitialTimer = 0;
  minionInitialCount = 0;
  seasoningSpawnTimer = 0;
  staleEnemyTimer = 0;
  essenceOrbs.length = 0;
  essenceBursts.length = 0;
  gameTimeScale = 1.0;
  enhanceTransitionTimer = 0;
  enhanceTransitionPhase = 0;
  cameraZoom = 1.0;
  enhanceFlashTimer = 0;
  radialLines.length = 0;
  particles.length = 0;
  auraParticles.length = 0;
  fireflies.length = 0;
  bossEntrance.active = false;
  bossHpGhost = 1.0;
  bossHpGhostDelay = 0;
  enhanceToneAlpha = 0;
  playerHpGhost = 1.0;
  playerHpGhostDelay = 0;
  comboPopTimer = 0;
  lastComboCount = 0;
  // Title/result/transition resets
  titleAnimTimer = 0;
  titlePopTimer = 0;
  resultCardY = -40;
  resultOverlayAlpha = 0;
  resultStarTimers = [0, 0, 0];
  resultStatReveal = 0;
  resultBtnReveal = 0;
  resultParticles = [];
  wipeProgress = 0;
  wipePhase = 0;
  wipeTimer = 0;
  wipeBossSpecial = false;
  wipeBossColorAlpha = 0;
  gameOverAnimTimer = 0;
  gameOverType = '';
  gameOverSlowmo = false;
  gameOverVignetteAlpha = 0;
  gameOverTextAlpha = 0;
  timeUpScale = 1;
  timeUpY = 0;
  allClearSlowmoTimer = 0;
  allClearPopScale = 0;
  // Start guide overlay (show every new game)
  guideOverlayActive = true;
  guideOverlayAlpha = 1.0;
  guideOverlayFading = false;
  guideOverlayShown = false;
  restartBtn.style.display = 'none';
  finishChargeSfxTimer = 0;
  comicTexts.length = 0;
  damageNumbers.length = 0;
  comicHitEffects.length = 0;
  initRoom(1);
  playBGM(bgmNormal);
}

// ============================================================
// UPDATE PLAYING
// ============================================================
function updatePlaying(rawDt) {
  // Guide overlay: pause game while active
  if (guideOverlayActive) {
    if (guideOverlayFading) {
      guideOverlayAlpha -= rawDt / 0.3;
      if (guideOverlayAlpha <= 0) {
        guideOverlayAlpha = 0;
        guideOverlayActive = false;
        guideOverlayShown = true;
      }
    } else {
      // Check for any key press to start fadeout
      for (const key in keyJustPressed) {
        if (keyJustPressed[key]) {
          guideOverlayFading = true;
          break;
        }
      }
    }
    return; // game paused while overlay active
  }

  // Hitstop: skip update
  if (hitstopFrames > 0) {
    hitstopFrames--;
    return;
  }
  // Apply time scale for slowmo effects (transition effects use rawDt)
  const dt = rawDt * gameTimeScale;

  // Dash invincibility timer (real time, not affected by slowmo)
  if (player.dashInvincibleTimer > 0) player.dashInvincibleTimer -= rawDt;

  if (!gameOver && !gameCleared) {
    // Game timer
    if (!roomTransitioning) {
      gameTimer += dt;
      if (gameTimer >= TIME_LIMIT) {
        gameOver = true;
        gameOverType = 'time';
        gameOverAnimTimer = 0;
        gameOverSlowmo = true;
        gameTimeScale = 0;  // freeze
      }
    }

    if (!roomTransitioning) {
      updatePlayer(dt);
      checkPlayerAttackHits();

      for (const e of enemies) {
        if (e.type === 'veg') updateVeg(e, dt);
        else if (e.type === 'seasoning') updateSeasoning(e, dt);
        else updatePig(e, dt);
      }
      updateProjectiles(dt);

      const before = enemies.length;
      enemies = enemies.filter(e => !e.remove);
      killCount += before - enemies.length;

      updateWaveSpawner(dt);
      updateBossRoomMinions(dt);
      updateBossEntrance(rawDt);
      checkExitZone();

      // Enemy retreat safety valve: if maxOnScreen reached for 20s, remove farthest enemy
      const rc = getRoomConfig(currentRoom);
      if (rc) {
        const aliveCount = enemies.filter(e => !isEnemyDying(e) && !e.remove && e.type !== 'seasoning').length;
        if (aliveCount >= rc.maxOnScreen) {
          staleEnemyTimer += dt;
          if (staleEnemyTimer >= 20) {
            // Find farthest non-dying, non-boss, non-seasoning enemy from player
            let farthestEnemy = null;
            let farthestDist = 0;
            for (const e of enemies) {
              if (isEnemyDying(e) || e.remove || e.isBoss || e.type === 'seasoning') continue;
              const d = Math.abs(e.x - player.x);
              if (d > farthestDist) { farthestDist = d; farthestEnemy = e; }
            }
            if (farthestEnemy) {
              farthestEnemy.remove = true; // silently remove
            }
            staleEnemyTimer = 0;
          }
        } else {
          staleEnemyTimer = 0;
        }
      }

      // Heal texts update
      for (let i = healTexts.length - 1; i >= 0; i--) {
        healTexts[i].timer -= dt;
        healTexts[i].y -= 40 * dt;
        if (healTexts[i].timer <= 0) healTexts.splice(i, 1);
      }
    }
    updateRoomTransition(dt);
    if (roomTitleTimer > 0) roomTitleTimer -= dt;
    if (roomPopupTimer > 0) roomPopupTimer -= dt;
    if (clearPopupTimer > 0) clearPopupTimer -= dt;
    updateCamera(player);
    updateShake(dt);

    // Screen flash decay
    if (screenFlashTimer > 0) screenFlashTimer -= dt;
    if (vignetteTimer > 0) { vignetteTimer -= dt; if (vignetteTimer < 0) vignetteTimer = 0; }
    if (recipeNameTimer > 0) { recipeNameTimer -= dt; if (recipeNameTimer < 0) recipeNameTimer = 0; }

    // Enhance tone shift (0.3s transition)
    const enhTarget = (player.state === 'enhance' || player.state === 'finish') ? 1 : 0;
    if (enhanceToneAlpha < enhTarget) enhanceToneAlpha = Math.min(enhTarget, enhanceToneAlpha + rawDt / 0.3);
    else if (enhanceToneAlpha > enhTarget) enhanceToneAlpha = Math.max(enhTarget, enhanceToneAlpha - rawDt / 0.3);

    // Player HP ghost bar (0.5s delayed shrink)
    const hpRatioNow = player.hp / CONFIG.player.maxHp;
    if (playerHpGhostDelay > 0) { playerHpGhostDelay -= rawDt; }
    else if (playerHpGhost > hpRatioNow) { playerHpGhost = Math.max(hpRatioNow, playerHpGhost - rawDt * 1.5); }
    if (playerHpGhost < hpRatioNow) playerHpGhost = hpRatioNow;

    // Combo pop
    if (comboPopTimer > 0) comboPopTimer -= rawDt;
    if (player.comboCount > lastComboCount && player.comboCount > 0) comboPopTimer = 0.1;
    lastComboCount = player.comboCount;

    // Suction particles update
    for (let i = suctionParticles.length - 1; i >= 0; i--) {
      const sp = suctionParticles[i];
      sp.x += sp.vx * dt;
      sp.y += sp.vy * dt;
      sp.life -= dt;
      if (sp.life <= 0) suctionParticles.splice(i, 1);
    }

    // Essence orbs update (easeOut movement toward player, rawDt for smooth visuals)
    for (let i = essenceOrbs.length - 1; i >= 0; i--) {
      const orb = essenceOrbs[i];
      orb.timer += rawDt;
      // Update target to current player position
      orb.tx = player.x;
      orb.ty = player.y - CONFIG.player.size.height / 2;
      if (orb.timer >= orb.duration) {
        // Spawn burst at arrival
        const burstParticles = [];
        const count = 4 + Math.floor(Math.random() * 3);
        for (let j = 0; j < count; j++) {
          const angle = (Math.PI * 2 / count) * j + Math.random() * 0.5;
          burstParticles.push({
            x: orb.tx, y: orb.ty,
            vx: Math.cos(angle) * (40 + Math.random() * 30),
            vy: Math.sin(angle) * (40 + Math.random() * 30),
          });
        }
        essenceBursts.push({ x: orb.tx, y: orb.ty, timer: 0.15, color: orb.color, particles: burstParticles });
        essenceOrbs.splice(i, 1);
      }
    }

    // Essence bursts update (rawDt)
    for (let i = essenceBursts.length - 1; i >= 0; i--) {
      const b = essenceBursts[i];
      b.timer -= rawDt;
      if (b.particles) {
        for (const p of b.particles) {
          p.x += p.vx * rawDt;
          p.y += p.vy * rawDt;
        }
      }
      if (b.timer <= 0) essenceBursts.splice(i, 1);
    }

    // Enhance transition effect update (uses rawDt — real time, not scaled)
    if (enhanceTransitionPhase === 1) {
      enhanceTransitionTimer -= rawDt;
      // Slowmo phase: timeScale = 0.2, zoom toward 1.25
      gameTimeScale = 0.2;
      cameraZoom = 1.0 + 0.25 * (1 - Math.max(0, enhanceTransitionTimer) / 0.45);
      if (enhanceTransitionTimer <= 0) {
        enhanceTransitionPhase = 2;
        enhanceTransitionTimer = 0.2; // recovery phase
      }
    } else if (enhanceTransitionPhase === 2) {
      enhanceTransitionTimer -= rawDt;
      // Recovery phase: timeScale back to 1, zoom back to 1
      const t = Math.max(0, enhanceTransitionTimer) / 0.2;
      gameTimeScale = 1.0 - 0.8 * t; // 0.2 -> 1.0
      cameraZoom = 1.0 + 0.25 * t;   // 1.25 -> 1.0
      if (enhanceTransitionTimer <= 0) {
        enhanceTransitionPhase = 0;
        gameTimeScale = 1.0;
        cameraZoom = 1.0;
      }
    }

    // Orange flash decay (rawDt)
    if (enhanceFlashTimer > 0) enhanceFlashTimer -= rawDt;

    // Radial lines update (rawDt)
    for (let i = radialLines.length - 1; i >= 0; i--) {
      const rl = radialLines[i];
      rl.timer -= rawDt;
      if (rl.timer <= 0) { radialLines.splice(i, 1); continue; }
      const progress = 1 - rl.timer / 0.3;
      rl.length = rl.maxLength * progress;
    }

    // Steak buff timer
    if (player.steakBuff.active) {
      player.steakBuff.timer -= dt;
      if (player.steakBuff.timer <= 0) {
        player.steakBuff.active = false;
        player.steakBuff.damageMult = 1.0;
      }
    }

    // Shockwave update
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      if (sw.delay > 0) { sw.delay -= dt; continue; }
      sw.timer -= dt;
      if (sw.timer <= 0) shockwaves.splice(i, 1);
    }

    // Particle engine update
    updateParticles(rawDt);
    // Aura update
    updateAura(rawDt, player.x, player.y + CONFIG.player.size.height / 2, player.state === 'enhance' && !player.finishActive);
    // Fireflies for boss room
    updateFireflies(rawDt, currentRoom === 3);
  }

  // ALL CLEAR slowmo recovery
  if (allClearSlowmoTimer > 0) {
    allClearSlowmoTimer -= rawDt;
    allClearPopScale = clamp(1 - allClearSlowmoTimer / 0.5, 0, 1);
    if (allClearSlowmoTimer <= 0) {
      gameTimeScale = 1.0;
      allClearSlowmoTimer = 0;
    }
  }

  // Game over animation (runs on rawDt so not affected by slowmo)
  if (gameOver && gameOverSlowmo) {
    gameOverAnimTimer += rawDt;
    if (gameOverType === 'hp') {
      // HP=0: 0.8s slowmo, vignette grows, then GAME OVER text
      gameOverVignetteAlpha = clamp(gameOverAnimTimer / 0.5, 0, 1);
      gameOverTextAlpha = clamp((gameOverAnimTimer - 0.3) / 0.5, 0, 1);
      if (gameOverAnimTimer >= 0.8) {
        gameTimeScale = 1.0;
        gameOverSlowmo = false;
      }
    } else {
      // Time up: 0.5s freeze, text expands
      gameOverTextAlpha = clamp(gameOverAnimTimer / 0.4, 0, 1);
      const expandT = clamp(gameOverAnimTimer / 0.4, 0, 1);
      timeUpScale = 1 + (Math.round(canvas.width * 0.07) / 14 - 1) * expandT;
      timeUpY = lerp(12, canvas.height / 2, expandT);
      if (gameOverAnimTimer >= 0.5) {
        gameTimeScale = 1.0;
        gameOverSlowmo = false;
      }
    }
  }

  // Result transition
  if ((gameCleared || gameOver) && currentScene === 'playing') {
    resultTransitionTimer += rawDt; // use rawDt so transition works even during slowmo
    if (resultTransitionTimer >= 2.0) {
      currentScene = 'result';
      stopBGM();
      resultStars = gameCleared ? calculateStars() : 0;
      resultTime = gameTimer;
      resultHP = player.hp;
      resultCleared = gameCleared;
      resultAnimTimer = 0;
      resultCardY = -40;
      resultOverlayAlpha = 0;
      resultStarTimers = [0, 0, 0];
      resultStatReveal = 0;
      resultBtnReveal = 0;
      resultParticles = [];
      gameTimeScale = 1.0;
    }
  }
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let currentFPS = 60;
let fpsAccum = 0;
let fpsFrames = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  fpsAccum += dt;
  fpsFrames++;
  if (fpsAccum >= 0.5) {
    currentFPS = Math.round(fpsFrames / fpsAccum);
    fpsAccum = 0;
    fpsFrames = 0;
  }

  switch (currentScene) {
    case 'title':
      updateTitle(dt);
      renderTitle();
      break;
    case 'playing':
      updatePlaying(dt);
      renderPlaying();
      break;
    case 'result':
      updateResult(dt);
      renderResult();
      break;
  }

  // Sound mute icon timer
  if (soundMuteIconTimer > 0) soundMuteIconTimer -= rawDt;

  // Debug toggle (D key)
  if (keyJustPressed['KeyD']) {
    CONFIG.debug.showHitboxes = !CONFIG.debug.showHitboxes;
    CONFIG.debug.showGauges = !CONFIG.debug.showGauges;
    CONFIG.debug.showFPS = !CONFIG.debug.showFPS;
  }

  for (const k in keyJustPressed) delete keyJustPressed[k];
  for (const k in keyJustReleased) delete keyJustReleased[k];
}

// ============================================================
// START
// ============================================================
preloadAssets(() => {
  requestAnimationFrame(gameLoop);
});
</script>
