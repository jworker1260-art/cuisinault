function initAudio() {
  if (!audioCtx) {

}

function loadBGM() {
  bgmNormal = new Audio('sounds/bgm_normal.mp3');

  bgmNormal.onerror = () => {};

  bgmBoss.loop = true;
  bgmBoss.volume = CONFIG.sound.bgmVolume;
  bgmBoss.onerror = () => {};
}

function playBGM(track) {
  if (!CONFIG.sound.enabled || !track) return;
  if (currentBgm) { currentBgm.pause(); currentBgm.currentTime = 0; }
  currentBgm = track;
  currentBgm.play().catch(() => {});
}

function stopBGM() {
  if (currentBgm) { currentBgm.pause(); currentBgm.currentTime = 0; currentBgm = null; }
}

  if (!audioCtx || !CONFIG.sound.enabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
  gain.gain.setValueAtTime(CONFIG.sound.sfxVolume * 0.6, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}

const loadedImages = {};

function preloadAssets(callback) {
  const entries = [];
  function collect(obj, prefix) {
    for (const key in obj) {
      const val = obj[key];
      if (typeof val === 'string') {
        entries.push({ path: prefix + '.' + key, src: val });
      } else if (typeof val === 'object' && val !== null) {
        collect(val, prefix + '.' + key);
      }
    }
  }
  collect(ASSETS.images, 'images');
  if (entries.length === 0) { callback(); return; }
  let loaded = 0;
  entries.forEach(e => {
    const img = new Image();
    img.onload = () => { console.log('IMAGE LOADED OK: ' + e.src + ' (' + img.naturalWidth + 'x' + img.naturalHeight + ')'); loaded++; if (loaded >= entries.length) callback(); };
    img.onerror = () => { console.error('IMAGE LOAD FAILED: ' + e.src); loaded++; if (loaded >= entries.length) callback(); };
    img.src = e.src;
    loadedImages[e.path] = img;
  });
}

function getAssetImage(path) {
  return loadedImages[path] || null;
}

// Map enemy type + state to ASSETS key (e.g. 'images.enemies.pig.idle')
function getEnemyAssetKey(type, state) {
  let stateKey = 'idle';
  if (type === 'pig' || type === 'boss') {
    if (state === PIG_STATES.TELEGRAPH) stateKey = 'telegraph';
    else if (state === PIG_STATES.CHARGE) stateKey = 'attack';
    else if (state === PIG_STATES.HIT_STUN) stateKey = 'hit';
  } else if (type === 'veggie') {
    if (state === VEG_STATES.TELEGRAPH || state === VEG_STATES.ATTACK) stateKey = 'telegraph';
    else if (state === VEG_STATES.STAGGER) stateKey = 'hit';
  } else if (type === 'seasoning') {
    if (state === SEASONING_STATES.FLEE) stateKey = 'flee';
    else if (state === SEASONING_STATES.CORNERED_CHARGE || state === SEASONING_STATES.COUNTER_ATTACK) stateKey = 'counter';
  }
  return `images.enemies.${type}.${stateKey}`;
}

// Draw asset image centered at entity position, fitting within w×h
// Returns true if image was drawn, false if fallback needed
function drawAssetSprite(ctx, assetKey, x, y, w, h, facingRight, flashWhite) {
  const img = loadedImages[assetKey];
  if (!img || !img.complete || img.naturalWidth === 0) return false;

  ctx.save();
  // Flip horizontally if facing left
  if (!facingRight) {
    ctx.translate(x, 0);
    ctx.scale(-1, 1);
    ctx.translate(-x, 0);
  }
  // Calculate draw dimensions preserving aspect ratio
  const aspect = img.naturalWidth / img.naturalHeight;
  let dw, dh;
  if (aspect > w / h) {
    dw = w; dh = w / aspect;
  } else {
    dh = h; dw = h * aspect;
  }
  const dx = x - dw / 2;
  const dy = y + h - dh; // align bottom
  // White flash on hit using CSS filter
  if (flashWhite) {
    ctx.filter = 'brightness(3)';
  }
  ctx.drawImage(img, dx, dy, dw, dh);
  if (flashWhite) {
    ctx.filter = 'none';
  }
  ctx.restore();
  return true;
}

// ============================================================
// PARTICLE ENGINE (generic pool)
// ============================================================
const particles = []; // max ~200 active
const MAX_PARTICLES = 200;

function spawnParticle(opts) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({
    x: opts.x || 0, y: opts.y || 0,
    vx: opts.vx || 0, vy: opts.vy || 0,
    ax: opts.ax || 0, ay: opts.ay || 0,
    life: opts.life || 0.3, maxLife: opts.life || 0.3,
    size: opts.size || 3, sizeEnd: opts.sizeEnd !== undefined ? opts.sizeEnd : 0,
    color: opts.color || '#FFF',
    alpha: opts.alpha !== undefined ? opts.alpha : 1,
    alphaEnd: opts.alphaEnd !== undefined ? opts.alphaEnd : 0,
    rotation: opts.rotation || 0,
    rotationSpeed: opts.rotationSpeed || 0,
    shape: opts.shape || 'circle',
    friction: opts.friction || 1,
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vx += p.ax * dt;
    p.vy += p.ay * dt;
    p.vx *= p.friction;
    p.vy *= p.friction;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rotation += p.rotationSpeed * dt;
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); }
  }
}

function drawParticles(ctx, camX, camY) {
  for (const p of particles) {
    const t = 1 - p.life / p.maxLife;
    const size = Math.max(0, p.size + (p.sizeEnd - p.size) * t);
    const alpha = p.alpha + (p.alphaEnd - p.alpha) * t;
    if (alpha <= 0 || size <= 0) continue;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    if (p.rotation) ctx.rotate(p.rotation);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.shape === 'rect') {
      ctx.fillRect(-size, -size, size * 2, size * 2);
    } else if (p.shape === 'star') {
      drawStar(ctx, 0, 0, size, 5);
    } else if (p.shape === 'line') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(size * 2, 0);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI / points) * i - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.4;
    if (i === 0) ctx.moveTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
    else ctx.lineTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
  }
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// COMIC TEXT POPUPS (onomatopoeia)
// ============================================================
let comicTexts = [];
function spawnComicText(x, y, text, color, size) {
  comicTexts.push({ x, y, text, color: color || '#ffffff', size: size || 18, life: 0.4, maxLife: 0.4, vy: -60, rotation: (Math.random() - 0.5) * 0.4 });
}
function updateAndDrawComicTexts(ctx, dt) {
  comicTexts = comicTexts.filter(t => t.life > 0);
  for (const t of comicTexts) {
    t.life -= dt; t.y += t.vy * dt; t.vy *= 0.95;
    const alpha = t.life / t.maxLife;
    const scale = 0.8 + (1 - t.life / t.maxLife) * 0.4;
    ctx.save();
    ctx.translate(t.x, t.y); ctx.rotate(t.rotation); ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${t.size}px sans-serif`; ctx.textAlign = 'center';
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 4; ctx.strokeText(t.text, 0, 0);
    ctx.fillStyle = t.color; ctx.fillText(t.text, 0, 0);
    ctx.globalAlpha = 1.0; ctx.restore();
  }
}

// DAMAGE NUMBERS
// ============================================================
let damageNumbers = [];
function spawnDamageNumber(x, y, damage, isEnhanced) {
  damageNumbers.push({ x: x + (Math.random() - 0.5) * 20, y: y - 10, text: String(damage), color: isEnhanced ? '#ff8800' : '#ffffff', size: isEnhanced ? 20 : 14, life: 0.6, maxLife: 0.6, vy: -50 });
}
function updateAndDrawDamageNumbers(ctx, dt) {
  damageNumbers = damageNumbers.filter(d => d.life > 0);
  for (const d of damageNumbers) {
    d.life -= dt; d.y += d.vy * dt; d.vy *= 0.92;
    ctx.save(); ctx.globalAlpha = d.life / d.maxLife;
    ctx.font = `bold ${d.size}px sans-serif`; ctx.textAlign = 'center';
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 3; ctx.strokeText(d.text, d.x, d.y);
    ctx.fillStyle = d.color; ctx.fillText(d.text, d.x, d.y);
    ctx.globalAlpha = 1.0; ctx.restore();
  }
}

// ============================================================
// COMIC HIT EFFECTS (star / burst)
// ============================================================
let comicHitEffects = [];
function spawnComicHitEffect(x, y, size, type) {
  comicHitEffects.push({ x, y, size: size || 20, type: type || 'star', life: 0.2, maxLife: 0.2 });
}
function updateAndDrawComicHitEffects(ctx, dt) {
  comicHitEffects = comicHitEffects.filter(e => e.life > 0);
  for (const e of comicHitEffects) {
    e.life -= dt;
    const progress = 1 - e.life / e.maxLife;
    const scale = 0.5 + progress * 1.0;
    const alpha = 1 - progress;
    ctx.save(); ctx.translate(e.x, e.y); ctx.scale(scale, scale); ctx.globalAlpha = alpha;
    if (e.type === 'star') {
      ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#ffdd44'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const radius = (i % 2 === 0) ? e.size : e.size * 0.4;
        const px = Math.cos(angle) * radius, py = Math.sin(angle) * radius;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.type === 'burst') {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < 16; i++) {
        const angle = (i / 16) * Math.PI * 2;
        const radius = (i % 2 === 0) ? e.size : e.size * 0.7;
        const px = Math.cos(angle) * radius, py = Math.sin(angle) * radius;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
    }
    ctx.globalAlpha = 1.0; ctx.restore();
  }
}

function spawnModeTransitionEffect(px, py) {

// Aura particles (during enhance mode)
const auraParticles = [];
function updateAura(dt, px, py, active) {
  if (active) {
    if (auraParticles.length < 8 && Math.random() < 0.15) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 20;
      auraParticles.push({
        angle, dist, speed: 0.8 + Math.random() * 0.5,
        size: 3 + Math.random() * 2, alpha: 0.3 + Math.random() * 0.3,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  for (let i = auraParticles.length - 1; i >= 0; i--) {
    const a = auraParticles[i];
    a.angle += a.speed * dt;
    a.phase += dt * 3;
    if (!active) { a.alpha -= dt * 2; if (a.alpha <= 0) { auraParticles.splice(i, 1); } }
  }
}
function drawAura(ctx, px, py) {
  for (const a of auraParticles) {
    const x = px + Math.cos(a.angle) * a.dist;
    const y = py + Math.sin(a.angle) * a.dist;
    const pulse = 0.5 + 0.5 * Math.sin(a.phase);
    ctx.globalAlpha = a.alpha * pulse;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x, y, a.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Projectile trail particles
function spawnProjectileTrail(x, y) {
  if (Math.random() < 0.4) {
    spawnParticle({
      x, y: y + (Math.random() - 0.5) * 4,
      vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
      size: 2 + Math.random(), sizeEnd: 0, life: 0.15,
      color: '#8B6914', alpha: 0.6, alphaEnd: 0, shape: 'circle',
    });
  }
}

// ============================================================
// CODE SPRITES (fallback when ASSETS are null)
// ============================================================

// Helper: rounded rect
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- CHEF SPRITE ---
function drawPlayerCharacter(ctx, x, y, facing, state, animTimer) {
  ctx.save();
  ctx.translate(x, y);
  if (facing === -1) ctx.scale(-1, 1);

  const w = 40;
  const h = 70;
  const outline = '#2a1a0a';
  const lw = 2.5;

  let bounceY = 0;
  if (state === 'idle' || state === 'move') {
    bounceY = Math.sin(animTimer * 4) * 2;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Skirt (bottom)
  ctx.fillStyle = '#b088c0';
  ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.fillRect(-w/2, -h * 0.33 + bounceY, w, h * 0.33);
  ctx.strokeRect(-w/2, -h * 0.33 + bounceY, w, h * 0.33);

  // Body (middle)
  ctx.fillStyle = '#f5efe3';
  ctx.fillRect(-w/2, -h * 0.7 + bounceY, w, h * 0.37);
  ctx.strokeRect(-w/2, -h * 0.7 + bounceY, w, h * 0.37);

  // Ribbon brooch
  ctx.fillStyle = '#e03030';
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.55 + bounceY);
  ctx.lineTo(-4, -h * 0.50 + bounceY);
  ctx.lineTo(0, -h * 0.45 + bounceY);
  ctx.lineTo(4, -h * 0.50 + bounceY);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#fce4d0';
  ctx.fillRect(-w/2, -h * 0.95 + bounceY, w, h * 0.25);
  ctx.strokeRect(-w/2, -h * 0.95 + bounceY, w, h * 0.25);

  // Eyes
  ctx.fillStyle = '#30b060';
  ctx.beginPath();
  ctx.arc(-6, -h * 0.83 + bounceY, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -h * 0.83 + bounceY, 3, 0, Math.PI * 2); ctx.fill();
  // Highlights
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(-5, -h * 0.84 + bounceY, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -h * 0.84 + bounceY, 1.2, 0, Math.PI * 2); ctx.fill();

  // Cheeks
  ctx.fillStyle = 'rgba(255, 130, 130, 0.3)';
  ctx.beginPath();
  ctx.ellipse(-10, -h * 0.78 + bounceY, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, -h * 0.78 + bounceY, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // Beret
  ctx.fillStyle = '#5c3d2e';
  ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.95 + bounceY, w/2 + 2, 6, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -h - 2 + bounceY, 3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // Spatula
  let spatulaX = w/2 + 4;
  let spatulaY = -h * 0.5 + bounceY;
  let spatulaAngle = -0.3;
  if (state === 'attack_jab' || state === 'attack_hook') {
    spatulaX = w/2 + 14; spatulaAngle = 0.3;
  } else if (state === 'enhanced') {
    spatulaX = w/2 + 8 + Math.sin(animTimer * 20) * 5;
    spatulaAngle = Math.sin(animTimer * 20) * 0.3;
  }
  ctx.save();
  ctx.translate(spatulaX, spatulaY);
  ctx.rotate(spatulaAngle);
  ctx.strokeStyle = '#c8a060'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(14, -10); ctx.stroke();
  ctx.fillStyle = '#dcc090'; ctx.strokeStyle = outline; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(16, -12, 7, 5, spatulaAngle - 0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // Enhanced glow
  if (state === 'enhanced') {
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
    ctx.strokeStyle = 'rgba(255, 136, 0, 0.4)'; ctx.lineWidth = 3;
    ctx.strokeRect(-w/2 - 3, -h - 5 + bounceY, w + 6, h + 5);
    ctx.shadowBlur = 0;
  }

  // Hit eyes
  if (state === 'hit') {
    ctx.fillStyle = '#fce4d0';
    ctx.fillRect(-12, -h * 0.88 + bounceY, 24, 10);
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, -h * 0.86 + bounceY); ctx.lineTo(-3, -h * 0.80 + bounceY);
    ctx.moveTo(-3, -h * 0.86 + bounceY); ctx.lineTo(-8, -h * 0.80 + bounceY);
    ctx.moveTo(3, -h * 0.86 + bounceY); ctx.lineTo(8, -h * 0.80 + bounceY);
    ctx.moveTo(8, -h * 0.86 + bounceY); ctx.lineTo(3, -h * 0.80 + bounceY);
    ctx.stroke();
  }

  ctx.restore();
}

function drawChefSprite(ctx, x, y, w, h, state, facingRight, opts) {
  // Determine visual state for new character renderer
  let visualState = 'idle';
  if (opts.hit) visualState = 'hit';
  else if (opts.isEnhanced) visualState = 'enhanced';
  else if (opts.attacking && opts.comboStep === 2) visualState = 'attack_hook';
  else if (opts.attacking) visualState = 'attack_jab';

  const facing = facingRight ? 1 : -1;
  drawPlayerCharacter(ctx, x + w / 2, y + h, facing, visualState, opts.animTimer || 0);
  return;

  const flip = facingRight ? 1 : -1;
  ctx.save();
  ctx.translate(x, y + h);
  if (!facingRight) { ctx.scale(-1, 1); }

  const headR = w * 0.42;
  const headCX = 0;
  const headCY = -h * 0.72;

  // Outline color
  const outline = '#3d3d3a';

  // === LEGS ===
  ctx.fillStyle = '#4A6B8A';
  roundRect(ctx, -w * 0.28, -h * 0.22, w * 0.2, h * 0.22, 2);
  ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1; ctx.stroke();
  roundRect(ctx, w * 0.08, -h * 0.22, w * 0.2, h * 0.22, 2);
  ctx.fill();
  ctx.stroke();
  // Shoes
  ctx.fillStyle = '#5C3A1E';
  ctx.fillRect(-w * 0.3, -h * 0.03, w * 0.24, h * 0.04);
  ctx.fillRect(w * 0.06, -h * 0.03, w * 0.24, h * 0.04);

  // === BODY ===
  ctx.fillStyle = opts.isEnhanced ? '#E8A040' : '#F5F0E6';
  roundRect(ctx, -w * 0.35, -h * 0.55, w * 0.7, h * 0.38, 4);
  ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1.5; ctx.stroke();
  // Apron
  ctx.fillStyle = opts.isEnhanced ? '#D08020' : '#E8E0D0';
  roundRect(ctx, -w * 0.25, -h * 0.45, w * 0.5, h * 0.28, 3);
  ctx.fill();

  // === ARMS ===
  ctx.fillStyle = '#FFE0C2';
  const armY = -h * 0.5;
  if (opts.attacking) {
    // Right arm extended forward
    roundRect(ctx, w * 0.3, armY - h * 0.02, w * 0.35, h * 0.1, 3);
    ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = 1; ctx.stroke();
    // Left arm down
    roundRect(ctx, -w * 0.4, armY + h * 0.05, w * 0.14, h * 0.18, 3);
    ctx.fill(); ctx.stroke();
  } else {
    // Both arms down
    roundRect(ctx, -w * 0.45, armY + h * 0.02, w * 0.14, h * 0.18, 3);
    ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = 1; ctx.stroke();
    roundRect(ctx, w * 0.31, armY + h * 0.02, w * 0.14, h * 0.18, 3);
    ctx.fill(); ctx.stroke();
  }

  // === HEAD ===
  ctx.fillStyle = '#FFE0C2';
  ctx.beginPath();
  ctx.arc(headCX, headCY, headR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1.5; ctx.stroke();

  // === CHEF HAT ===
  ctx.fillStyle = '#FFFFFF';
  const hatY = headCY - headR;
  roundRect(ctx, -headR * 0.75, hatY - headR * 0.6, headR * 1.5, headR * 0.65, 4);
  ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 1; ctx.stroke();
  // Hat brim
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(-headR * 0.85, hatY, headR * 1.7, headR * 0.2);
  ctx.strokeStyle = outline; ctx.strokeRect(-headR * 0.85, hatY, headR * 1.7, headR * 0.2);

  // === EYES ===
  if (opts.hit) {
    // X eyes
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    const ex1 = headR * 0.2, ex2 = headR * 0.55;
    const ey = headCY - headR * 0.05;
    const es = headR * 0.15;
    [ex1, ex2].forEach(ex => {
      ctx.beginPath(); ctx.moveTo(ex - es, ey - es); ctx.lineTo(ex + es, ey + es); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex + es, ey - es); ctx.lineTo(ex - es, ey + es); ctx.stroke();
    });
  } else {
    const eyeR = headR * 0.18;
    const ex1 = headR * 0.15, ex2 = headR * 0.52;
    const eyeY = headCY - headR * 0.05;
    // White
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(ex1, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
    // Pupil
    ctx.fillStyle = opts.isEnhanced ? '#D85A30' : '#222';
    const pupR = eyeR * 0.55;
    ctx.beginPath(); ctx.arc(ex1 + pupR * 0.3, eyeY, pupR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2 + pupR * 0.3, eyeY, pupR, 0, Math.PI * 2); ctx.fill();
    // Highlight
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(ex1 + pupR * 0.2, eyeY - pupR * 0.4, pupR * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2 + pupR * 0.2, eyeY - pupR * 0.4, pupR * 0.35, 0, Math.PI * 2); ctx.fill();
    // Narrow eyes when attacking
    if (opts.attacking) {
      ctx.fillStyle = '#FFE0C2';
      ctx.fillRect(ex1 - eyeR, eyeY - eyeR, eyeR * 2, eyeR * 0.6);
      ctx.fillRect(ex2 - eyeR, eyeY - eyeR, eyeR * 2, eyeR * 0.6);
    }
  }

  // Mouth
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  const mouthY = headCY + headR * 0.35;
  if (opts.isEnhanced) {
    // Big grin
    ctx.beginPath();
    ctx.arc(headR * 0.35, mouthY, headR * 0.2, 0, Math.PI);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(headR * 0.35, mouthY, headR * 0.12, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // === WEAPON ===
  if (opts.attacking) {
    if (opts.isEnhanced) {
      // Dual knives
      ctx.fillStyle = '#C0C0C0';
      ctx.save();
      ctx.translate(w * 0.55, armY);
      ctx.rotate(-0.3);
      ctx.fillRect(0, -2, w * 0.35, 4);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(-w * 0.08, -3, w * 0.1, 6);
      ctx.restore();
    } else {
      // Ladle
      ctx.fillStyle = '#888';
      ctx.save();
      ctx.translate(w * 0.55, armY);
      ctx.fillRect(0, -1.5, w * 0.3, 3); // handle
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(w * 0.3, 0, w * 0.08, 0, Math.PI * 2); // bowl
      ctx.fill();
      ctx.restore();
    }
  } else if (!opts.isEnhanced) {
    // Ladle at rest
    ctx.fillStyle = '#888';
    ctx.save();
    ctx.translate(w * 0.35, armY + h * 0.1);
    ctx.rotate(0.8);
    ctx.fillRect(0, -1.5, w * 0.25, 3);
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(w * 0.25, 0, w * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// --- PIG SPRITE ---
// --- NEW MONSTER ART FUNCTIONS (Step 10.5-B) ---
function drawPigEnemy(ctx, x, y, enemy, animTimer) {
  ctx.save();
  ctx.translate(x, y);
  const bounce = Math.sin(animTimer * 3 + (enemy.id || 0)) * 1.5;
  const facing = enemy.facingRight ? 1 : -1;
  if (facing === -1) ctx.scale(-1, 1);
  const outline = '#2a1a0a';
  const lw = 2.5;
  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.beginPath(); ctx.ellipse(0, 0, 20, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = '#e8a0a0'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.fillRect(-16, -10 + bounce, 8, 10); ctx.strokeRect(-16, -10 + bounce, 8, 10);
  ctx.fillRect(8, -10 + bounce, 8, 10); ctx.strokeRect(8, -10 + bounce, 8, 10);
  // Body
  ctx.fillStyle = '#f0b0b0'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.ellipse(0, -30 + bounce, 24, 20, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Tail
  ctx.strokeStyle = '#e8a0a0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-22, -32 + bounce, 5, 0, Math.PI * 1.5); ctx.stroke();
  // Snout
  ctx.fillStyle = '#d08080'; ctx.strokeStyle = outline; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(18, -30 + bounce, 8, 6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#a06060';
  ctx.beginPath(); ctx.arc(16, -30 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(20, -30 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.fillStyle = '#f0b0b0'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(-10, -48 + bounce); ctx.lineTo(-4, -40 + bounce); ctx.lineTo(-16, -40 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -48 + bounce); ctx.lineTo(12, -40 + bounce); ctx.lineTo(0, -40 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Eye
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.arc(6, -34 + bounce, 2.5, 0, Math.PI * 2); ctx.fill();
  // Angry eyebrow
  ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(3, -38 + bounce); ctx.lineTo(9, -36 + bounce); ctx.stroke();
  // State effects
  if (enemy.state === PIG_STATES.TELEGRAPH) { ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10; }
  if (enemy.state === PIG_STATES.RECOVER) {
    ctx.fillStyle = '#ffcc00'; ctx.font = '8px sans-serif';
    ctx.fillText('★', 2, -42 + bounce); ctx.fillText('★', 10, -40 + bounce);
  }
  ctx.restore();
}

function drawVeggieEnemy(ctx, x, y, enemy, animTimer) {
  ctx.save();
  ctx.translate(x, y);
  const bounce = Math.sin(animTimer * 3.5 + (enemy.id || 0) * 1.3) * 1.5;
  const facing = enemy.facingRight ? 1 : -1;
  if (facing === -1) ctx.scale(-1, 1);
  const outline = '#2a1a0a';
  const lw = 2.5;
  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.beginPath(); ctx.ellipse(0, 0, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Feet
  ctx.strokeStyle = '#d07030'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-6, -4 + bounce); ctx.lineTo(-6, 0 + bounce);
  ctx.moveTo(6, -4 + bounce); ctx.lineTo(6, 0 + bounce);
  ctx.stroke();
  // Carrot body
  ctx.fillStyle = '#f0943c'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(-14, -38 + bounce); ctx.lineTo(14, -38 + bounce);
  ctx.quadraticCurveTo(8, -10 + bounce, 0, -4 + bounce);
  ctx.quadraticCurveTo(-8, -10 + bounce, -14, -38 + bounce);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Stripes
  ctx.strokeStyle = '#d07830'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-10, -28 + bounce); ctx.lineTo(10, -28 + bounce);
  ctx.moveTo(-7, -18 + bounce); ctx.lineTo(7, -18 + bounce);
  ctx.stroke();
  // Leaves
  ctx.fillStyle = '#40a840'; ctx.strokeStyle = outline; ctx.lineWidth = 2;
  const leafSway = (enemy.state === VEG_STATES.FLEE) ? Math.sin(animTimer * 10) * 0.3 : 0;
  ctx.save(); ctx.translate(0, -38 + bounce);
  ctx.save(); ctx.rotate(leafSway);
  ctx.beginPath(); ctx.ellipse(0, -12, 5, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.rotate(-0.4 + leafSway);
  ctx.beginPath(); ctx.ellipse(-3, -10, 4, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.rotate(0.4 + leafSway);
  ctx.beginPath(); ctx.ellipse(3, -10, 4, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.restore();
  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(-5, -32 + bounce, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -32 + bounce, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.arc(-4, -31 + bounce, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -31 + bounce, 2, 0, Math.PI * 2); ctx.fill();
  // Mouth (wavy/nervous)
  ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-4, -26 + bounce);
  ctx.quadraticCurveTo(-1, -24 + bounce, 0, -26 + bounce);
  ctx.quadraticCurveTo(1, -28 + bounce, 4, -26 + bounce);
  ctx.stroke();
  if (enemy.state === VEG_STATES.TELEGRAPH) { ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8; }
  ctx.restore();
}

function drawSpiceEnemy(ctx, x, y, enemy, animTimer) {
  ctx.save();
  ctx.translate(x, y);
  const bounce = Math.sin(animTimer * 5 + (enemy.id || 0) * 2) * 2;
  const outline = '#2a1a0a';
  const lw = 2;
  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.beginPath(); ctx.ellipse(0, 0, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Body
  ctx.fillStyle = '#f0d860'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  roundRect(ctx, -10, -28 + bounce, 20, 24, 4);
  // Label band
  ctx.fillStyle = '#e0c040';
  ctx.fillRect(-10, -20 + bounce, 20, 8);
  ctx.strokeStyle = outline; ctx.lineWidth = 1;
  ctx.strokeRect(-10, -20 + bounce, 20, 8);
  // Lid
  ctx.fillStyle = '#c0a830'; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.fillRect(-8, -34 + bounce, 16, 6); ctx.strokeRect(-8, -34 + bounce, 16, 6);
  ctx.fillRect(-3, -38 + bounce, 6, 4); ctx.strokeRect(-3, -38 + bounce, 6, 4);
  // Holes
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.arc(-3, -32 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -32 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -30 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.arc(-4, -18 + bounce, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -18 + bounce, 2, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.strokeStyle = '#c0a830'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-5, -4 + bounce); ctx.lineTo(-5, 0 + bounce);
  ctx.moveTo(5, -4 + bounce); ctx.lineTo(5, 0 + bounce);
  ctx.stroke();
  // Flee sweat
  if (enemy.state === SEASONING_STATES.FLEE) {
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.moveTo(12, -26 + bounce);
    ctx.quadraticCurveTo(14, -22 + bounce, 12, -20 + bounce);
    ctx.quadraticCurveTo(10, -22 + bounce, 12, -26 + bounce);
    ctx.fill();
  }
  ctx.restore();
}

function drawBossEnemy(ctx, x, y, enemy, animTimer) {
  ctx.save();
  ctx.translate(x, y);
  const bounce = Math.sin(animTimer * 2) * 2;
  const facing = enemy.facingRight ? 1 : -1;
  if (facing === -1) ctx.scale(-1, 1);
  const outline = '#2a1a0a';
  const lw = 3;
  const phase2 = enemy.phase2 || false;
  const bodyColor = phase2 ? '#e07070' : '#f0b0b0';
  const darkColor = phase2 ? '#c05050' : '#e8a0a0';
  const eyeColor = phase2 ? '#ff2222' : '#2a1a0a';
  // Shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.beginPath(); ctx.ellipse(0, 0, 35, 10, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = darkColor; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.fillRect(-28, -16 + bounce, 14, 16); ctx.strokeRect(-28, -16 + bounce, 14, 16);
  ctx.fillRect(14, -16 + bounce, 14, 16); ctx.strokeRect(14, -16 + bounce, 14, 16);
  // Body
  ctx.fillStyle = bodyColor; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.ellipse(0, -46 + bounce, 40, 32, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Belly
  ctx.fillStyle = phase2 ? '#e8a0a0' : '#f8d0d0';
  ctx.beginPath(); ctx.ellipse(4, -40 + bounce, 22, 18, 0, 0, Math.PI * 2); ctx.fill();
  // Snout
  ctx.fillStyle = '#d08080'; ctx.strokeStyle = outline; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.ellipse(30, -48 + bounce, 12, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#a06060';
  ctx.beginPath(); ctx.arc(27, -48 + bounce, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(33, -48 + bounce, 2.5, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.fillStyle = bodyColor; ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(-16, -78 + bounce); ctx.lineTo(-6, -66 + bounce); ctx.lineTo(-26, -66 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -78 + bounce); ctx.lineTo(20, -66 + bounce); ctx.lineTo(0, -66 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Crown
  ctx.fillStyle = '#ffd700'; ctx.strokeStyle = outline; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, -80 + bounce); ctx.lineTo(-10, -70 + bounce); ctx.lineTo(-3, -82 + bounce);
  ctx.lineTo(3, -70 + bounce); ctx.lineTo(10, -82 + bounce); ctx.lineTo(14, -70 + bounce);
  ctx.lineTo(18, -80 + bounce); ctx.lineTo(18, -70 + bounce); ctx.lineTo(-14, -70 + bounce);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Eye
  ctx.fillStyle = eyeColor;
  ctx.beginPath(); ctx.arc(8, -54 + bounce, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(9, -55 + bounce, 1.5, 0, Math.PI * 2); ctx.fill();
  // Eyebrow
  ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(3, -60 + bounce); ctx.lineTo(13, -57 + bounce); ctx.stroke();
  // Teeth
  ctx.fillStyle = '#ffffff'; ctx.strokeStyle = outline; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(20, -42 + bounce); ctx.lineTo(24, -36 + bounce); ctx.lineTo(16, -36 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28, -42 + bounce); ctx.lineTo(32, -36 + bounce); ctx.lineTo(24, -36 + bounce); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Tail
  ctx.strokeStyle = darkColor; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-38, -50 + bounce, 8, 0, Math.PI * 1.5); ctx.stroke();
  // Phase2 steam
  if (phase2) {
    ctx.fillStyle = 'rgba(255, 100, 100, 0.4)';
    const s1 = Math.sin(animTimer * 6) * 3, s2 = Math.cos(animTimer * 6) * 3;
    ctx.beginPath(); ctx.arc(-20 + s1, -82 + bounce, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(12 + s2, -84 + bounce, 4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// --- PIG SPRITE ---
function drawPigSprite(ctx, x, y, w, h, state, facingRight, flashWhite, isBoss) {
  ctx.save();
  ctx.translate(x, y + h / 2);
  if (!facingRight) ctx.scale(-1, 1);

  const bodyColor = flashWhite ? '#FFF' : (isBoss ? '#E08080' : '#F5A0A0');
  const darkColor = isBoss ? '#CC5555' : '#E88888';

  // Body (horizontal oval)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.5, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1.5; ctx.stroke();

  // Ears
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.moveTo(-w * 0.2, -h * 0.35);
  ctx.lineTo(-w * 0.3, -h * 0.55);
  ctx.lineTo(-w * 0.1, -h * 0.38);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w * 0.1, -h * 0.35);
  ctx.lineTo(w * 0.2, -h * 0.55);
  ctx.lineTo(w * 0.3, -h * 0.38);
  ctx.closePath(); ctx.fill();

  if (!flashWhite) {
    // Snout
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.ellipse(w * 0.32, h * 0.02, w * 0.14, h * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1; ctx.stroke();
    // Nostrils
    ctx.fillStyle = '#3d3d3a';
    ctx.beginPath(); ctx.arc(w * 0.28, h * 0.02, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.36, h * 0.02, 2, 0, Math.PI * 2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(w * 0.08, -h * 0.12, isBoss ? 2.5 : 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.24, -h * 0.12, isBoss ? 2.5 : 3, 0, Math.PI * 2); ctx.fill();
    // Angry eyebrows
    ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w * 0.02, -h * 0.22); ctx.lineTo(w * 0.14, -h * 0.18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.18, -h * 0.18); ctx.lineTo(w * 0.3, -h * 0.22);
    ctx.stroke();

    // Boss: teeth + chef hat
    if (isBoss) {
      ctx.fillStyle = '#FFF';
      ctx.fillRect(w * 0.22, h * 0.08, 4, 5);
      ctx.fillRect(w * 0.28, h * 0.08, 4, 5);
      // Chef hat on boss
      ctx.fillStyle = '#FFF';
      roundRect(ctx, -w * 0.18, -h * 0.58, w * 0.36, h * 0.2, 3);
      ctx.fill();
      ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1; ctx.stroke();
    }
  }

  // Legs
  ctx.fillStyle = bodyColor;
  const legW = w * 0.1, legH = h * 0.15;
  ctx.fillRect(-w * 0.3, h * 0.32, legW, legH);
  ctx.fillRect(-w * 0.1, h * 0.32, legW, legH);
  ctx.fillRect(w * 0.1, h * 0.32, legW, legH);
  ctx.fillRect(w * 0.25, h * 0.32, legW, legH);

  // Tail (bezier)
  ctx.strokeStyle = darkColor; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-w * 0.48, 0);
  ctx.bezierCurveTo(-w * 0.6, -h * 0.15, -w * 0.55, -h * 0.3, -w * 0.45, -h * 0.25);
  ctx.stroke();

  ctx.restore();
}

// --- VEG SPRITE (legacy wrapper) ---
function drawVegSprite(ctx, x, y, w, h, state, facingRight, flashWhite) {
  if (!flashWhite) {
    const vegE = enemies.find(e => e.type === 'veg' && !e.remove && Math.abs(e.x - x) < 5 && Math.abs(e.y - y) < 10);
    if (vegE) {
      drawVeggieEnemy(ctx, x, y + h, vegE, gameTimer);
      return;
    }
  }
  // Fallback for flash white
  ctx.save();
  ctx.translate(x, y + h / 2);
  if (!facingRight) ctx.scale(-1, 1);

  const bodyColor = flashWhite ? '#FFF' : '#7BC462';

  // Body (tall rounded rect)
  ctx.fillStyle = bodyColor;
  roundRect(ctx, -w * 0.45, -h * 0.4, w * 0.9, h * 0.75, 6);
  ctx.fill();
  ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1.5; ctx.stroke();

  if (!flashWhite) {
    // Leaves on top
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.ellipse(-w * 0.15, -h * 0.42, w * 0.15, h * 0.12, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath();
    ctx.ellipse(w * 0.05, -h * 0.46, w * 0.13, h * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.ellipse(w * 0.2, -h * 0.4, w * 0.12, h * 0.1, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(w * 0.0, -h * 0.12, w * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.25, -h * 0.12, w * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(w * 0.05, -h * 0.1, w * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.28, -h * 0.1, w * 0.07, 0, Math.PI * 2); ctx.fill();
    // Highlight
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(w * 0.02, -h * 0.14, w * 0.03, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.25, -h * 0.14, w * 0.03, 0, Math.PI * 2); ctx.fill();

    // Smug mouth
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(w * 0.15, h * 0.05, w * 0.08, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  // Feet
  ctx.fillStyle = flashWhite ? '#FFF' : '#5B9C42';
  ctx.beginPath();
  ctx.ellipse(-w * 0.18, h * 0.35, w * 0.14, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.18, h * 0.35, w * 0.14, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// --- SEASONING SPRITE ---
function drawSeasoningSprite(ctx, x, y, w, h, state, facingRight, flashWhite) {
  ctx.save();
  ctx.translate(x, y + h / 2);
  if (!facingRight) ctx.scale(-1, 1);

  const bodyColor = flashWhite ? '#FFF' : '#FFF8E1';
  const lidColor = flashWhite ? '#FFF' : '#C9C0A0';

  // Body
  ctx.fillStyle = bodyColor;
  roundRect(ctx, -w * 0.4, -h * 0.25, w * 0.8, h * 0.6, 4);
  ctx.fill();
  ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1.5; ctx.stroke();

  // Lid
  ctx.fillStyle = lidColor;
  roundRect(ctx, -w * 0.48, -h * 0.45, w * 0.96, h * 0.22, 3);
  ctx.fill();
  ctx.strokeStyle = '#3d3d3a'; ctx.lineWidth = 1; ctx.stroke();
  // Holes
  if (!flashWhite) {
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(-w * 0.15, -h * 0.36, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -h * 0.36, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(w * 0.15, -h * 0.36, 1.5, 0, Math.PI * 2); ctx.fill();

    // Eyes (crescent / sly)
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
    if (state === SEASONING_STATES.CORNERED_CHARGE || state === SEASONING_STATES.COUNTER_ATTACK) {
      // ! eyes
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', 0, -h * 0.05);
    } else {
      ctx.beginPath();
      ctx.arc(-w * 0.1, -h * 0.08, w * 0.1, 0.3, Math.PI - 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(w * 0.15, -h * 0.08, w * 0.1, 0.3, Math.PI - 0.3);
      ctx.stroke();
    }

    // Mouth (smirk)
    ctx.beginPath();
    ctx.arc(w * 0.08, h * 0.08, w * 0.08, 0, Math.PI * 0.7);
    ctx.stroke();
  }

  // Feet
  ctx.fillStyle = flashWhite ? '#FFF' : '#D4C090';
  ctx.beginPath();
  ctx.ellipse(-w * 0.15, h * 0.35, w * 0.12, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.15, h * 0.35, w * 0.12, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// --- PARALLAX BACKGROUND ---
function drawBackground(ctx, camX, camY, room) {
  const groundY = CONFIG.room.groundY;
  const cw = canvas.width;
  const ch = canvas.height;
  const isBoss = (room === 3);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, camY, 0, groundY);
  if (isBoss) {
    skyGrad.addColorStop(0, '#2a1515');
    skyGrad.addColorStop(1, '#3a2020');
  } else {
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.7, '#b8d8b8');
    skyGrad.addColorStop(1, '#90b890');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(camX, camY, cw, Math.max(0, groundY - camY));

  // Tree silhouettes (non-boss rooms)
  if (!isBoss) {
    ctx.fillStyle = 'rgba(60, 120, 60, 0.3)';
    for (let i = 0; i < 5; i++) {
      const tx = (i * 500 + 100) - (camX * 0.3);
      const ty = groundY - 60 - Math.sin(i * 1.5) * 30;
      const radius = 50 + Math.sin(i * 2.3) * 15;
      ctx.beginPath(); ctx.arc(tx, ty, radius, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = 'rgba(80, 50, 30, 0.2)';
    for (let i = 0; i < 5; i++) {
      const tx = (i * 500 + 100) - (camX * 0.3);
      ctx.fillRect(tx - 5, groundY - 30, 10, 30);
    }
  }

  // Ground
  const grassGrad = ctx.createLinearGradient(0, groundY, 0, groundY + 300);
  if (isBoss) {
    grassGrad.addColorStop(0, '#3a2020');
    grassGrad.addColorStop(1, '#2a1515');
  } else {
    grassGrad.addColorStop(0, '#7ab87a');
    grassGrad.addColorStop(1, '#5a9a5a');
  }
  ctx.fillStyle = grassGrad;
  ctx.fillRect(camX, groundY, cw, ch);

  // Grass details
  if (!isBoss) {
    ctx.strokeStyle = 'rgba(90, 160, 90, 0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const gx = (i * 130 + 30) - (camX % 130);
      const gy = groundY + 10 + (i % 3) * 40;
      if (gy > groundY + 300) continue;
      ctx.beginPath();
      ctx.moveTo(gx, gy);
      ctx.quadraticCurveTo(gx - 3, gy - 10, gx - 1, gy - 15);
      ctx.moveTo(gx + 6, gy);
      ctx.quadraticCurveTo(gx + 9, gy - 8, gx + 7, gy - 13);
      ctx.stroke();
    }
  }

  // Boss room vignette
  if (isBoss) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const vignette = ctx.createRadialGradient(cw / 2, ch / 2, cw * 0.3, cw / 2, ch / 2, cw * 0.7);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, cw, ch);
    ctx.restore();
  }

  // Room boundary
  ctx.strokeStyle = '#666';
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(0, 0, currentRoomWidth, CONFIG.room.height);
  ctx.setLineDash([]);
}

// Fireflies for boss room
const fireflies = [];
function updateFireflies(dt, active) {
  if (active && fireflies.length < 5 && Math.random() < 0.02) {
    fireflies.push({
      x: Math.random() * currentRoomWidth,
      y: CONFIG.room.groundY - 50 - Math.random() * 150,
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 15,
      phase: Math.random() * Math.PI * 2,
      life: 3 + Math.random() * 4,
    });
  }
  for (let i = fireflies.length - 1; i >= 0; i--) {
    const f = fireflies[i];
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.phase += dt * 2;
    f.life -= dt;
    if (f.life <= 0 || !active) { fireflies.splice(i, 1); }
  }
}
function drawFireflies(ctx) {
  for (const f of fireflies) {
    const alpha = 0.3 + 0.4 * Math.sin(f.phase);
    ctx.fillStyle = `rgba(255, 255, 100, ${alpha})`;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255, 255, 100, ${alpha * 0.3})`;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// UTILS
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function distBetween(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

function lerpColor(hexA, hexB, t) {
  const a = parseInt(hexA.slice(1), 16), b = parseInt(hexB.slice(1), 16);
  const rA = (a >> 16) & 0xff, gA = (a >> 8) & 0xff, bA = a & 0xff;
  const rB = (b >> 16) & 0xff, gB = (b >> 8) & 0xff, bB = b & 0xff;
  const r = Math.round(rA + (rB - rA) * t);
  const g = Math.round(gA + (gB - gA) * t);
  const bl = Math.round(bA + (bB - bA) * t);
  return `rgb(${r},${g},${bl})`;
}

function determineRecipe(ingredientSlots) {
  let meatCount = 0, vegCount = 0;
  for (const slot of ingredientSlots) {
    if (slot === 'meat') meatCount++;
    if (slot === 'vegetable') vegCount++;
  }
  if (meatCount >= 4) return CONFIG.finish.recipes.steakSmash;
  if (vegCount >= 4) return CONFIG.finish.recipes.saladStorm;
  return CONFIG.finish.recipes.fullCourseBlast;
}

function getEnemyOrbColor(e) {
  if (e.type === 'veg') return '#66BB6A';
  if (e.type === 'seasoning') return '#FFD700';
  return '#FF6666';
}

  essenceOrbs.push({

    tx: player.x, ty: player.y + CONFIG.player.size.height / 2,
    timer: 0, duration: 0.3,
    size: size, color: color,

  const fwd = player.facingRight ? 1 : -1;

function applyEnhanceEndBonus() {
  const bonus = player.enhanceKillCount * CONFIG.enhance.killBonusPerKill;
  if (bonus <= 0) return;
  // Apply bonus charge to ingredient slots
  let remaining = bonus;
  while (remaining >= 1 && player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
    // Auto-fill based on what's fewer
    const autoType = getWildcardType(player.ingredientSlots);
    player.ingredientSlots.push(autoType);
    player.ingredientPopIndex = player.ingredientSlots.length - 1;
    player.ingredientPopTimer = 0.15;
    remaining -= 1;
  }
  if (remaining > 0 && player.ingredientSlots.length < CONFIG.ingredientList.maxSlots) {
    player.ingredientPartialCharge = (player.ingredientPartialCharge || 0) + remaining;
    if (player.ingredientPartialCharge >= 1.0) {
      player.ingredientPartialCharge -= 1.0;
      const autoType = getWildcardType(player.ingredientSlots);
      player.ingredientSlots.push(autoType);
      player.ingredientPopIndex = player.ingredientSlots.length - 1;
      player.ingredientPopTimer = 0.15;
    }
  }
  if (player.ingredientSlots.length >= CONFIG.ingredientList.maxSlots) {
    player.ingredientFullFlash = 0.1;
    player.ingredientPartialCharge = 0;
  }
  // Visual feedback
  player.enhanceBonusPulse = 0.3;
  player.enhanceBonusText = { text: `+${bonus.toFixed(1)}`, timer: 0.8, y: 0 };
}

function exitEnhanceMode() {
  player.state = 'normal';
  player.enhanceActive = false;
  player.enhanceTimer = 0;
  player.enhanceAttackTimer = 0;
  player.enhanceAttackHitbox = null;
  player.enhanceAttackHitEnemies.clear();
  player.finishGauge = 0;
  player.finishHoldTimer = 0;
  player.finishHolding = false;
  player.finishSuperArmor = false;
  player.ingredientSlots = []; // clear slots for new cycle
  player.ingredientPartialCharge = 0;
  currentRecipe = null;
  // Apply enhance kill bonus AFTER clearing (fills slots for next cycle)
  applyEnhanceEndBonus();
}

function updatePlayer(dt) {
  if (player.dead) return;

  const cfg = CONFIG.player;

  // Common cooldowns
  if (player.dashCooldownTimer > 0) player.dashCooldownTimer -= dt;
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
  if (player.flashTimer > 0) player.flashTimer -= dt;
  if (player.gaugePulseTimer > 0) player.gaugePulseTimer -= dt;
  if (player.enhanceTimerFlashTimer > 0) player.enhanceTimerFlashTimer -= dt;
  if (player.ingredientPopTimer > 0) player.ingredientPopTimer -= dt;
  if (player.ingredientFullFlash > 0) player.ingredientFullFlash -= dt;
  if (player.ingredientWildcardFlash > 0) player.ingredientWildcardFlash -= dt;
  if (player.chargeLossFlash > 0) player.chargeLossFlash -= dt;
  if (player.ingredientLossFlashTimer > 0) player.ingredientLossFlashTimer -= dt;
  if (player.hpBarShakeTimer > 0) player.hpBarShakeTimer -= dt;
  if (player.chargeLossTextTimer > 0) { player.chargeLossTextTimer -= dt; player.chargeLossTextY -= dt * 40; }
  if (player.enhanceBonusPulse > 0) player.enhanceBonusPulse -= dt;
  if (player.enhanceBonusText) {
    player.enhanceBonusText.timer -= dt;
    player.enhanceBonusText.y -= dt * 40; // float upward
    if (player.enhanceBonusText.timer <= 0) player.enhanceBonusText = null;
  }
  if (player.finishSuperArmorFlash > 0) player.finishSuperArmorFlash -= dt;

  // Combo counter timer (only in normal mode)
  if (player.state === 'normal' && player.comboCount > 0) {
    player.comboTimer += dt;
    if (player.comboTimer >= player.comboResetWindow) {
      player.comboCount = 0;
      player.comboTimer = 0;
    }
  }

  // Dash (works in normal and enhance)
  if (player.isDashing) {
    player.dashTimer -= dt;
    // dashInvincibleTimer decreased in updatePlaying with rawDt
    if (player.dashTimer <= 0) {
      player.isDashing = false;
      // Cancel finish hold if dashing
      if (player.finishHolding) {
        player.finishHolding = false;
        player.finishHoldTimer = 0;
        player.finishSuperArmor = false;
      }
    } else {
      const speed = cfg.dashDistance / cfg.dashDuration;
      player.x += player.dashDirX * speed * dt;
      player.y += player.dashDirY * speed * dt;
      player.x = clamp(player.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
      player.y = clamp(player.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);
      return;
    }
  }

  // Daze: block all controls during stun
  if (player.dazeActive) {
    player.dazeTimer -= dt;
    if (player.dazeTimer <= 0) {
      player.dazeActive = false;
      player.dazeTimer = 0;
    }
    return;
  }

  // State-specific update
  switch (player.state) {
    case 'normal': updatePlayerNormal(dt); break;
    case 'enhance': updatePlayerEnhance(dt); break;
    case 'finish': updatePlayerFinish(dt); break;
  }
}

// --- NORMAL STATE ---
function triggerNormalAttack() {
  const cfg = CONFIG.player;
  const combo = CONFIG.combo;

  player.isAttacking = true;
  player.attackTimer = combo.intervals[player.comboStep];
  player.attackActiveTimer = combo.activeFrames[player.comboStep];
  player.attackHitEnemies.clear();
  player.attackBuffered = false;

  // Hitbox
  const rw = combo.range.width;
  const rh = combo.range.height;
  const hx = player.facingRight
    ? player.x + cfg.size.width / 2
    : player.x - cfg.size.width / 2 - rw;
  const hy = player.y;
  player.attackHitbox = { x: hx, y: hy, w: rw, h: rh };
  player.comboResetTimer = 0;

  // Attack advance
  const advanceDistance = player.comboStep === 2 ? 30 : 15;
  const fwd = player.facingRight ? 1 : -1;
  player.x += fwd * advanceDistance;
  player.x = clamp(player.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);

  // Recalculate hitbox after advance
  player.attackHitbox.x = player.facingRight
    ? player.x + cfg.size.width / 2
    : player.x - cfg.size.width / 2 - rw;
}

function updatePlayerNormal(dt) {
  const cfg = CONFIG.player;
  const combo = CONFIG.combo;

  // Attack logic — movement blocked only during active hitbox frames
  const inActiveFrame = player.isAttacking && player.attackActiveTimer > 0;

  if (player.isAttacking) {
    player.attackTimer -= dt;
    player.attackActiveTimer -= dt;

    // Deactivate hitbox when active frames end
    if (player.attackActiveTimer <= 0 && player.attackHitbox) {
      player.attackHitbox = null;
      player.attackHitEnemies.clear();
      // If buffered during active frames, chain immediately
      if (player.attackBuffered) {
        player.attackBuffered = false;
        player.comboStep = (player.comboStep + 1) % combo.hits;
        triggerNormalAttack();
        return;
      }
    }

    // Full interval expired
    if (player.attackTimer <= 0) {
      player.isAttacking = false;
      player.attackHitbox = null;
      player.attackHitEnemies.clear();
      player.comboStep = (player.comboStep + 1) % combo.hits;
      player.comboResetTimer = combo.comboResetTime;
    }
  }

  if (inActiveFrame) {
    // Active hitbox frames: no movement, only direction change + buffer + dash cancel
    if (keys['KeyA'] || keys['ArrowLeft']) player.facingRight = false;
    if (keys['KeyD'] || keys['ArrowRight']) player.facingRight = true;

    // Dash cancel during active frames
    if (keyJustPressed['KeyX'] && player.dashCooldownTimer <= 0) {
      player.isAttacking = false;
      player.attackActiveTimer = 0;
      player.attackHitbox = null;
      player.attackHitEnemies.clear();
      player.attackBuffered = false;
      player.comboStep = 0;
      startDash();
      return;
    }

    // Buffer next attack input
    if (keyJustPressed['KeyZ']) {
      player.attackBuffered = true;
    }
  } else {
    // Recovery or idle: movement allowed, combo chainable
    // Combo reset timer
    if (!player.isAttacking && player.comboResetTimer > 0) {
      player.comboResetTimer -= dt;
      if (player.comboResetTimer <= 0) player.comboStep = 0;
    }

    // Movement
    let mx = 0, my = 0;
    if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
    if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) my += 1;

    if (mx !== 0 || my !== 0) {
      const len = Math.sqrt(mx * mx + my * my);
      mx /= len; my /= len;
      player.x += mx * cfg.moveSpeed * dt;
      player.y += my * cfg.moveSpeed * dt;
      if (mx !== 0) player.facingRight = mx > 0;
    }

    player.x = clamp(player.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
    player.y = clamp(player.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);

    // Dash input
    if (keyJustPressed['KeyX'] && player.dashCooldownTimer <= 0) {
      startDash();
    }

    // Attack input — chain combo during recovery or start new
    if (keyJustPressed['KeyZ']) {
      if (player.isAttacking) {
        // During recovery phase, chain next combo
        player.isAttacking = false;
        player.comboStep = (player.comboStep + 1) % combo.hits;
      }
      triggerNormalAttack();
    }

    // C key: enter enhance mode
    if (keyJustPressed['KeyC'] && player.ingredientSlots.length >= CONFIG.ingredientList.maxSlots) {
      sfxEnhanceEnter();
      player.state = 'enhance';
      player.enhanceActive = true;
      player.enhanceTimer = CONFIG.enhance.maxDuration;
      player.enhanceKillCount = 0; // reset kill counter for end bonus
      player.enhanceAttackTimer = 0;
      player.enhanceAttackSide = 'left';
      player.enhanceAttackHitbox = null;
      player.enhanceAttackHitEnemies.clear();
      player.finishGauge = 0;
      player.finishHoldTimer = 0;
      player.finishHolding = false;
      player.finishSuperArmor = false;
      // Reset combo (ingredient slots kept until finish/timeout)
      player.comboCount = 0;
      player.comboTimer = 0;
      // Reset normal attack state
      player.isAttacking = false;
      player.attackHitbox = null;
      player.attackHitEnemies.clear();
      player.comboStep = 0;
      // Enhance transition effects
      spawnModeTransitionEffect(player.x, player.y + CONFIG.player.size.height / 2);
      enhanceTransitionPhase = 1;
      enhanceTransitionTimer = 0.45;
      enhanceFlashTimer = 0.3;
      // Radial concentration lines
      radialLines.length = 0;
      const lineCount = 8 + Math.floor(Math.random() * 5);
      for (let li = 0; li < lineCount; li++) {
        radialLines.push({
          angle: (Math.PI * 2 / lineCount) * li + (Math.random() - 0.5) * 0.3,
          length: 0,
          maxLength: 100 + Math.random() * 100,
          timer: 0.3,
        });
      }
    }
  }
}

// --- ENHANCE STATE ---
function updatePlayerEnhance(dt) {
  const cfg = CONFIG.player;
  const enh = CONFIG.enhance;
  const fin = CONFIG.finish;

  // Enhance timer countdown
  player.enhanceTimer -= dt;
  if (player.enhanceTimer <= 0) {
    exitEnhanceMode();
    return;
  }

  // Z key hold detection for finish
  if (keys['KeyZ']) {
    player.finishHoldTimer += dt;
    // Finish charge SFX (every 0.05s)
    finishChargeSfxTimer += dt;
    if (finishChargeSfxTimer >= 0.05) {
      finishChargeSfxTimer = 0;
      sfxFinishCharge(player.finishHoldTimer / fin.holdTime);
    }
    // Super armor activation
    if (!player.finishSuperArmor && player.finishHoldTimer >= CONFIG.finish.superArmorDelay) {
      player.finishSuperArmor = true;
    }
    if (player.finishHoldTimer >= fin.holdTime) {
      // Trigger finish!
      startFinish();
      return;
    }
    player.finishHolding = true;
    if (!currentRecipe) {
      currentRecipe = determineRecipe(player.ingredientSlots);
      finishSuctionActive = true;
    }
  }

  // Z key released: cancel hold, do one attack if was short press
  if (keyJustReleased['KeyZ'] && player.finishHolding) {
    player.finishHolding = false;
    player.finishHoldTimer = 0;
    player.finishSuperArmor = false;
    currentRecipe = null;
    finishSuctionActive = false;
  }

  // If holding Z for finish charge: no movement, no attack
  if (player.finishHolding && player.finishHoldTimer > 0.08) {
    // Suction: pull enemies toward finish landing point
    if (finishSuctionActive && currentRecipe) {
      const sr = currentRecipe.suctionRange;
      const ss = currentRecipe.suctionSpeed;
      const target = getSuctionTargetPoint();
      for (const e of enemies) {
        if (isEnemyDying(e) || e.remove) continue;
        if (e.isBoss) continue; // Boss is immune to suction
        const sdx = target.x - e.x, sdy = target.y - e.y;
        const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
        if (sdist <= sr && sdist > 10) {
          e.x += (sdx / sdist) * ss * dt;
          e.y += (sdy / sdist) * ss * dt;
        }
      }
      // Spawn suction particles converging on landing point
      if (Math.random() < 0.5) {
        const angle = Math.random() * Math.PI * 2;
        const dist = sr * (0.5 + Math.random() * 0.5);
        suctionParticles.push({
          x: target.x + Math.cos(angle) * dist,
          y: target.y + CONFIG.player.size.height / 2 + Math.sin(angle) * dist,
          vx: -Math.cos(angle) * ss * 1.5,
          vy: -Math.sin(angle) * ss * 1.5,
          life: 0.4, maxLife: 0.4,
          color: currentRecipe.color,
        });
      }
    }

    // Dash is still allowed
    if (keyJustPressed['KeyX'] && player.dashCooldownTimer <= 0) {
      player.finishHolding = false;
      player.finishHoldTimer = 0;
      player.finishSuperArmor = false;
      currentRecipe = null;
      finishSuctionActive = false;
      startDash();
    }
    return;
  }

  // Clear enhance hitbox each frame
  player.enhanceAttackHitbox = null;

  // Dash cancel during enhance attack
  if (keys['KeyZ'] && keyJustPressed['KeyX'] && player.dashCooldownTimer <= 0) {
    player.enhanceAttackHitbox = null;
    player.enhanceAttackHitEnemies.clear();
    startDash();
    return;
  }

  // Attack: Z key held or pressed -> auto attack at attackSpeed interval
  if (keys['KeyZ']) {
    player.enhanceAttackTimer -= dt;
    if (player.enhanceAttackTimer <= 0) {
      player.enhanceAttackTimer = enh.attackSpeed;
      player.enhanceAttackHitEnemies.clear();

      // Create hitbox
      const rw = enh.attackRange.width;
      const rh = enh.attackRange.height;
      const yOff = player.enhanceAttackSide === 'left' ? -10 : 10;
      const hx = player.facingRight
        ? player.x + cfg.size.width / 2
        : player.x - cfg.size.width / 2 - rw;
      const hy = player.y + yOff;
      player.enhanceAttackHitbox = { x: hx, y: hy, w: rw, h: rh, side: player.enhanceAttackSide };

      // Toggle side
      player.enhanceAttackSide = player.enhanceAttackSide === 'left' ? 'right' : 'left';
    }
  } else {
    player.enhanceAttackTimer = 0; // Reset so next press attacks immediately
  }

  // Movement (half speed)
  let mx = 0, my = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
  if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) my += 1;

  if (mx !== 0 || my !== 0) {
    const len = Math.sqrt(mx * mx + my * my);
    mx /= len; my /= len;
    player.x += mx * cfg.moveSpeed * enh.moveSpeedMult * dt;
    player.y += my * cfg.moveSpeed * enh.moveSpeedMult * dt;
    if (mx !== 0) player.facingRight = mx > 0;
  }

  player.x = clamp(player.x, cfg.size.width / 2, currentRoomWidth - cfg.size.width / 2);
  player.y = clamp(player.y, CONFIG.room.groundY, CONFIG.room.groundBottom - cfg.size.height);

  // Dash
  if (keyJustPressed['KeyX'] && player.dashCooldownTimer <= 0) {
    startDash();
  }
}

// --- FINISH STATE ---
function startFinish() {
  player.state = 'finish';
  player.finishActive = true;
  player.finishPhase = 1; // rise
  player.finishPhaseTimer = 0.3;
  player.finishBaseX = player.x;
  player.finishBaseY = player.y;
  player.finishLandingHit = false;
  player.finishHolding = false;
  player.finishHoldTimer = 0;
  player.finishSuperArmor = false;
  player.enhanceAttackHitbox = null;
  finishSuctionActive = false;
  // Invincible during finish
  player.invincibleTimer = 10; // will be cleared on finish end
}

function updatePlayerFinish(dt) {
  player.finishPhaseTimer -= dt;
  const fwd = player.facingRight ? 1 : -1;
  const offsetX = CONFIG.finish.strikeOffsetX;

  switch (player.finishPhase) {
    case 1: { // Rise: up 80px + forward 40px
      const t = 1 - player.finishPhaseTimer / 0.3;
      player.y = player.finishBaseY - 80 * t;
      player.x = player.finishBaseX + fwd * 40 * t;
      player.x = clamp(player.x, CONFIG.player.size.width / 2, currentRoomWidth - CONFIG.player.size.width / 2);
      if (player.finishPhaseTimer <= 0) {
        player.finishPhase = 2;
        player.finishPhaseTimer = 0.2;
      }
      break;
    }

    case 2: { // Fall + hit: down 80px + forward 40px more
      const t = 1 - player.finishPhaseTimer / 0.2;
      player.y = (player.finishBaseY - 80) + 80 * t;
      player.x = player.finishBaseX + fwd * (40 + 40 * t);
      player.x = clamp(player.x, CONFIG.player.size.width / 2, currentRoomWidth - CONFIG.player.size.width / 2);
      if (player.finishPhaseTimer <= 0) {
        player.y = player.finishBaseY;
        // Landing hit!
        if (!player.finishLandingHit) {
          player.finishLandingHit = true;
          doFinishLandingHit();
        }
        player.finishPhase = 3;
        player.finishPhaseTimer = 0.4;
      }
      break;
    }

    case 3: // After delay (vulnerable)
      // Gradually restore color (handled in render)
      if (player.finishPhaseTimer <= 0) {
        // Apply enhance kill bonus before resetting
        applyEnhanceEndBonus();
        // End finish, return to normal
        player.state = 'normal';
        player.finishActive = false;
        player.finishPhase = 0;
        player.enhanceActive = false;
        player.enhanceTimer = 0;
        player.finishGauge = 0;
        player.comboCount = 0;
        player.comboTimer = 0;
        player.invincibleTimer = 0;
        currentRecipe = null;
      }
      break;
  }
}

function doFinishLandingHit() {
  const fin = CONFIG.finish;
  const recipe = currentRecipe || determineRecipe(player.ingredientSlots);
  const gaugeRatio = player.finishGauge / fin.gaugeMax;
  const scale = fin.gaugeScaleMin + (fin.gaugeScaleMax - fin.gaugeScaleMin) * gaugeRatio;
  const dmg = Math.round(recipe.baseDamage * scale);

  // Strike center: player position + forward offset
  const fwd = player.facingRight ? 1 : -1;
  const px = player.x + fwd * fin.strikeOffsetX;
  const py = player.finishBaseY + CONFIG.player.size.height / 2;
  const hitRadius = recipe.radius;
  const shockwaveRadius = hitRadius * fin.shockwaveRadiusMult;

  for (const e of enemies) {
    if (isEnemyDying(e)) continue;
    const ecfg = e.type === 'veg' ? CONFIG.enemy_veg
      : e.type === 'seasoning' ? CONFIG.enemy_seasoning
      : (e.isBoss ? CONFIG.enemy_boss : CONFIG.enemy_pig);
    const ex = e.x;
    const ey = e.y + ecfg.size.height / 2;
    const dist = distBetween(px, py, ex, ey);
    const dyingState = e.type === 'veg' ? VEG_STATES.DYING
      : e.type === 'seasoning' ? SEASONING_STATES.DYING : PIG_STATES.DYING;
    const stunState = e.type === 'veg' ? VEG_STATES.STAGGER
      : e.type === 'seasoning' ? SEASONING_STATES.FLEE : PIG_STATES.HIT_STUN;

    if (dist <= hitRadius) {
      // Direct hit: full damage
      const knockDir = ex > px ? 1 : (ex < px ? -1 : fwd);
      e.hp -= dmg;
      e.flashTimer = CONFIG.gameFeel.flashDuration / 60;
      e.knockbackVelX = (e.isBoss && CONFIG.enemy_boss.knockbackResist) ? 0 : knockDir * 40 * 8;
      e.squashPhase = 1;
      e.squashTimer = 2 / 60;
      if (e.hp <= 0) {
        e.state = dyingState;
        sfxEnemyDeath();
        spawnDeathEffect(e.x, e.y + ecfg.size.height / 2, getEnemyOrbColor(e));
        for (let oi = 0; oi < 3; oi++) {
          spawnEssenceOrb(e.x, e.y, getEnemyOrbColor(e), 10, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30);
        }
        if (e.type === 'veg') { e.dyingTimer = 0.3; e.dyingVY = -200; }
        else if (e.isBoss) { e.dyingTimer = 0.8; }
        else { e.dyingTimer = 0.4; }
        if (e.isBoss) {
          gameCleared = true;
          clearBossMinions();
          sfxRoomClear();
          allClearSlowmoTimer = 0.5;
          allClearPopScale = 0;
          gameTimeScale = 0.3;
        }
        if (!e.isBoss) {
          const ha = e.type === 'veg' ? CONFIG.recovery.vegHeal : CONFIG.recovery.pigHeal;
          if (ha > 0) { player.hp = Math.min(CONFIG.player.maxHp, player.hp + ha); healTexts.push({ x: player.x, y: player.y - 20, text: `+${ha}`, timer: 0.5 }); }
        }
        // Track finish kills for enhance end bonus (no direct slot filling during enhance/finish)
        player.enhanceKillCount++;
      } else {
        e.state = stunState;
        if (e.type === 'veg') { e.stateTimer = 0.4; e.telegraphScale = 1; e.energyBallRadius = 0; }
        else { e.stunTimer = 0.4; }
      }
    } else if (dist <= shockwaveRadius) {
      // Shockwave: no damage, knockback only
      const knockDir = ex > px ? 1 : (ex < px ? -1 : fwd);
      e.knockbackVelX = (e.isBoss && CONFIG.enemy_boss.knockbackResist) ? 0 : knockDir * fin.shockwaveKnockback * 8;
      e.squashPhase = 1;
      e.squashTimer = 2 / 60;
      if (!isEnemyDying(e)) {
        e.state = stunState;
        if (e.type === 'veg') { e.stateTimer = fin.shockwaveStun; }
        else { e.stunTimer = fin.shockwaveStun; }
      }
    }
  }

  // Finish SFX + comic effects by recipe type
  if (recipe === CONFIG.finish.recipes.steakSmash) { sfxFinishSteak(); spawnComicText(px, py - 40, 'STEAK SMASH!!', '#ff4444', 28); }
  else if (recipe === CONFIG.finish.recipes.saladStorm) { sfxFinishSalad(); spawnComicText(px, py - 40, 'SALAD STORM!!', '#44dd44', 28); }
  else { sfxFinishFullcourse(); spawnComicText(px, py - 40, 'FULL COURSE!!', '#ffaa22', 28); }
  spawnComicHitEffect(px, py, 40, 'burst');

  // Game feel — use recipe values
  triggerHitstop(recipe.hitstopFrames);
  triggerShake(recipe.shakeIntensity);
  screenFlashTimer = SCREEN_FLASH_DURATION;
  triggerFinishShockwaves(px, player.finishBaseY + CONFIG.player.size.height, recipe);

  // Recipe bonus effects
  if (recipe.healAmount > 0) {
    player.hp = Math.min(player.hp + recipe.healAmount, CONFIG.player.maxHp);
    healTexts.push({ x: player.x, y: player.y - 40, text: `+${recipe.healAmount}`, timer: 0.8 });
  }

  // Recipe name display
  recipeNameText = recipe.name;
  recipeNameColor = recipe.color;
  recipeNameGlow = recipe.colorGlow;
  recipeNameTimer = 1.3; // 0.2s scale-in + 0.8s hold + 0.3s fade

  // Steak buff activation
  if (recipe === CONFIG.finish.recipes.steakSmash) {
    player.steakBuff.active = true;
    player.steakBuff.timer = recipe.buffDuration;
    player.steakBuff.damageMult = recipe.buffDamageMult;
  }

  // Bonus slot (full course): store for after slot clear
  const pendingBonus = recipe.bonusSlot;

  // Clear ingredient slots
  player.ingredientSlots = [];

  // Apply bonus slot after clear
  if (pendingBonus > 0) {
    const bonusType = Math.random() < 0.5 ? 'meat' : 'vegetable';
    player.ingredientSlots.push(bonusType);
    player.ingredientPopIndex = 0;
    player.ingredientPopTimer = 0.15;
  }
}

// --- DASH (shared) ---
function startDash() {
  const cfg = CONFIG.player;
  player.isDashing = true;
  player.dashTimer = cfg.dashDuration;
  player.dashCooldownTimer = cfg.dashCooldown;
  player.dashInvincibleTimer = 0.2;
  let dx = 0, dy = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
  if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
  if (dx === 0 && dy === 0) dx = player.facingRight ? 1 : -1;
  const dlen = Math.sqrt(dx * dx + dy * dy);
  player.dashDirX = dx / dlen;
  player.dashDirY = dy / dlen;
}

function playerHitbox() {
  return {
    x: player.x - CONFIG.player.size.width / 2,
    y: player.y,
    w: CONFIG.player.size.width,
    h: CONFIG.player.size.height,
  };
}

function damagePlayer(dmg, knockDirX, source) {
  if (player.invincibleTimer > 0 || player.dashInvincibleTimer > 0 || player.dead) return;
  // Finish mode: invincible
  if (player.finishActive && player.finishPhase <= 2) return;

  player.hp -= dmg;
  playerHpGhostDelay = 0.5; // delay ghost bar shrink
  player.invincibleTimer = CONFIG.player.hitInvincibleTime;
  sfxPlayerHit();
  player.hpBarShakeTimer = 0.15;
  player.flashTimer = CONFIG.gameFeel.flashDuration / 60;

  // Hit feedback: screen shake + vignette (always applied)
  const shakeMag = source === 'projectile'
    ? CONFIG.gameFeel.screenShake.playerHitLight
    : CONFIG.gameFeel.screenShake.playerHitHeavy;
  triggerShake(shakeMag);
  vignetteTimer = CONFIG.gameFeel.vignettePulse.duration;

  if (player.finishSuperArmor) {
    // Super armor: no knockback, no hold cancel, just flash
    player.finishSuperArmorFlash = 0.1;
    // Time penalty still applies
    if (player.state === 'enhance') {
      player.enhanceTimer -= CONFIG.enhance.hitTimePenalty;
      player.enhanceTimerFlashTimer = 0.1;
    }
  } else {
    // Normal hit: knockback + combo reset
    player.x += knockDirX * 30;
    player.x = clamp(player.x, CONFIG.player.size.width / 2, currentRoomWidth - CONFIG.player.size.width / 2);

    // Combo counter reset on hit (gauge stays)
    player.comboCount = 0;
    player.comboTimer = 0;

    // Charge loss on hit (normal mode only)
    if (player.state === 'normal' && player.ingredientPartialCharge > 0) {
      const loss = CONFIG.ingredientList.chargeOnHitLoss;
      player.ingredientPartialCharge = Math.max(0, player.ingredientPartialCharge - loss);
      player.chargeLossFlash = 0.15;
      player.chargeLossTextTimer = 0.4;
      player.chargeLossTextY = 0;
    }

    // Ingredient loss on knockback attacks (charge/slam only)
    if ((source === 'charge' || source === 'slam') && player.ingredientSlots.length > 0 && player.state !== 'enhance') {
      const lostType = player.ingredientSlots.pop();
      spawnIngredientLossEffect(player.x, player.y, lostType);
      player.ingredientLossFlashTimer = 0.2;
      sfxIngredientLoss();
    }

    // Daze: consecutive hit stun (normal mode only)
    if (player.state === 'normal') {
      const timeSinceLastHit = gameTimer - player.lastHitTime;
      if (timeSinceLastHit <= CONFIG.player.daze.windowTime && timeSinceLastHit > 0) {
        player.dazeActive = true;
        player.dazeTimer = CONFIG.player.daze.duration;
        player.invincibleTimer = Math.max(player.invincibleTimer, CONFIG.player.daze.duration + 0.1);
        sfxDaze();
      }
      player.lastHitTime = gameTimer;
    }

    // Enhance mode: time penalty + cancel finish hold
    if (player.state === 'enhance') {
      player.enhanceTimer -= CONFIG.enhance.hitTimePenalty;
      player.enhanceTimerFlashTimer = 0.1;
      player.finishHolding = false;
      player.finishHoldTimer = 0;
      player.finishSuperArmor = false;
    }
  }

  if (player.hp <= 0) {
    player.hp = 0;
    player.dead = true;
    gameOver = true;
    gameOverType = 'hp';
    gameOverAnimTimer = 0;
    gameOverSlowmo = true;
    gameTimeScale = 0.15;
  }
}
